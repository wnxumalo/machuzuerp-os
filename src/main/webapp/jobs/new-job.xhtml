<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Jobs</h1>
<p:messages id="messages" showDetail="true" closable="true" />
                <h:form styleClass="ui-fluid">
                    
                    <p:panelGrid columns="2">
                        <h:outputText value="Title"/>
                        <p:inputText id="title" value="#{jobs.title}" required="true" />                          
                        <h:outputText value="Department"/>
                        <p:inputText id="owner" value="#{jobs.owner}" required="true" />                          
                        <h:outputText value="Contact Person"/>
                        <p:inputText id="contactPerson" value="#{jobs.contactPerson}" required="true" />                          
                        <h:outputText value="Contact Number"/>
                        <p:inputText id="contactDetails" value="#{jobs.contactDetails}" required="true" />                          
                        <h:outputText value="Problem Statement"/>
                        <p:inputText id="problemStatement" value="#{jobs.problemStatement}" required="true" />
                        <h:outputText value="Expected Benefit"/>
                        <p:inputText id="expectedBenefit" value="#{jobs.expectedBenefit}" required="true" />
                        <!--h:outputText value="Reference Documents" />
                        <p:inputText id="referenceDocs" value="#{jobs.jobDetails}" required="true" /-->
                        <h:outputText value="Details"/>
                        <p:inputTextarea rows="5" cols="100" id="jobDetails" value="#{jobs.referenceDocuments}" autoResize="true" placeholder="" required="true"/>                                                                                                                    
                    </p:panelGrid>
                    &nbsp;&nbsp;&nbsp;
                    <p:commandButton value="Save" action="#{jobs.saveJob()}"  global="true">
                        
                        
                    </p:commandButton>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
