<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>View Your Payslips</h1>                                

                <h:form id="frmPayroll" styleClass="ui-fluid">
                    <p>
                        <h:panelGrid columns="4" cellpadding="2" >
                            <h:outputText value="From"/>
                            <p:calendar id="datefrom" value="#{employeesData.payDateFrom}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                            <h:outputText value="To"/>
                            <p:calendar id="dateto" value="#{employeesData.payDateTo}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                            <p:commandButton value="View" icon="ui-icon-search" action="#{employeesData.filterSingleEmployeePayroll()}" update=":frmPayrollDT:payrollDT"/>                            
                        </h:panelGrid>
                    </p>
                </h:form>
                <h:form id="frmPayrollDT" styleClass="ui-fluid">
                    <p:dataTable id="payrollDT" var="pay" value="#{employeesData.payrollList}"  selectionMode="single" selection="#{employeesData.selectedPayroll}" rowKey="#{pay.id}" paginator="true" rows="10">
                        <p:ajax event="rowSelect" listener="#{employeesData.onPayrollRowSelect}"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Recnum" />
                            </f:facet>
                            <h:outputText value="#{pay.id}" />
                        </p:column>
                        <p:column filterBy="#{pay.id}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Name" />
                            </f:facet>                       
                            <h:outputText value="#{pay.name}" />                                
                        </p:column>                            
                        <p:column filterBy="#{pay.surname}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Surname" />                                    
                            </f:facet>                       
                            <h:outputText value="#{pay.surname}" />                                
                        </p:column>
                        <p:column filterBy="#{pay.paidFrom}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Paid From" />                                    
                            </f:facet>                       
                            <h:outputText value="#{pay.paidFrom}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Pay Date" />
                            </f:facet>
                            <h:outputText value="#{pay.payDate}" />
                        </p:column>                            
                    </p:dataTable>
                </h:form>


            </ui:define>

        </ui:composition>

    </body>
</html>
