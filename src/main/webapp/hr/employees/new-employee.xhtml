<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">

                <h:form id="empForm" styleClass="ui-fluid">
                    <h1>New Employee</h1>

                    <p:messages id="messages" showDetail="true" closable="true">
                        <p:autoUpdate />
                    </p:messages>

                    <h:panelGrid columns="4" >
                        <p:outputLabel for="VatNum" value="ID Number"/>
                        <p:inputText id="VatNum" value="#{employees.IDNumber}" required="true" />
                        <p:outputLabel for="TaxNum" value="Tax Number" />
                        <p:inputText id="TaxNum" value="#{employees.taxNumber}" required="true" />
                        <p:outputLabel for="EmpNum" value="Employee Number" />
                        <p:inputText id="EmpNum" value="#{employees.employeeNumber}" required="true" />
                        <p:outputLabel for="JoiningDate" value="Employment Date" />
                        <p:calendar id="JoiningDate" value="#{employees.employmentDate}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                        <p:outputLabel for="Name" value="Name"/>
                        <p:inputText id="Name" value="#{employees.empName}" required="true" />
                        <p:outputLabel for="Surname" value="Surname" />
                        <p:inputText id="Surname" value="#{employees.surname}" />
                        <p:outputLabel for="Position" value="Position" />
                        <p:inputText id="Position" value="#{employees.position}" />
                        <p:outputLabel for="Department" value="Department"/>
                        <p:selectOneMenu id="Department" value="#{employees.department}" style="width:125px">
                            <f:selectItem itemLabel="Select Supervisor" itemValue="" />
                            <f:selectItem itemLabel="Production" itemValue="Production" />                                        
                            <f:selectItem itemLabel="Research and Development" itemValue="Research and Development" />                                        
                            <f:selectItem itemLabel="Purchasing" itemValue="Purchasing" />                                                        
                            <f:selectItem itemLabel="Marketing" itemValue="Marketing" />                            
                            <f:selectItem itemLabel="Accounting and Finance" itemValue="Accounting and Finance" />
                            <f:selectItem itemLabel="Information Technology" itemValue="Information Technology" />
                            <f:selectItem itemLabel="Human Resources" itemValue="Human Resources" />
                            <f:selectItem itemLabel="Administration" itemValue="Administration" />
                            <f:selectItem itemLabel="Commercial" itemValue="Commercial" />
                        </p:selectOneMenu>       
                        <p:outputLabel for="Gender" value="Gender"/>
                        <p:selectOneMenu id="Gender" value="#{employees.gender}" style="width:125px">
                            <f:selectItem itemLabel="Select Gender" itemValue="" />
                            <f:selectItem itemLabel="Male" itemValue="Male" />
                            <f:selectItem itemLabel="Female" itemValue="Female" />                            
                            <f:selectItem itemLabel="Undisclosed" itemValue="Undisclosed" />                                                        
                        </p:selectOneMenu>
                        <p:outputLabel for="Level" value="Level"/>
                        <p:selectOneMenu id="Level" value="#{employees.level}" style="width:125px">
                            <f:selectItem itemLabel="Select Level" itemValue="" />
                            <f:selectItem itemLabel="Junior" itemValue="Junior" />                                        
                            <f:selectItem itemLabel="Officer" itemValue="Officer" />                                        
                            <f:selectItem itemLabel="Supervisor" itemValue="Supervisor" />                                                        
                            <f:selectItem itemLabel="Management" itemValue="Management" />                            
                            <f:selectItem itemLabel="Board" itemValue="Board" />                            
                        </p:selectOneMenu>
                        <p:outputLabel for="Telephone" value="Telephone" />
                        <p:inputText id="Telephone" value="#{employees.telephone}" />
                        <p:outputLabel for="Cellphone" value="Cellphone" />
                        <p:inputText id="Cellphone" value="#{employees.cellphone}" required="true"/>
                        <p:outputLabel for="Email" value="Email" />
                        <p:inputText id="Email" value="#{employees.email}" required="true">
                            <f:validator validatorId="custom.emailValidator" />
                        </p:inputText>
                        <p:outputLabel for="PostalAddress" value="Postal Address" />
                        <p:inputText id="PostalAddress" value="#{employees.postalAddress}" required="true" />
                        <p:outputLabel for="PhysicalAddress" value="Physical Address" />
                        <p:inputText id="PhysicalAddress" value="#{employees.physicalAddress}" />
                        <p:outputLabel for="BankName" value="Bank Name" />
                        <p:inputText id="BankName" value="#{employees.bankName}" />
                        <p:outputLabel for="BranchCode" value="Branch Code" />
                        <p:inputText id="BranchCode" value="#{employees.branchCode}" />
                        <p:outputLabel for="AccountName" value="Account Name" />
                        <p:inputText id="AccountName" value="#{employees.accountName}" />
                        <p:outputLabel for="AccountNumber" value="Account Number" />
                        <p:inputText id="AccountNumber" value="#{employees.accountNumber}" />
                        <p:outputLabel for="Salary" value="Salary" />
                        <p:inputNumber id="Salary" value="#{employees.salary}" />
                        <p:outputLabel for="SalaryInterval" value="Salary Interval"/>
                        <p:selectOneMenu id="SalaryInterval" value="#{employees.salaryInterval}" style="width:125px" required="true">
                            <f:selectItem itemLabel="Select Interval" itemValue="" />
                            <f:selectItem itemLabel="Monthly" itemValue="Monthly" />
                            <f:selectItem itemLabel="Annually" itemValue="Annually" />                            
                        </p:selectOneMenu>                 
                        <p:outputLabel for="Status" value="Status"/>
                        <p:selectOneMenu id="Status" value="#{employees.status}" style="width:125px" required="true">
                            <f:selectItem itemLabel="Select Status" itemValue="" />
                            <f:selectItem itemLabel="Probation" itemValue="Probation" />                            
                            <f:selectItem itemLabel="Employed" itemValue="Employed" />                                        
                            <f:selectItem itemLabel="Dismissed" itemValue="Dismissed" />                            
                            <f:selectItem itemLabel="Resigned" itemValue="Resigned" />                            
                        </p:selectOneMenu> 
                        <p:outputLabel for="Supervisor" value="Supervisor"/>
                        <h:selectOneMenu id='Supervisor' value="#{employees.selected.EmployeeDTO}" converter="employeeConverter">
                           <f:selectItems value="#{employeesBean.employees}" var="employee" 
                                           itemValue="#{employee}"
                                           itemLabel="#{employee.name} #{employee.surname}"/>
                        </h:selectOneMenu>                            
                        <p:outputLabel for="approver" value="Approver"/>
                        <p:selectOneMenu id="approver" value="#{employees.approver}" style="width:125px">
                            <f:selectItem itemLabel="" itemValue="" />
                            <f:selectItem itemLabel="Yes" itemValue="Yes" />
                            <f:selectItem itemLabel="No" itemValue="No" />
                        </p:selectOneMenu>
                        &nbsp;
                        <p:commandButton icon="ui-icon-disk" value="Save" action="#{employees.saveEmployee()}" style="width:100%" global="true"/>
                        <p:commandButton type="reset" value="Clear"  update=":empForm" actionListener="#{employees.reset}"/>                            
                                                   
                    </h:panelGrid>


                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
