<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">

                <h:form styleClass="ui-fluid">
                    <p:commandButton value="Back" action="#{employeesData.refreshEmployee(param['recnum'])}"  style="width:100%" global="true">
                        
                        
                        <f:param name="recnum" value="#{employeesData.recNum}" />
                    </p:commandButton>
                </h:form>
                <h:form styleClass="ui-fluid">
                    <h1>New Deduction</h1>

                    <p:messages id="messages" showDetail="true" closable="true">
                        <p:autoUpdate />
                    </p:messages>
                    
                    <p:panelGrid columns="2" >                        
                        <p:outputLabel for="description" value="Description"/>
                        <p:selectOneMenu id="description" value="#{deductions.description}" style="width:125px" required="true">
                            <f:selectItem itemLabel="Select" itemValue="" />                            
                            <f:selectItem itemLabel="PAYE" itemValue="PAYE" />
                            <f:selectItem itemLabel="Provident Fund" itemValue="Provident Fund" />
                            <f:selectItem itemLabel="Home Loan" itemValue="Home Loan" />
                            <f:selectItem itemLabel="Personal Loan" itemValue="Personal Loan" />
                            <f:selectItem itemLabel="Loan Advance" itemValue="Loan Advance" />
                            <f:selectItem itemLabel="Loan" itemValue="Loan" />
                            <f:selectItem itemLabel="Other" itemValue="Other" />                            
                        </p:selectOneMenu>
                        <p:outputLabel for="amount" value="Amount" />
                        <p:inputText id="amount" value="#{deductions.amount}" required="true" />                                                                        
                    </p:panelGrid>
                    &nbsp;&nbsp;&nbsp;
                    <p:commandButton value="Save" action="#{deductions.saveDeduction()}"  style="width:100%" global="true">
                        
                        
                        <f:param name="recnum" value="#{employeesData.recNum}" />
                    </p:commandButton>

                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
