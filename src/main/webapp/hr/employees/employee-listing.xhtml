<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Employee Listing</h1>

                <h:form styleClass="ui-fluid">
                    <p:dataTable id="employeeDT" var="emps" value="#{employeesData.employees}" selectionMode="single" selection="#{employeesData.selectedEmployee}" rowKey="#{emps.recNum}" paginator="true" rows="10">
                        <p:ajax event="rowSelect" listener="#{employeesData.onRowSelect}"/>  
                        
                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Recnum" />
                            </f:facet>
                            <h:outputText value="#{emps.recNum}" />
                        </p:column>
                        <p:column filterBy="#{emps.IDNumber}">
                            <f:facet name="header">
                                <h:outputText value="ID Number" />
                            </f:facet>                       
                            <h:outputText value="#{emps.IDNumber}" />                                
                        </p:column>
                        <p:column filterBy="#{emps.taxNumber}">
                            <f:facet name="header">
                                <h:outputText value="Tax Number" />
                            </f:facet>                       
                            <h:outputText value="#{emps.taxNumber}" />
                        </p:column>
                        <p:column filterBy="#{emps.empName}">
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{emps.empName}" />                             
                        </p:column>  
                        <p:column filterBy="#{emps.empSurname}">
                            <f:facet name="header">
                                <h:outputText value="empSurname" />                                    
                            </f:facet>                       
                            <h:outputText value="#{emps.empSurname}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Telephone" />                                    
                            </f:facet>                       
                            <h:outputText value="#{emps.telephone}" />
                        </p:column>
                        <p:column filterBy="#{emps.cellphone}">
                            <f:facet name="header">
                                <h:outputText value="Cellphone" />
                            </f:facet>
                            <h:outputText value="#{emps.cellphone}" />
                        </p:column>
                        <p:column filterBy="#{emps.department}">
                            <f:facet name="header">
                                <h:outputText value="Department" />
                            </f:facet>
                            <h:outputText value="#{emps.department}" />
                        </p:column>
                    </p:dataTable>
                    
                    <p:ajaxStatus style="display:block;margin-bottom:2em;height:24px;">
                        <f:facet name="default">
                            <h:outputText value="" />
                        </f:facet>

                    </p:ajaxStatus>

                    <p:ajaxStatus onstart="PF('statusDialog').show()" onsuccess="PF('statusDialog').hide()" />
                    <p:dialog widgetVar="statusDialog" modal="true" draggable="false" closable="false" resizable="false" showHeader="false">
                        <img src="../../images/ajax-loader.gif" />
                    </p:dialog>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
