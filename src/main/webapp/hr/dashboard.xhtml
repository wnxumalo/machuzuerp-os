<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Human Resources</h1>

                <h:form id="form" styleClass="ui-fluid">

                    <p:panel>
                        <f:facet name="header" >
                            <h:outputText value="Employees"/>
                        </f:facet>
                        <p:commandButton icon="ui-icon-circle-plus" action="#{login.newEmployee(session)}" title="New Employee">
                            
                            
                        </p:commandButton>
                        <p:commandButton icon="ui-icon-search" action="#{login.findEmployee(session)}" title="Search Employee">
                            
                            
                        </p:commandButton>
                        
                    </p:panel>     

                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
