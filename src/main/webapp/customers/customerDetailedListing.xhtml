<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Stakeholder</h1>

                <h:form id="form" styleClass="ui-fluid">

                    <p:carousel value="#{customerData.allCustomers}" headerText="Stakeholders" var="customers" itemStyle="text-align:center" responsive="true">
                        <p:panelGrid columns="2" style="width:100%;margin:10px 0px" columnClasses="label,value" layout="grid" styleClass="ui-panelgrid-blank">
                            <f:facet name="header">

                            </f:facet>

                            <h:outputText value="Id:" />
                            <h:outputText value="#{customers.name}" />

                            <h:outputText value="Year" />
                            <h:outputText value="#{customers.surname}" />

                            <h:outputText value="Color:" />
                            <h:outputText value="#{customers.gender}" />

                            <h:outputText value="Price" />
                            <h:outputText value="$#{customers.cellphone}" />
                        </p:panelGrid>

                        <f:facet name="footer">

                        </f:facet>
                    </p:carousel>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
