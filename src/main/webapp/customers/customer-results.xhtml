<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Stakeholder Results</h1>

                <h:form id="form" styleClass="ui-fluid">

                    <p:dataTable  var="customers" value="#{customerData.customers}">
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Status" />                                    
                            </f:facet>                       
                            <h:outputText value="#{customers.status}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{customers.customerName}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Surname" />                                    
                            </f:facet>                       
                            <h:outputText value="#{customers.surname}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Type" />                                    
                            </f:facet>                       
                            <h:outputText value="#{customers.type}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Gender" />
                            </f:facet>
                            <h:outputText value="#{customers.gender}" />
                        </p:column>
                    </p:dataTable>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
