<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Stakeholder Listing</h1>

                <h:form id="form" styleClass="ui-fluid">

                    <p:dataTable id="customersDT" var="custs" value="#{customerData.customers}"  selectionMode="single" selection="#{customerData.selectedCustomer}" rowKey="#{custs.recnum}" paginator="true" rows="10">
                        <p:ajax event="rowSelect" listener="#{customerData.onRowSelect}"/>  
                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Recnum" />
                            </f:facet>
                            <h:outputText value="#{custs.recnum}" />
                        </p:column>
                        <p:column filterBy="#{custs.status}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Status" />
                            </f:facet>                       
                            <h:outputText value="#{custs.status}" />                                
                        </p:column>
                        <p:column filterBy="#{custs.customerName}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{custs.customerName}" />                             
                        </p:column>  
                        <p:column filterBy="#{custs.surname}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Surname" />                                    
                            </f:facet>                       
                            <h:outputText value="#{custs.surname}" />                                
                        </p:column>
                        <p:column filterBy="#{custs.customerName}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Type" />                                    
                            </f:facet>                       
                            <h:outputText value="#{custs.type}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Gender" />
                            </f:facet>
                            <h:outputText value="#{custs.gender}" />
                        </p:column>
                    </p:dataTable>
                    
                    <p:ajaxStatus style="display:block;margin-bottom:2em;height:24px;">
                    <f:facet name="default">
                        <h:outputText value="" />
                    </f:facet>

                </p:ajaxStatus>

                <p:ajaxStatus onstart="PF('statusDialog').show()" onsuccess="PF('statusDialog').hide()" />
                <p:dialog widgetVar="statusDialog" modal="true" draggable="false" closable="false" resizable="false" showHeader="false">
                    <img src="../images/ajax-loader.gif" />
                </p:dialog>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
