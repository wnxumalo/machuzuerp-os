<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

    <body>

        <ui:composition template="../erpbyw-template.xhtml">

            <ui:define name="content">

                <h1>Stakeholders</h1>

                <h:form styleClass="ui-fluid">


                    <h:panelGrid columns="2" cellpadding="2" style="width:741px;">                                                               
                        <h:outputText value="From" style="width:741px;font-weight:bold;"/>
                        <p:calendar id="startDate" value="#{stakeholdersDashboard.dateFrom}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                        <h:outputText value="To" style="width:741px;font-weight:bold;"/>
                        <p:calendar id="endDate" value="#{stakeholdersDashboard.dateTo}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />                            
                        <p:commandButton value="Print"  icon="ui-icon-print" type="button">
                            <p:printer target="stakeholderDash" />
                        </p:commandButton>
                        <p:commandButton value="View" action="#{stakeholdersDashboard.filterDashboard()}" update="stakeholderDash"/>
                        <br></br>
                    </h:panelGrid>                  

                    <p:panelGrid columns="2" style="width: 100%" id="stakeholderDash">
                        <p:chart type="line" model="#{stakeholdersDashboard.totByJoiningDate}" />
                        <p:chart type="pie" model="#{stakeholdersDashboard.type}" />
                        <p:chart type="pie" model="#{stakeholdersDashboard.gender}" />
                        <p:chart type="pie" model="#{stakeholdersDashboard.status}" />                
                    </p:panelGrid>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
