<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Edit Stakeholder</h1>

                <h:form id="form" styleClass="ui-fluid">                    
                    <p:messages id="messages" showDetail="true" closable="true" >
                        <p:autoUpdate/>
                    </p:messages>
                    <table cellpadding="10"><td v-align="top">
                            <h:outputText value="Rec Num" /><br></br>
                            <h:inputText value="#{param['recnum']}" disabled="true"/><br></br>
                            <h:outputText value="VAT/ID Number"/><br></br>
                            <p:inputText id="VatNum" value="#{customer.vatNum}" required="true" /><br></br>  
                            <h:outputText value="Type" /><br></br>
                            <p:selectOneMenu id="Type" value="#{customer.type}" style="width:125px" required="true">
                                <f:selectItem itemLabel="Select Type" itemValue="" />
                                <f:selectItem itemLabel="Client" itemValue="Client" />
                                <f:selectItem itemLabel="Partner" itemValue="Partner" />                                       
                            </p:selectOneMenu><br></br>
                            <h:outputText value="Status"/><br></br>
                            <p:selectOneMenu id="Status" value="#{customer.status}" style="width:125px" required="true">
                                <f:selectItem itemLabel="Select Status" itemValue="" />
                                <f:selectItem itemLabel="Active" itemValue="Active" />
                                <f:selectItem itemLabel="Inactive" itemValue="Inactive" />                            
                            </p:selectOneMenu><br></br>
                            <h:outputText value="Name" /><br></br>
                            <p:inputText value="#{customer.customerName}"/><br></br>
                            <h:outputText value="Surname" /><br></br>
                            <p:inputText value="#{customer.surname}" /><br></br>
                            <h:outputText value="Gender" /><br></br>
                            <p:selectOneMenu id="Gender" value="#{customer.gender}" style="width:125px" required="true">
                                <f:selectItem itemLabel="Select Gender" itemValue="" />
                                <f:selectItem itemLabel="Male" itemValue="Male" />
                                <f:selectItem itemLabel="Female" itemValue="Female" />                            
                                <f:selectItem itemLabel="Undisclosed" itemValue="Undisclosed" />                                                        
                            </p:selectOneMenu><br></br>
                            <h:outputText value="Telephone" /><br></br>
                            <p:inputText value="#{customer.telephone}"/></td><td v-align="top">                            
                            <h:outputText value="Cellphone" /><br></br>
                            <p:inputText value="#{customer.cellphone}"/><br></br>
                            <h:outputText value="Email" /><br></br>
                            <p:inputText id="Email" value="#{customer.email}" required="true"/><br></br>
                            <h:outputText value="Fax" /><br></br>
                            <p:inputText value="#{customer.fax}" /><br></br>
                            <h:outputText value="Postal Address" /><br></br>
                            <p:inputText value="#{customer.postalAddress}" /><br></br>
                            <h:outputText value="Physical Address" /><br></br>
                            <p:inputText value="#{customer.physicalAddress}" /><br></br>
                            <h:outputText value="Country" /><br></br>
                            <p:inputText value="#{customer.country}" /><br></br>
                            <h:outputText value="Joining Date" /><br></br>
                            <p:calendar id="JoiningDate" value="#{customer.JDate}" readonlyInput="true" pattern="yyyy-MM-dd" navigator="true" required="true" >
                                <p:ajax event="dateSelect" listener="#{customer.onDateSelect}"/>
                            </p:calendar>                             
                            <br></br>
                        </td></table>                                                                  
                    &nbsp;&nbsp;&nbsp;
                    <p:commandButton icon="ui-icon-disk" value="Save" action="#{customer.saveEditCustomer}"/>
                        
                </h:form>
                <h:form id="confirmDelete" styleClass="ui-fluid">                                                  
                <p>
                    <p:commandButton value="Delete" icon="ui-icon-circle-minus" onclick="PF('dlgConfirmDelete').show();" title="Delete"/>
                </p>
                
                
                    <p:confirmDialog id="dlgConfirmDelete" message="Are you sure you want to delete this stakeholder?"
                                 header="Delete Stakeholder" severity="alert"
                                 widgetVar="dlgConfirmDelete">
                    <p:commandButton value="Yes Sure" actionListener="#{customer.deleteCustomer()}"
                                     oncomplete="PF('dlgConfirmDelete').hide()">
                        
                        
                        <f:param name="recnum" value="#{param['recnum']}" />
                    </p:commandButton>
                    <p:commandButton value="Not Yet" onclick="PF('dlgConfirmDelete').hide();" type="button" />
                </p:confirmDialog>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
