<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Outstanding Invoices</h1>

                <h:form id="form" styleClass="ui-fluid">

                    <p:dataTable id="invoicesDT" var="invoices" value="#{invoiceData.invoices}"  selectionMode="single" selection="#{invoiceData.selectedInvoice}" rowKey="#{invoices.recNum}">
                        <p:ajax event="rowSelect" listener="#{invoiceData.onRowSelect}"/>
                        
                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Recnum" />
                            </f:facet>
                            <h:outputText value="#{invoices.recNum}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Date" />
                            </f:facet>                       
                            <h:outputText value="#{invoices.IDate}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{invoices.CName}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Surname" />                                    
                            </f:facet>                       
                            <h:outputText value="#{invoices.CSurname}" />                                
                        </p:column>                                                  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Outstanding" />                                    
                            </f:facet>                       
                            <h:outputText value="#{invoices.outstanding}" />                                
                        </p:column>  
                    </p:dataTable>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
