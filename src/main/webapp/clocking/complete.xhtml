<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Update Mission Details</h1>

                <h:form id="form" styleClass="ui-fluid">

                <p:messages id="messages" showDetail="true" closable="true">
                    <p:autoUpdate />
                </p:messages>

                <h:panelGrid columns="2" cellpadding="5px">
                    <p:outputLabel for="uniqueId" value="Employee #" style="font-weight: bold"/>
                    <p:outputLabel id='uniqueId' value="#{clockingData.employeeId}"/>
                    <p:outputLabel for="exitDate" value="Date" style="font-weight: bold"/>
                    <p:outputLabel id='exitDate' value="#{clockingData.exitDate}" />               
                    <p:outputLabel for="description" value="Description" style="font-weight: bold"/>
                    <p:outputLabel id='description' value="#{clockingData.workDescription}"/>
                    <p:outputLabel for="outputs" value="Outputs" style="font-weight: bold"/>
                    <p:inputTextarea cols="50" id='outputs' value="#{clockingData.outputs}"></p:inputTextarea>
                    <p:outputLabel for="returnDate" value="Return Date" style="font-weight: bold"/>
                    <p:calendar id="returnDate" value="#{clockingData.returnDate}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                    <p:outputLabel for="comments" value="Comments" style="font-weight: bold"/>
                    <p:inputTextarea cols="50" id='comments' value="#{clockingData.comments}"></p:inputTextarea>
                </h:panelGrid>
                <p:commandButton value="Save" action="#{clockingData.saveClocking()}" title="Save" update="form">
                    
                    
                    <f:param name="recnum" value="#{param['recnum']}" />
                </p:commandButton>

            </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
