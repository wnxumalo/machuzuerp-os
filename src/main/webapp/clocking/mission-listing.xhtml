<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Mission Listing</h1>

                <h:form id="frmMis" styleClass="ui-fluid">

                    <p:dataTable id="clockDT" var="clk" value="#{clockingData.mission}"  selectionMode="single" selection="#{clockingData.selectedMission}" rowKey="#{clk.recNum}">
                        <p:ajax event="rowSelect" listener="#{clockingData.onRowSelect}"/>  
                        
                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Id" />
                            </f:facet>
                            <h:outputText value="#{clk.recNum}" />
                        </p:column>   
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Exit Date" />
                            </f:facet>
                            <h:outputText value="#{clk.exitDate}" />
                        </p:column>                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Description" />                                    
                            </f:facet>                       
                            <h:outputText value="#{clk.workDescription}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Outputs" />                                    
                            </f:facet>                       
                            <h:outputText value="#{clk.outputs}" />                                
                        </p:column> 
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Return Date" />
                            </f:facet>                       
                            <h:outputText value="#{clk.returnDate}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Employee Id" />
                            </f:facet>                       
                            <h:outputText value="#{clk.employeeId}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Supervisor Id" />
                            </f:facet>                       
                            <h:outputText value="#{clk.supervisorId}" />
                        </p:column>
                    </p:dataTable>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
