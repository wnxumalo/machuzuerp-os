<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>General Stakeholder Report</h1>                

                <h:form styleClass="ui-fluid">
                    <p:fieldset id="fsInvoice" legend="FILTER" style="font-size:14px;width:100%;">
                        <p:selectOneMenu id="Type" value="#{customer.type}" style="width:125px">
                            <f:selectItem itemLabel="Type" itemValue="" />
                            <f:selectItem itemLabel="Client" itemValue="Client" />
                            <f:selectItem itemLabel="Partner" itemValue="Partner" />                                        
                        </p:selectOneMenu>&nbsp;&nbsp;&nbsp;&nbsp;                        
                        <p:selectOneMenu id="Status" value="#{customer.status}" style="width:125px">
                            <f:selectItem itemLabel="Status" itemValue="" />
                            <f:selectItem itemLabel="Active" itemValue="Active" />
                            <f:selectItem itemLabel="Inactive" itemValue="Inactive" />                                        
                        </p:selectOneMenu>&nbsp;&nbsp;&nbsp;&nbsp;
                        <p:commandButton value="Stakeholders" action="#{stakeholderReport.getReportGeneral(customer.type, customer.status)}" icon="ui-icon-search" title="View All Invoices" update="stakeholdersDT">
                            
                            
                            <f:param name="recnum" value="#{cust.recnum}" />
                            <f:param name="custname" value="#{cust.customerName}" />
                            <f:param name="custsurname" value="#{cust.surname}" />
                        </p:commandButton>                       
                        &nbsp;&nbsp;&nbsp;&nbsp;
                        <p:commandButton value="Export as Excel" ajax="false">
                            <p:dataExporter type="xls" target="stakeholdersDT" fileName="Stakeholders"/>
                        </p:commandButton>
                        <br/><br/>


                        <p:dataTable id="stakeholdersDT" var="sholder" value="#{stakeholderReport.allStakeholders}" 
                                     paginator="true"
                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                                     rowsPerPageTemplate="20">

                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="#" />
                                </f:facet>
                                <h:outputText value="#{sholder.recordNum}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Type" />                                    
                                </f:facet>                       
                                <h:outputText value="#{sholder.type}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Status" />
                                </f:facet>                       
                                <h:outputText value="#{sholder.status}" />                                
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Name" />                                    
                                </f:facet>                       
                                <h:outputText value="#{sholder.customerName}" />                             
                            </p:column>  
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Surname" />                                    
                                </f:facet>                       
                                <h:outputText value="#{sholder.surname}" />                                
                            </p:column>                        
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Gender" />
                                </f:facet>
                                <h:outputText value="#{sholder.gender}" />
                            </p:column>
                        </p:dataTable>

                    </p:fieldset>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
