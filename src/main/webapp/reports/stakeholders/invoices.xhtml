<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Stakeholder Invoice Report</h1>                

                <h:form styleClass="ui-fluid">                    
                    <p:fieldset id="fsInvoice" legend="FILTER" style="font-size:14px;width:100%;">
                        <h:selectOneMenu value="#{clientsBean.selectedClient}" converter="clientConverter">
                            <f:selectItems value="#{clientsBean.clients}" var="client"
                                           itemValue="#{client}"
                                           itemLabel="#{client.id} - #{client.name}"/>
                        </h:selectOneMenu> &nbsp;&nbsp;&nbsp;&nbsp;                        
                        <p:commandButton value="Invoices" action="#{invoiceData.reportAllInvoices(clientsBean.selectedClient)}" icon="ui-icon-search" title="View All Invoices" update="stakeholdersDT">
                            
                            
                            <f:param name="recnum" value="#{cust.recnum}" />
                            <f:param name="custname" value="#{cust.customerName}" />
                            <f:param name="custsurname" value="#{cust.surname}" />
                        </p:commandButton>                       
                        &nbsp;&nbsp;&nbsp;&nbsp;
                        <p:commandButton value="Export as Excel" ajax="false">
                            <p:dataExporter type="xls" target="stakeholdersDT" fileName="Stakeholders"/>
                        </p:commandButton>
                        <br/><br/>

                        <p:dataTable id="stakeholdersDT" var="invoices" value="#{invoiceData.repAllInvoices}" 
                                     paginator="true"
                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                                     rowsPerPageTemplate="20">

                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Recnum" />
                                </f:facet>
                                <h:outputText value="#{invoices.recNum}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Date" />
                                </f:facet>                       
                                <h:outputText value="#{invoices.IDate}" />                                
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Name" />                                    
                                </f:facet>                       
                                <h:outputText value="#{invoices.CName}" />                             
                            </p:column>  
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Surname" />                                    
                                </f:facet>                       
                                <h:outputText value="#{invoices.CSurname}" />                                
                            </p:column> 
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Total" />                                    
                                </f:facet>                       
                                <h:outputText value="#{invoices.totCost}" />                                
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Outstanding" />                                    
                                </f:facet>                       
                                <h:outputText value="#{invoices.outstanding}" />                                
                            </p:column>
                        </p:dataTable>
                    </p:fieldset>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
