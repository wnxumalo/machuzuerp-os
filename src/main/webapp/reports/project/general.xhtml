<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Projects Report</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <p:fieldset legend="FILTER">
                        
                        <h:panelGrid columns="2" cellpadding="2" style="width:741px;">                                                               
                            <h:outputText value="Begin" style="width:741px;font-weight:bold;"/>
                            <p:calendar id="startDate" value="#{projectsReport.plannedStart}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                            <h:outputText value="End" style="width:741px;font-weight:bold;"/>
                            <p:calendar id="endDate" value="#{projectsReport.plannedEnd}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                            <p:commandButton value="Export as Excel" ajax="false">
                            <p:dataExporter type="xls" target="journalDT" fileName="Journal"/>
                        </p:commandButton>
                            <p:commandButton value="View" action="#{projectsReport.searchProjects()}" update="projectsDT">
                            
                            
                        </p:commandButton>   
                        </h:panelGrid>
                                                                         
                        
                        <br/><br/>
                        <p:dataTable id="projectsDT" var="projs" value="#{projectsReport.projects}" style="width:100%">

                            
                               
                            <p:column> <p:rowToggler /> </p:column> 
                            <p:column>
                            <f:facet name="header">
                                <h:outputText value="Id" />
                            </f:facet>
                            <h:outputText value="#{projs.recNum}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{projs.projName}" />                                
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Description" />                                    
                            </f:facet>                       
                            <h:outputText value="#{projs.description}" />                                
                        </p:column>   
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Status" />
                            </f:facet>                       
                            <h:outputText value="#{projs.status}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Planned Start" />
                            </f:facet>                       
                            <h:outputText value="#{projs.plannedStart}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Actual Start" />                                    
                            </f:facet>                       
                            <h:outputText value="#{projs.actualStart}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Planned End" />
                            </f:facet>                       
                            <h:outputText value="#{projs.plannedEnd}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Actual End" />                                    
                            </f:facet>                       
                            <h:outputText value="#{projs.actualEnd}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Manager" />                                    
                            </f:facet>                       
                            <h:outputText value="#{projs.projectManager}" />                             
                        </p:column>     
                            <p:column>
                            <f:facet name="header">
                                <h:outputText value="Stakeholder" />                                    
                            </f:facet>                       
                            <h:outputText value="#{projs.stakeholder}" />                             
                        </p:column>
                            
                            <p:rowExpansion> //Detailed content of a car </p:rowExpansion> 
                            
                        </p:dataTable>
                    </p:fieldset>

                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
