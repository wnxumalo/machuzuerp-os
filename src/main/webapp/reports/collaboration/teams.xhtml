<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Collaboration Team Report</h1>
                <h:form styleClass="ui-fluid">
                    <p:fieldset legend="FILTER">
                                               
                        <p:commandButton value="Export as Excel" ajax="false">
                            <p:dataExporter type="xls" target="teamDT" fileName="Stakeholders"/>
                        </p:commandButton>
                        <br/><br/>

                        <p:dataTable id="teamDT" var="ts" value="#{collaborationTeams.allTeams}" 
                                     paginator="true"
                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                                     rowsPerPageTemplate="20">

                            <p:column style="width:5%">
                                <f:facet name="header">
                                    <h:outputText value="Id" />
                                </f:facet>
                                <h:outputText value="#{ts.recNum}" />
                            </p:column>
                            <p:column style="width:10%">
                                <f:facet name="header">
                                    <h:outputText value="Name" />                                    
                                </f:facet>                       
                                <h:outputText value="#{ts.teamName}" />
                            </p:column>
                            <p:column headerText="Type" style="width:10%">                                              
                                <h:outputText value="#{ts.teamType}" />                                
                            </p:column>
                            <p:column style="width:75px">
                                <f:facet name="header">
                                    <h:outputText value="Emails" />                                    
                                </f:facet>                       
                                <h:outputText value="#{ts.teamEmails}" />                             
                            </p:column>                              
                        </p:dataTable>
                    </p:fieldset>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
