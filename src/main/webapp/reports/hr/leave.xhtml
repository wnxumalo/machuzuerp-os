<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Employee Deductions Report</h1>
                <h:form styleClass="ui-fluid">
                    <p:fieldset legend="FILTER">
                        
                        <h:panelGrid columns="2" cellpadding="2" style="width:741px;">                                                               
                            <h:outputText value="Begin" style="width:741px;font-weight:bold;"/>
                            <p:calendar id="startDate" value="#{employeesLeave.startDate}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                            <h:outputText value="End" style="width:741px;font-weight:bold;"/>
                            <p:calendar id="endDate" value="#{employeesLeave.endDate}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                            <p:commandButton value="Export as Excel" ajax="false">
                            <p:dataExporter type="xls" target="employeeDT" fileName="Leave"/>
                        </p:commandButton>
                            <p:commandButton value="View" action="#{employeesLeave.searchLeave()}" update="employeeDT">
                            
                            
                        </p:commandButton>   
                        </h:panelGrid>                       

                        <p:dataTable id="employeeDT" var="emp" value="#{employeesLeave.employees}" 
                                     paginator="true"
                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                                     rowsPerPageTemplate="20" sortBy="#{emp.empName}">

                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Type" />
                                </f:facet>
                                <h:outputText value="#{emp.leaveType}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Start" />
                                </f:facet>
                                <h:outputText value="#{emp.startDate}" />
                            </p:column> 
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="End" />
                                </f:facet>
                                <h:outputText value="#{emp.endDate}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Days" />
                                </f:facet>
                                <h:outputText value="#{emp.totalDays}" />
                            </p:column>    
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Comments" />                                    
                                </f:facet>                       
                                <h:outputText value="#{emp.comments}" />                                
                            </p:column> 
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="ID Number" />                                    
                                </f:facet>                       
                                <h:outputText value="#{emp.IDNumber}" />
                            </p:column>                            
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Employee Number" />                                    
                                </f:facet>                       
                                <h:outputText value="#{emp.employeeNumber}" />                             
                            </p:column>  
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Name" />
                                </f:facet>
                                <h:outputText value="#{emp.empName}" />
                            </p:column>                                                                                                          
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Surname" />
                                </f:facet>
                                <h:outputText value="#{emp.surname}" />
                            </p:column> 
                        </p:dataTable>
                    </p:fieldset>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
