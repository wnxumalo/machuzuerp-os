<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Employee Deductions Report</h1>
                <h:form styleClass="ui-fluid">
                    <p:fieldset legend="FILTER">
                                               
                        <p:commandButton value="Export as Excel" ajax="false">
                            <p:dataExporter type="xls" target="employeeDT" fileName="Stakeholders"/>
                        </p:commandButton>
                        <br/><br/>

                        <p:dataTable id="employeeDT" var="emp" value="#{employeesDeductions.allDeductions}" 
                                     paginator="true"
                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                                     rowsPerPageTemplate="20" sortBy="#{emp.empName}">

                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Benefit" />
                                </f:facet>
                                <h:outputText value="#{emp.benefit}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Contribution" />
                                </f:facet>
                                <h:outputText value="#{emp.contribution}" />
                            </p:column> 
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Employee Id" />
                                </f:facet>
                                <h:outputText value="#{emp.recNum}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Name" />
                                </f:facet>
                                <h:outputText value="#{emp.empName}" />
                            </p:column>    
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Surname" />                                    
                                </f:facet>                       
                                <h:outputText value="#{emp.surname}" />                                
                            </p:column> 
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="ID Number" />                                    
                                </f:facet>                       
                                <h:outputText value="#{emp.IDNumber}" />
                            </p:column>
                            <p:column headerText="Tax Number">                                              
                                <h:outputText value="#{emp.taxNumber}" />                                
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Employee Number" />                                    
                                </f:facet>                       
                                <h:outputText value="#{emp.employeeNumber}" />                             
                            </p:column>  
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Employment Date" />
                                </f:facet>
                                <h:outputText value="#{emp.employmentDate}" />
                            </p:column>                                                                                                          
                        </p:dataTable>
                    </p:fieldset>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
