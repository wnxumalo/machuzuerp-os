<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>General Inventory Report</h1>
                <h:form styleClass="ui-fluid">
                    <p:fieldset legend="FILTER">
                        <h:selectOneMenu id="supplier" value="#{supplierListBean.selectedSupplierList.id}">
                            <f:selectItems value="#{supplierListBean.supplierList}" var="supp" itemValue="#{supp.id}" itemLabel="#{supp.id} - #{supp.name}"/>
                        </h:selectOneMenu>                   &nbsp;&nbsp;&nbsp;&nbsp;          
                        <p:commandButton value="Supplier" action="#{inventoryReport.reportSupplierInventory(supplierListBean.selectedSupplierList.id)}" icon="ui-icon-search" title="View All Supplier" update="inventoryDT">
                            
                            
                            <f:param name="recnum" value="#{cust.recnum}" />
                            <f:param name="custname" value="#{cust.customerName}" />
                            <f:param name="custsurname" value="#{cust.surname}" />
                        </p:commandButton>                        
                        &nbsp;&nbsp;&nbsp;&nbsp;
                        <p:commandButton value="Export as Excel" ajax="false">
                            <p:dataExporter type="xls" target="inventoryDT" fileName="Stakeholders"/>
                        </p:commandButton>
                        <br/><br/>

                        <p:dataTable id="inventoryDT" var="inv" value="#{inventoryReport.reportInventory}" 
                                     paginator="true"
                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                                     rowsPerPageTemplate="20" sortBy="#{inv.description}">

                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="#" />
                                </f:facet>
                                <h:outputText value="#{inv.recNum}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Code" />                                    
                                </f:facet>                       
                                <h:outputText value="#{inv.code}" />
                            </p:column>
                            <p:column headerText="Description">                                              
                                <h:outputText value="#{inv.description}" />                                
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Supplier" />                                    
                                </f:facet>                       
                                <h:outputText value="#{inv.supplier}" />                             
                            </p:column>  
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Size" />
                                </f:facet>
                                <h:outputText value="#{inv.size}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Color" />
                                </f:facet>
                                <h:outputText value="#{inv.color}" />
                            </p:column>    
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Cost" />                                    
                                </f:facet>                       
                                <h:outputText value="#{inv.cost}" />                                
                            </p:column>                        
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Price" />
                                </f:facet>
                                <h:outputText value="#{inv.sellingPrice}" />
                            </p:column>
                            <p:column style="color: red;">
                                <f:facet name="header">
                                    <h:outputText value="Total" />
                                </f:facet>
                                <h:outputText value="#{inv.totCost}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Reorder" />
                                </f:facet>
                                <h:outputText value="#{inv.reorderLevel}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Markup" />
                                </f:facet>
                                <h:outputText value="#{inv.markup}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="At Hand" />
                                </f:facet>
                                <h:outputText value="#{inv.atHand}" />
                            </p:column>                                                   
                        </p:dataTable>
                    </p:fieldset>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
