<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Supplier Report</h1>
                <h:form styleClass="ui-fluid">
                    <p:fieldset legend="FILTER">
                                               
                        <p:commandButton value="Export as Excel" ajax="false">
                            <p:dataExporter type="xls" target="serviceDT" fileName="Services"/>
                        </p:commandButton>
                        <br/><br/>

                        <p:dataTable id="serviceDT" var="supplier" value="#{suppliersReport.allSuppliers}" 
                                     paginator="true"
                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                                     rowsPerPageTemplate="20">

                            <p:column>
                            <f:facet name="header">
                                <h:outputText value="Id" />
                            </f:facet>
                            <h:outputText value="#{supplier.recNum}" />
                        </p:column>                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{supplier.supplierName}" />                             
                        </p:column>                          
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Telephone" />                                    
                            </f:facet>                       
                            <h:outputText value="#{supplier.telephone}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Cellphone" />                                    
                            </f:facet>                       
                            <h:outputText value="#{supplier.cellphone}" />                             
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Email" />                                    
                            </f:facet>                       
                            <h:outputText value="#{supplier.email}" />                             
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Postal Address" />                                    
                            </f:facet>                       
                            <h:outputText value="#{supplier.postalAddress}" />                             
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Physical Address" />                                    
                            </f:facet>                       
                            <h:outputText value="#{supplier.physicalAddress}" />                             
                        </p:column>  
                        </p:dataTable>
                    </p:fieldset>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
