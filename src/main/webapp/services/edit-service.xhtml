<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Edit Service</h1>

                <h:form styleClass="ui-fluid">     
                    <p:messages id="messages" showDetail="true" closable="true" >                        
                        <p:autoUpdate />                        
                    </p:messages>

                    <table cellpadding="10"><td v-align="top">
                            <h:outputText value="Code"/><br></br>
                            <p:inputText id="code" value="#{services.code}" required="true" /><br></br>                            
                            <h:outputText value="Description" /><br></br>
                            <p:inputText id="description" value="#{services.description}"/><br></br>
                            <h:outputText value="Cost"/><br></br>
                            <p:inputText id="cost" value="#{services.cost}" /></td><td v-align="top">                            
                        </td></table>
                    &nbsp;&nbsp;&nbsp;

                    <p:commandButton icon="ui-icon-pencil" value="Save" action="#{services.saveEditService}">
                        
                        
                        <f:param name="recnum" value="#{services.recNum}" />                                                                                                          
                    </p:commandButton>
                </h:form>
                
                <p styleClass="ui-fluid">
                    <p:commandButton value="Delete" icon="ui-icon-circle-minus" onclick="PF('dlgConfirmDelete').show();" title="Delete">
                        
                        
                        <f:param name="recnum" value="#{param['recnum']}" />
                    </p:commandButton>      
                </p>
                
                <h:form id="confirmDelete" styleClass="ui-fluid">                                                  
                    <p:confirmDialog id="dlgConfirmDelete" message="Are you sure you want to delete this service?"
                                 header="Delete Service" severity="alert"
                                 widgetVar="dlgConfirmDelete">
                    <p:commandButton value="Yes Sure" actionListener="#{services.deleteService()}"
                                     oncomplete="PF('dlgConfirmDelete').hide()">
                        
                        
                        <f:param name="recnum" value="#{param['recnum']}" />
                    </p:commandButton>
                    <p:commandButton value="Not Yet" onclick="PF('dlgConfirmDelete').hide();" type="button" />
                </p:confirmDialog>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
