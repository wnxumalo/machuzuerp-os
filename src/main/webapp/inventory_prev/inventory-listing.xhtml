<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Inventory Listing</h1>

                <h:form styleClass="ui-fluid">

                    <p:dataTable id="inventoryDT" var="inv" value="#{inventoryData.inventory}"  selectionMode="single" selection="#{inventoryData.selectedInventory}" rowKey="#{inv.recNum}" paginator="true" rows="10">
                        <p:ajax event="rowSelect" listener="#{inventoryData.onRowSelect}"/>  
                        
                                                
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Code" />
                            </f:facet>                       
                            <h:outputText value="#{inv.code}" />                                
                        </p:column>                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Description" />                                    
                            </f:facet>                       
                            <h:outputText value="#{inv.description}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Supplier" />                                    
                            </f:facet>                       
                            <h:outputText value="#{inv.supplier}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Client" />
                            </f:facet>
                            <h:outputText value="#{inv.client}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Cost" />                                    
                            </f:facet>                       
                            <h:outputText value="#{inv.cost}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Selling Price" />                                    
                            </f:facet>                       
                            <h:outputText value="#{inv.sellingPrice}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Re-order Level" />                                    
                            </f:facet>                       
                            <h:outputText value="#{inv.reorderLevel}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Stock at Hand" />                                    
                            </f:facet>                       
                            <h:outputText value="#{inv.atHand}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Size" />                                    
                            </f:facet>                       
                            <h:outputText value="#{inv.size}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Color" />                                    
                            </f:facet>                       
                            <h:outputText value="#{inv.color}" />                                
                        </p:column>

                    </p:dataTable>
                    
                    <p:ajaxStatus style="display:block;margin-bottom:2em;height:24px;">
                    <f:facet name="default">
                        <h:outputText value="" />
                    </f:facet>

                </p:ajaxStatus>

                <p:ajaxStatus onstart="PF('statusDialog').show()" onsuccess="PF('statusDialog').hide()" />
                <p:dialog widgetVar="statusDialog" modal="true" draggable="false" closable="false" resizable="false" showHeader="false">
                    <img src="../images/ajax-loader.gif" />
                </p:dialog>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
