<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Add Inventory To Project</h1>

                <h:form styleClass="ui-fluid">

                    <p:outputPanel style="font-size:20px;font-family:Tahoma;border-bottom: solid;">
                        <h:outputText value="Id: #{inventory.projectId}"/><br></br>
                        <h:outputText value="Project: #{inventory.projectName}"/><br></br>
                        <h:outputText value="Actual Start: #{inventory.actualStart}"/><br></br>
                        <h:outputText value="Actual End: #{inventory.actualEnd}"/><br></br>
                    </p:outputPanel><br></br>


                    <p:dataTable id="activitiesDT" var="acts" rows="10" paginator="true" value="#{projectActivities.getProjectActivities(session)}" selection="#{projectActivities.selectedProjectActivity}" rowKey="#{acts.recNum}"  widgetVar="cellActs" style="margin-bottom:0;height:100%">
                        <f:facet name="header">
                            Select Activity
                        </f:facet>
                        
                                                    
                        <p:column style="width:15px">
                            <f:facet name="header">
                                <h:outputText value="#"/>
                            </f:facet>
                            <h:outputText value="#{acts.recNum}"/>
                        </p:column>                           
                        <p:column filterBy="#{acts.activityName}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{acts.activityName}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Actual Start" />                                    
                            </f:facet>                       
                            <h:outputText value="#{acts.actualStart}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Actual End" />                                    
                            </f:facet>                       
                            <h:outputText value="#{acts.actualEnd}" />
                        </p:column>                             
                        <p:column style="width:32px;text-align: center">
                            <p:commandButton process="activitiesDT" action="#{inventory.selectInventory(acts.recNum, session)}" icon="ui-icon-check" title="Next">
                                <f:setPropertyActionListener value="#{act}" target="#{activityData.selectedActivity}" />

                                
                                

                                <f:param name="projectName" value="#{inventory.projectName}" />
                                <f:param name="projectId" value="#{inventory.projectId}" />
                                <f:param name="actualStart" value="#{inventory.actualStart}" />
                                <f:param name="actualEnd" value="#{inventory.actualEnd}" />
                            </p:commandButton>
                        </p:column>
                    </p:dataTable>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
