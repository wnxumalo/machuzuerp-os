<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Add Inventory To Project</h1>

                <h:form styleClass="ui-fluid">
                    <p:dataTable id="projectsDT" rows="10" paginator="true" var="projs" value="#{projectData.inventoryProjects}" selection="#{projectData.selectedProject}" rowKey="#{projs.recNum}"  widgetVar="cellProjs" style="margin-bottom:0;height:100%">                                                            
                        <f:facet name="header">
                            Select Project
                        </f:facet>
                        
                                                    
                        <p:column style="width:15px">
                            <f:facet name="header">
                                <h:outputText value="#"/>
                            </f:facet>
                            <h:outputText value="#{projs.recNum}"/>
                        </p:column>                           
                        <p:column filterBy="#{projs.projName}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{projs.projName}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Actual Start" />                                    
                            </f:facet>                       
                            <h:outputText value="#{projs.actualStart}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Actual End" />                                    
                            </f:facet>                       
                            <h:outputText value="#{projs.actualEnd}" />
                        </p:column>                             
                        <p:column style="width:32px;text-align: center">
                            <p:commandButton process="projectsDT" action="#{inventory.selectActivity(projs.recNum, session)}" icon="ui-icon-check" title="Next">
                                <f:setPropertyActionListener value="#{proj}" target="#{projectData.selectedProject}" />
                                
                                
                            </p:commandButton>
                        </p:column>
                    </p:dataTable>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
