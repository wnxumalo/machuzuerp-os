<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Sales Order Listing</h1>

                <h:form>
                    <div align="right">
                        <p:button value="Back To Dashboard" outcome="/accounting/receivable/dashboard">
                            
                            
                        </p:button> &nbsp;&nbsp;                                   
                        <br></br><br></br>
                    </div> 
                </h:form>
                <h:form id="formSO" styleClass="ui-fluid">                   
                    <p:dataTable id="salesOrderDT" var="sorders" value="#{salesOrderData.salesOrders}"  selectionMode="single" selection="#{salesOrderData.selectedSalesOrder}" rowKey="#{sorders.recNum}">
                        <p:ajax event="rowSelect" listener="#{salesOrderData.onRowSelect}"/>  
                        
                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Recnum" />
                            </f:facet>
                            <h:outputText value="#{sorders.recNum}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Date" />
                            </f:facet>                       
                            <h:outputText value="#{sorders.salesOrderDate}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{sorders.CName}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Surname" />                                    
                            </f:facet>                       
                            <h:outputText value="#{sorders.CSurname}" />                                
                        </p:column>
                    </p:dataTable>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
