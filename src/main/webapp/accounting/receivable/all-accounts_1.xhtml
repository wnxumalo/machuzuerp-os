<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Select Account</h1>

                <h:form id="form" styleClass="ui-fluid">

                    <p:dataTable id="accountsDT" var="acc" value="#{accountData.allAccount}" >                            
                        <f:facet name="header">
                            Select Account
                        </f:facet>
                        
                                                    
                        <p:column style="width:15px">
                            <f:facet name="header">
                                <h:outputText value="#"/>
                            </f:facet>
                            <h:outputText value="#{acc.recNum}"/>
                        </p:column>                           
                        <p:column style="width:15px" filterBy="#{acc.description}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Name"/>
                            </f:facet>
                            <h:outputText value="#{acc.description}"/>
                        </p:column>                                                         
                        <p:column style="width:32px;text-align: center">
                            <p:commandButton action="#{accounts.newPayable()}" icon="ui-icon-check" title="Next">                                  
                                
                                
                            </p:commandButton>
                        </p:column>
                    </p:dataTable>

                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
