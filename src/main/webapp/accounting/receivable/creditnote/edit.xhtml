<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Edit Credit Note</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <div align="right">
                        <p:button value="Back To Dashboard" outcome="/accounting/receivable/dashboard">
                            
                            
                        </p:button> &nbsp;&nbsp;                                   
                        <br></br><br></br>
                    </div>
                    
                    <p:messages id="messages" showDetail="true" closable="true">
                        <p:autoUpdate />
                    </p:messages>
                    
                    <p:fieldset legend="Credit Note">                            
                      
                        <h:outputLabel for="outputServices" value="CUSTOMER" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:17px"/><br></br>                            
                        <h:panelGrid columns="2" cellpadding="2">                                 
                            <h:outputLabel for="number" value="#" style="font-weight:bold"/><h:outputText id="cID" value="#{creditNote.cid}"/>    
                            <h:outputLabel for="vatNum" value="VAT Number" style="font-weight:bold;font-size:16px;width:400px"/><h:outputText id="vatNum" value="#{creditNote.vatNumber}" style="font-size:15px;"/>                                                                                                            
                            <h:outputLabel for="name" value="Name" style="font-weight:bold"/><h:outputText id="name" value="#{creditNote.CName}"/>                                    
                            <h:outputLabel for="surname" value="Surname" style="font-weight:bold" /><h:outputText id="surname" value="#{creditNote.CSurname}"/>                                                                   
                            <h:outputLabel for="tel" value="Telephone" style="font-weight:bold" /><h:outputText id="tel" value="#{creditNote.tel}"/>                                    
                            <h:outputLabel for="cell" value="Cellphone" style="font-weight:bold" /><h:outputText id="cell" value="#{creditNote.cell}"/>                                   
                            <h:outputLabel for="fax" value="Fax" style="font-weight:bold" /><h:outputText id="fax" value="#{creditNote.fax}"/>                                   
                            <h:outputLabel for="email" value="Email" style="font-weight:bold" /><h:outputText id="email" value="#{creditNote.email}"/>                                   
                            <h:outputLabel for="posAdd" value="Postal Address" style="font-weight:bold" /><h:outputText id="posAdd" value="#{creditNote.posAdd}"/>                                  
                            <h:outputLabel for="physAdd" value="Physical Address" style="font-weight:bold" /><h:outputText id="physAdd" value="#{creditNote.physAdd}"/>
                        </h:panelGrid><br></br>                                              
                        
                        <h:panelGrid columns="2" cellpadding="2" style="width:1400px;">   
                            <h:outputText value="Credit Note Id" style="color:#D98880;font-weight:bold;width:1300px"/>
                            <h:outputText value="#{creditNote.recNum}" style="display:block;color:#D98880;font-weight:bold;"/>                                 
                            <h:outputText value="Invoice Number" style="color:#D98880;font-weight:bold;width:1300px"/>
                            <h:outputText value="#{creditNote.invId}" style="display:block;color:#D98880;font-weight:bold;"/>                                                  
                            <h:outputLabel for="total" value="Total" style="font-weight:bold" />
                            <h:outputText id="total" value="#{creditNote.total}"/>
                            <h:outputLabel for="outstanding" value="Outstanding" style="font-weight:bold" />
                            <h:outputText id="outstanding" value="#{creditNote.outstanding}"/>
                            <h:outputLabel value="Credit Note Date" style="color:#D98880;font-weight:bold;width:1300px"/>
                            <p:calendar id="invDate" value="#{creditNote.date}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />                            
                            <h:outputText value="Amount" style="width:741px;font-weight:bold;"/>
                            <p:inputNumber id="amt" value="#{creditNote.amount}"/>
                            <h:outputText value="Note" style="width:741px;font-weight:bold;"/>
                            <p:inputTextarea cols="100" id="notes" value="#{creditNote.notes}"/>
                        </h:panelGrid><br></br>

                        <p:commandButton action="#{creditNote.creditNoteEditComplete()}" value="Save" >
                            
                            
                            <f:param name="invId" value="#{creditNote.invId}" />
                            <f:param name="cid" value="#{creditNote.cid}" />
                            <f:param name="cName" value="#{creditNote.CName}" />
                            <f:param name="cSurname" value="#{creditNote.CSurname}" />
                            <f:param name="tel" value="#{creditNote.tel}" />
                            <f:param name="cell" value="#{creditNote.cell}" />
                            <f:param name="fax" value="#{creditNote.fax}" />
                            <f:param name="email" value="#{creditNote.email}" />
                            <f:param name="posAdd" value="#{creditNote.posAdd}" />
                            <f:param name="physAdd" value="#{creditNote.physAdd}" /> 
                            <f:param name="vatNum" value="#{creditNote.vatNumber}" />
                            <f:param name="invoicenum" value="#{creditNote.recNum}" />
                            <f:param name="notes" value="#{creditNote.notes}" />
                            <f:param name="total" value="#{creditNote.total}" />
                            <f:param name="outstanding" value="#{creditNote.outstanding}" />
                        </p:commandButton>


                    </p:fieldset>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
