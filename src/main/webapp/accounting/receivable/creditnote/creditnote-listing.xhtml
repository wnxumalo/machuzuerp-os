<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Credit Note Listing</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <div align="right">
                        <p:button value="Back To Dashboard" outcome="/accounting/receivable/dashboard">
                            
                            
                        </p:button> &nbsp;&nbsp;                                   
                        <br></br><br></br>
                    </div>                   
                    <p:dataTable id="creditnotesDT" var="creditnotes" value="#{creditNote.creditNotes}"  selectionMode="single" selection="#{creditNote.selectedCreditNote}" rowKey="#{creditnotes.recNum}">
                        <p:ajax event="rowSelect" listener="#{creditNote.onRowSelectMain}"/>
                        
                        
                        <f:param name="mod" value="CR" />
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Id" />
                            </f:facet>
                            <h:outputText value="#{creditnotes.recNum}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Invoice Id" />
                            </f:facet>
                            <h:outputText value="#{creditnotes.invId}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Date" />
                            </f:facet>                       
                            <h:outputText value="#{creditnotes.date}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{creditnotes.CName}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Surname" />                                    
                            </f:facet>                       
                            <h:outputText value="#{creditnotes.CSurname}" />                                
                        </p:column> 
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Total" />                                    
                            </f:facet>                       
                            <h:outputText value="#{creditnotes.amount}" />                                
                        </p:column>
                    </p:dataTable>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
