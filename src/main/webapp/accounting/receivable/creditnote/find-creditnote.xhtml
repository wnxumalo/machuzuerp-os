<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Find Invoice</h1>

                <h:form id="form" styleClass="ui-fluid">

                    <h:outputText value="From" style="width:741px;font-weight:bold;"/>
                    <p:calendar id="from" value="#{creditNote.DFrom}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                    <h:outputText value="To" style="width:741px;font-weight:bold;"/>
                    <p:calendar id="to" value="#{creditNote.DTo}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                    &nbsp;&nbsp;&nbsp;
                    <p:commandButton value="Credit Note" icon="ui-icon-search" action="#{creditNote.searchInvoiceCreditNote()}">
                        
                        
                    </p:commandButton>

                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
