<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Receipt Preview</h1>
                
                <h:form styleClass="ui-fluid">
                    <div align="right">
                        <p:button value="Back To Dashboard" outcome="/customers/customer-detailed-list"/> &nbsp;&nbsp;                                   
                        <br></br><br></br>
                    </div>

                    <p:dataTable id="receiptDT" var="rcpts" value="#{receiptData.receipts}"  selectionMode="single" selection="#{receiptData.selectedReceipt}" rowKey="#{rcpts.recNum}">
                            <p:ajax event="rowSelect" listener="#{receiptData.onRowSelect}"/>  
                            
                            
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Recnum" />
                                </f:facet>
                                <h:outputText value="#{rcpts.recNum}" />
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Date" />
                                </f:facet>                       
                                <h:outputText value="#{rcpts.IDate}" />                                
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Name" />                                    
                                </f:facet>                       
                                <h:outputText value="#{rcpts.CName}" />                             
                            </p:column>  
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Surname" />                                    
                                </f:facet>                       
                                <h:outputText value="#{rcpts.CSurname}" />                                
                            </p:column>                                                  
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Total" />                                    
                                </f:facet>                       
                                <h:outputText value="#{rcpts.totCost}" />                                
                            </p:column>   
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Paid" />                                    
                                </f:facet>                       
                                <h:outputText value="#{rcpts.amtPaid}" />                                
                            </p:column>   
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Outstanding" />                                    
                                </f:facet>                       
                                <h:outputText value="#{rcpts.outstandingAmount}" />                                
                            </p:column>   
                        </p:dataTable>
                    
                    </h:form>
                
            </ui:define>

        </ui:composition>

    </body>
</html>
