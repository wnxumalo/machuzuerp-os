<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Receipt Listing</h1>

                <h:form id="form" styleClass="ui-fluid">

                    <p:dataTable id="receiptDT" var="receipts" value="#{receiptData.receipts}"  selectionMode="single" selection="#{receiptData.selectedReceipt}" rowKey="#{receipts.recNum}">
                        <p:ajax event="rowSelect" listener="#{receiptData.onRowSelect}"/>  
                        
                        
                        <f:param name="func" value="view" />
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Recnum" />
                            </f:facet>
                            <h:outputText value="#{receipts.recNum}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Date" />
                            </f:facet>                       
                            <h:outputText value="#{receipts.IDate}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{receipts.CName}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Surname" />                                    
                            </f:facet>                       
                            <h:outputText value="#{receipts.CSurname}" />                                
                        </p:column>                                                  
                    </p:dataTable>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
