<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Find Receipt</h1>

                <p:messages id="messages" showDetail="true" closable="true" />
                <h:form id="form" styleClass="ui-fluid">                    
                    <table cellpadding="10"><td v-align="top">                            
                            <h:outputText value="Name" /><br></br>
                            <p:inputText value="#{receiptData.CName}"/><br></br>
                            <h:outputText value="Surname" /><br></br>
                            <p:inputText value="#{receiptData.CSurname}" /><br></br>
                            <h:outputText value="Date - From" /><br></br>
                            <p:calendar id="DateFrom" value="#{receiptData.DFrom}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" /> <br></br>                                       
                            <h:outputText value="Date - To" /><br></br>
                            <p:calendar id="DateTo" value="#{receiptData.DTo}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />                                        
                        </td></table>
                    &nbsp;&nbsp;&nbsp;
                    <p:commandButton value="Search" action="#{receiptData.searchReceipt()}">
                        
                        
                    </p:commandButton>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
