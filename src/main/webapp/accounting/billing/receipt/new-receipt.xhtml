<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Receipt</h1>                    
                <p:messages id="messages" showDetail="true" closable="true" />
                    <h:form id="frmNewAccount" styleClass="ui-fluid">                        
                        <h:panelGrid columns="2" cellpadding="2">
                            <h:outputLabel value="Invoice #"/>
                            <h:outputText value="#{invoiceData.recNum}" />
                            <h:outputLabel value="Date"/>
                            <h:outputText value="#{invoiceData.IDate}" />
                            <h:outputLabel value="Customer"/>
                            <h:outputText value="#{invoiceData.CName} #{invoiceData.CSurname}" />
                            <h:outputLabel value=""/>
                            <h:outputLabel value=""/>
                            <h:outputLabel value="Amount Due"/>
                            <h:outputText value="#{invoiceData.outstanding}" style="font-weight: bold"/>
                            <h:outputLabel value="Amount Paid"/>                        
                            <p:inputText id="payment" value="#{invoiceData.payment}" />
                            <h:outputText value="Date" />
                            <p:calendar id="PaymentDate" value="#{invoiceData.paymentDate}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />                                    
                            &nbsp;&nbsp;&nbsp;
                        </h:panelGrid>                        
                        <p:commandButton value="Save" action="#{invoiceData.updatePayment()}">
                            
                            
                        </p:commandButton>
                    </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
