<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Receipt Preview</h1>

                <p:growl id="growl">
                    <p:autoUpdate/>
                </p:growl>

                <h:form id="mainForm" styleClass="ui-fluid">

                    <p:outputPanel id="opReceipt">

                        <p:commandButton value="Return Goods" action="#{inventoryController.returnGoods(receiptData.receiptItems, receiptData.recNum)}" update="growl"/>
                        <p:commandButton value="Print" type="button" icon="ui-icon-print" style="display:block;margin-bottom: 20px">
                            <p:printer target="fsReceipt" />
                        </p:commandButton> 

                        <div align="right">
                            <p:button value="Back To Dashboard" outcome="/accounting/receivable/dashboard">
                            </p:button> &nbsp;&nbsp;                                   
                            <br></br><br></br>
                        </div>

                        <p:fieldset id="fsReceipt" legend="RECEIPT" style="font-size:20px;">

                            <h:outputText value="THESE RECEIPT HAS BEEN CANCELLED AND THE GOODS RETURNED TO INVENTORY" style="font-size:30px;color:red;" rendered="#{receiptData.goodsReturned}"/><br></br>
                            
                            <p:outputPanel style="font-size:20px;font-family:Tahoma;border-bottom: solid;">                                        
                                <h:outputText value="#{receiptData.orgName}" style="font-size:30px;"/><br></br>
                                <h:outputText value="VAT NUMBER: #{receiptData.orgNumber}"/><br></br><br></br>
                                <h:outputText value="#{receiptData.orgTel}"/><br></br>
                                <h:outputText value="#{receiptData.orgFax}"/><br></br>
                                <h:outputText value="#{receiptData.orgEmail}"/><br></br>
                                <h:outputText value="#{receiptData.orgPosAdd}"/><br></br>
                                <h:outputText value="#{receiptData.orgPhysAdd}"/><br></br>                                        
                            </p:outputPanel><br></br>

                            <h:panelGrid columns="2" cellpadding="2" style="width:100%;">  
                                <h:outputText value="Receipt Number" style="font-weight:bold;font-size:17px"/>
                                <h:outputText value="#{receiptData.recNum}"/>                                        
                                <h:outputText value="Invoice Number" style="font-weight:bold;font-size:17px"/>
                                <h:outputText value="#{receiptData.invCheck}"/>                                        
                                <h:outputText value="Date" style="font-weight:bold;font-size:17px"/>
                                <h:outputText value="#{receiptData.IDate}"/>
                                <h:outputText value="Recurring" style="font-weight:bold;font-size:17px"/>
                                <h:outputText value="#{receiptData.recurring}"/>
                            </h:panelGrid><br></br>

                            <h:outputLabel value="Stakeholder Details " style="color:#999999;font-weight:bold;font-family:Calibri;font-size:25px"/><br></br>
                            <h:panelGrid columns="2" cellpadding="2">   
                                <h:outputLabel for="cID" value="#" style="font-weight:bold;font-size:16px;width:400px"/><h:outputText id="cID" value="#{receiptData.cid}" style="font-size:15px;"/>                                    
                                <h:outputLabel for="vatNum" value="VAT #" style="font-weight:bold"/><h:outputText id="vatNum" value="#{receiptData.cid}" style="font-size:15px;"/>                                    
                                <h:outputLabel for="name" value="Name" style="font-weight:bold;font-size:16px"/><h:outputText id="name" value="#{receiptData.CName}" style="font-size:15px;"/>                                    
                                <h:outputLabel for="surname" value="Surname" style="font-weight:bold;font-size:16px" /><h:outputText id="surname" value="#{receiptData.CSurname}" style="font-size:15px;"/>                                                                   
                                <h:outputLabel for="tel" value="Telephone" style="font-weight:bold;font-size:16px" /><h:outputText id="tel" value="#{receiptData.tel}" style="font-size:15px;"/>                                    
                                <h:outputLabel for="cell" value="Cellphone" style="font-weight:bold;font-size:16px" /><h:outputText id="cell" value="#{receiptData.cell}" style="font-size:15px;"/>                                   
                                <h:outputLabel for="fax" value="Fax" style="font-weight:bold;font-size:16px" /><h:outputText id="fax" value="#{receiptData.fax}" style="font-size:15px;"/>                                   
                                <h:outputLabel for="email" value="Email" style="font-weight:bold"/><h:outputText id="email" value="#{receipt.email}"/>                                    
                                <h:outputLabel for="posAdd" value="Postal Address" style="font-weight:bold;font-size:16px" /><h:outputText id="posAdd" value="#{receiptData.posAdd}" style="font-size:15px;"/>                                  
                                <h:outputLabel for="physAdd" value="Physical Address" style="font-weight:bold;font-size:16px" /><h:outputText id="physAdd" value="#{receiptData.physAdd}" style="font-size:15px;"/>
                            </h:panelGrid><br></br>

                            <p:outputPanel id="outputReceiptData">
                                <ui:repeat value="#{receiptData.receiptItems}" var="invs">
                                    <h:panelGrid columns="5" cellpadding="2">
                                        <h:outputText value="#{invs.servId}" style="display:block;width:50px"/>
                                        <h:outputText value="#{invs.description}" style="display:block;width:300px"/>                                        
                                        <h:outputText value="#{invs.price}" style="display:block;width:50px"/>
                                        <h:outputText value="#{invs.quantity}" style="display:block;width:100px"/>
                                        <h:outputText value="#{invs.amount}" style="display:block;width:100px"/>
                                    </h:panelGrid>
                                </ui:repeat>                               
                            </p:outputPanel><br></br>

                            <h:panelGrid columns="2" cellpadding="2" style="width:1360px;">                               
                                <h:outputText value="Total" style="color:#D98880;font-weight:bold;width:1300px"/>
                                <h:outputText value="#{receiptData.total}" style="display:block;color:#D98880;font-weight:bold;"/>                          
                                <h:outputText value="VAT" style="color:#D98880;font-weight:bold;width:1300px"/>
                                <h:outputText value="#{receiptData.taxAmount}" style="display:block;color:#D98880;font-weight:bold;"/>                          
                                <h:outputText value="Grand Total" style="color:#D98880;font-weight:bold;width:1300px"/>
                                <h:outputText value="#{receiptData.totCost}" style="display:block;color:#D98880;font-weight:bold;"/>                          

                                <h:outputText value="Received" style="color:#D98880;font-weight:bold;width:1300px"/>
                                <h:outputText value="#{receiptData.amtPaid}" style="display:block;color:#D98880;font-weight:bold;"/>  
                                <h:outputText value="Outstanding" style="color:#D98880;font-weight:bold;width:1300px"/>
                                <h:outputText value="#{receiptData.outstandingAmount}" style="display:block;color:#D98880;font-weight:bold;"/>  
                                <h:outputText value="Change" style="color:#D98880;font-weight:bold;width:1300px"/>
                                <h:outputText value="#{receiptData.change}" style="display:block;color:#D98880;font-weight:bold;"/>  
                            </h:panelGrid><br></br>   

                        </p:fieldset>

                    </p:outputPanel>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
