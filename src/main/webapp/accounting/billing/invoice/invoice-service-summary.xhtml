<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Invoice - Summary</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <p:button value="Back To Dashboard" outcome="#{login.accountingDashboard()}"/>                            
                    <br></br><br></br>
                    <p:fieldset legend="Invoice">                            
                        <p:messages id="messages" showDetail="true" closable="true" >
                            <p:autoUpdate/>
                        </p:messages>
                        <h:outputLabel for="outputServices" value="CUSTOMER" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:17px"/><br></br>                            
                        <h:panelGrid columns="2" cellpadding="2">      
                            <h:outputLabel for="vatNum" value="VAT Number" style="font-weight:bold;font-size:16px;width:400px"/><h:outputText id="vatNum" value="#{enrolledServices.vatNum}" style="font-size:15px;"/>                                                                            
                            <h:outputLabel for="name" value="Name" style="font-weight:bold"/><h:outputText id="name" value="#{enrolledServices.customerName}"/>                                    
                            <h:outputLabel for="surname" value="Surname" style="font-weight:bold" /><h:outputText id="surname" value="#{enrolledServices.surname}"/>                                                                   
                            <h:outputLabel for="tel" value="Telephone" style="font-weight:bold" /><h:outputText id="tel" value="#{enrolledServices.telephone}"/>                                    
                            <h:outputLabel for="cell" value="Cellphone" style="font-weight:bold" /><h:outputText id="cell" value="#{enrolledServices.cellphone}"/>                                   
                            <h:outputLabel for="fax" value="Fax" style="font-weight:bold" /><h:outputText id="fax" value="#{enrolledServices.fax}"/>                                   
                            <h:outputLabel for="email" value="Email" style="font-weight:bold" /><h:outputText id="email" value="#{enrolledServices.email}"/>                                   
                            <h:outputLabel for="posAdd" value="Postal Address" style="font-weight:bold" /><h:outputText id="posAdd" value="#{enrolledServices.postalAddress}"/>                                  
                            <h:outputLabel for="physAdd" value="Physical Address" style="font-weight:bold" /><h:outputText id="physAdd" value="#{enrolledServices.physicalAddress}"/>
                        </h:panelGrid><br></br>
                        <h:outputLabel for="outputServices" value="SERVICES" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:17px"/><br></br>                            
                        <p:outputPanel id="outputServices">
                            <ui:repeat value="#{enrolledServices.services}" var="svs">
                                <h:panelGrid columns="5" cellpadding="2">
                                    <h:outputText value="#{svs.recNum}" style="display:block;width:50px"/>
                                    <h:outputText value="#{svs.description}" style="display:block;width:300px"/>
                                    <h:outputText value="1" style="display:block;width:50px"/>
                                    <h:outputText value="#{svs.cost}" style="display:block;width:100px"/>                                        
                                    <h:outputText value="#{svs.cost}" style="display:block;width:100px"/>                                        
                                </h:panelGrid>
                            </ui:repeat>
                        </p:outputPanel><br></br>
                        <!--h:panelGrid columns="2" cellpadding="2" style="width:1315px;">
                            <h:outputText value="Total" style="width:1020px;color:#D98880;font-weight:bold;"/>
                            <h:outputText value="#{invoice.totServCost}" style="display:block;color:#D98880;"/>                          
                        </h:panelGrid><br></br-->
                        <h:outputLabel for="outputInventory" value="INVENTORY" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:17px"/><br></br>                            
                        <p:outputPanel id="outputInventory">
                            <ui:repeat value="#{invoice.selectedInvs}" var="invs">
                                <h:panelGrid columns="5" cellpadding="2">
                                    <h:outputText value="#{invs.recNum}" style="display:block;width:50px"/>
                                    <h:outputText value="#{invs.description}" style="display:block;width:300px"/>                                        
                                    <h:outputText value="#{invs.quantity}" style="display:block;width:50px"/>
                                    <h:outputText value="#{invs.sellingPrice}" style="display:block;width:100px"/>
                                    <h:outputText value="#{invs.totCost}" style="display:block;width:100px"/>
                                </h:panelGrid>
                            </ui:repeat>
                        </p:outputPanel><br></br>
                        <!--h:panelGrid columns="2" cellpadding="2" style="width:1215px;">
                            <h:outputText value="Total" style="color:#D98880;font-weight:bold;width:1020px;"/>
                            <h:outputText value="#{invoice.totInvCost}" style="display:block;color:#D98880;"/>
                        </h:panelGrid><br></br-->
                        <h:panelGrid columns="2" cellpadding="2" style="width:1400px;">                               
                            <h:outputText value="Total" style="color:#D98880;font-weight:bold;width:1300px"/>
                            <h:outputText value="#{invoice.totCost}" style="display:block;color:#D98880;font-weight:bold;"/>                          
                        </h:panelGrid><br></br>                            
                        <h:outputLabel value="FINALISE" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:17px"/><br></br>                            

                        <h:panelGrid columns="2" cellpadding="2" style="width:741px;">                               
                            <h:outputText value="Recurring" style="width:741px;font-weight:bold;"/>
                            <p:selectBooleanCheckbox value="#{invoice.recurring}"/>                            
                            <h:outputText value="Date" style="width:741px;font-weight:bold;"/>
                            <p:calendar id="invDate" value="#{invoice.IDate}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" >                              
                            </p:calendar>
                        </h:panelGrid><br></br>

                        <p:commandButton action="#{invoice.invServiceComplete(enrolledServices.services,invoice.selectedInvs, enrolledServices)}" value="Save" >                           
                            <f:param name="cID" value="#{customerData.vatNum}" />
                            <f:param name="cName" value="#{customerData.customerName}" />
                            <f:param name="cSurname" value="#{customerData.surname}" />
                            <f:param name="tel" value="#{customerData.telephone}" />
                            <f:param name="cell" value="#{customerData.cellphone}" />
                            <f:param name="fax" value="#{customerData.fax}" />
                            <f:param name="email" value="#{customerData.email}" />
                            <f:param name="posAdd" value="#{customerData.postalAddress}" />
                            <f:param name="physAdd" value="#{customerData.physicalAddress}" />                                    
                            <f:param name="vatNum" value="#{customerData.vatNum}" />  
                        </p:commandButton>


                    </p:fieldset>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
