<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Find Invoice</h1>

                <h:form id="form" styleClass="ui-fluid">
                     <p:messages id="messages"  closable="true"/>
                    <h:panelGrid columns="2" cellpadding="1">
                        <p:outputLabel for="name" value="Name" />
                        <p:inputText id="name" value="#{invoiceData.CName}" required="true"/>
                        <p:outputLabel for="surname" value="Surname" />
                        <p:inputText id="surname" value="#{invoiceData.CSurname}"/>
                        <p:outputLabel for="dateFrom" value="Date - From" />
                        <p:calendar id="dateFrom" value="#{invoiceData.DFrom}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                        <p:outputLabel for="dateTo" value="Date - To" />
                        <p:calendar id="dateTo" value="#{invoiceData.DTo}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />                                                                                                                
                        <p:commandButton value="Clear">                           
                            <p:ajax update="form" resetValues="true" />
                        </p:commandButton>
                        <p:commandButton value="Search" action="#{invoiceData.searchInvoice()}">                           
                        </p:commandButton>
                    </h:panelGrid>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
