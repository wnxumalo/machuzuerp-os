<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Invoice - Saved</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <p:commandButton value="Print" type="button" icon="ui-icon-print" style="display:block;margin-bottom: 20px">
                        <p:printer target="fsInvoice" />
                    </p:commandButton> 

                    <div align="right">
                        <p:button value="Back To Dashboard" outcome="/accounting/receivable/dashboard"/>                           
                        &nbsp;&nbsp;                                   
                        <br></br><br></br>
                    </div>

                    <p:fieldset id="fsInvoice" legend="TAX INVOICE" style="font-size:20px;">
                        <div align="left">

                        <p:outputPanel style="font-size:20px;font-family:Tahoma;border-bottom: solid;">                                        
                            <h:outputText value="#{invoice.orgName}" style="font-size:30px;"/><br></br>
                            <h:outputText value="VAT NUMBER: #{invoice.orgNumber}"/><br></br><br></br>
                            <h:outputText value="#{invoice.orgTel}"/><br></br>
                            <h:outputText value="#{invoice.orgFax}"/><br></br>
                            <h:outputText value="#{invoice.orgEmail}"/><br></br>
                            <h:outputText value="#{invoice.orgPosAdd}"/><br></br>
                            <h:outputText value="#{invoice.orgPhysAdd}"/><br></br>                                        
                        </p:outputPanel><br></br>

                        <h:panelGrid columns="2" cellpadding="2" style="width:100%;">  
                            <h:outputText value="Invoice Number" style="font-weight:bold;font-size:17px"/>
                            <h:outputText value="#{invoice.recNum}"/>
                            <h:outputText value="Quotation Number" style="font-weight:bold;font-size:17px"/>
                            <h:outputText value="#{invoice.quoteId}"/>
                            <h:outputText value="Order Number" style="font-weight:bold;font-size:17px"/>
                            <h:outputText value="#{invoice.orderNumber}"/>
                            <h:outputText value="Date" style="font-weight:bold;font-size:17px"/>
                            <h:outputText value="#{invoice.invDate}"/>
                            <h:outputText value="Recurring" style="font-weight:bold;font-size:17px"/>
                            <h:outputText value="#{invoice.recurring}"/>
                        </h:panelGrid><br></br>

                        <h:outputLabel value="Stakeholder Details " style="color:#999999;font-weight:bold;font-family:Calibri;font-size:25px"/><br></br>
                        <h:panelGrid columns="2" cellpadding="2">                                           
                            <h:outputLabel for="cID" value="#" style="font-weight:bold"/><h:outputText id="cID" value="#{customerData.selectedCustomer.recnum}"/>                                    
                            <h:outputLabel for="vatNum" value="VAT Number" style="font-weight:bold;font-size:16px;width:400px"/><h:outputText id="vatNum" value="#{customerData.selectedCustomer.vatNum}" style="font-size:15px;"/>                                                                            
                            <h:outputLabel for="name" value="Name" style="font-weight:bold"/><h:outputText id="name" value="#{customerData.selectedCustomer.customerName}"/>                                    
                            <h:outputLabel for="surname" value="Surname" style="font-weight:bold" /><h:outputText id="surname" value="#{customerData.selectedCustomer.surname}"/>                                                                   
                            <h:outputLabel for="tel" value="Telephone" style="font-weight:bold" /><h:outputText id="tel" value="#{customerData.selectedCustomer.telephone}"/>                                    
                            <h:outputLabel for="cell" value="Cellphone" style="font-weight:bold" /><h:outputText id="cell" value="#{customerData.selectedCustomer.cellphone}"/>                                   
                            <h:outputLabel for="fax" value="Fax" style="font-weight:bold" /><h:outputText id="fax" value="#{customerData.selectedCustomer.fax}"/>                                   
                            <h:outputLabel for="email" value="Email" style="font-weight:bold" /><h:outputText id="email" value="#{customerData.selectedCustomer.email}"/>                                   
                            <h:outputLabel for="posAdd" value="Postal Address" style="font-weight:bold" /><h:outputText id="posAdd" value="#{customerData.selectedCustomer.postalAddress}"/>                                  
                            <h:outputLabel for="physAdd" value="Physical Address" style="font-weight:bold" /><h:outputText id="physAdd" value="#{customerData.selectedCustomer.physicalAddress}"/>
                        </h:panelGrid><br></br>
                        <h:outputLabel for="outputServices" value="" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:17px"/><br></br>                            
                        <p:outputPanel id="outputServices">
                            <table width="100%" align="center">
                                <th>#</th><th>Description</th><th>Qty</th><th>Price</th><th>Amount</th>
                                <ui:repeat value="#{invoice.selectedServs}" var="svs">                                   
                                    <tr align="center">
                                        <td><h:outputText value="#{svs.recNum}" style="display:block;width:50px"/></td>
                                        <td><h:outputText value="#{svs.description}" style="display:block;width:100%"/></td>
                                        <td><h:outputText value="#{svs.qty}" style="display:block;width:50px"/></td>
                                        <td><h:outputText value="#{svs.cost}" style="display:block;width:100px"/></td>
                                        <td><h:outputText value="#{svs.totCost}" style="display:block;width:100px"/></td>
                                    </tr>
                                </ui:repeat> 

                                <ui:repeat value="#{invoice.selectedInvs}" var="invs">
                                    <tr align="center">
                                        <td><h:outputText value="#{invs.recNum}" style="display:block;width:50px"/></td>
                                        <td><h:outputText value="#{invs.description}" style="display:block;width:100%"/></td>
                                        <td><h:outputText value="#{invs.quantity}" style="display:block;width:50px"/></td>
                                        <td><h:outputText value="#{invs.sellingPrice}" style="display:block;width:100px"/></td>
                                        <td><h:outputText value="#{invs.totCost}" style="display:block;width:100px"/></td>
                                    </tr>
                                </ui:repeat>
                            </table>
                        </p:outputPanel><br></br>                            
                        <h:panelGrid columns="2" cellpadding="2" style="width:10%;">                               
                            <h:outputText value="Total" style="color:#D98880;font-weight:bold"/>
                            <h:outputText value="#{invoice.totCost}" style="display:block;color:#D98880;font-weight:bold;"/>                          
                        </h:panelGrid><br></br>        
                        <p><h:outputText value="Notes" style="font-weight:bold;font-size:17px"/><br></br><h:outputText value="#{invoice.notes}"/></p>
                        
                        </div>
                    </p:fieldset>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
