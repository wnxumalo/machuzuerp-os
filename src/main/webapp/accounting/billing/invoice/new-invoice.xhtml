<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Invoice</h1>
                
                <p:messages id="messages" showDetail="true" closable="true" >
                            <p:autoUpdate/>
                        </p:messages>

                <h:form id="form" styleClass="ui-fluid">
                    <p:commandButton icon="ui-icon-circle-plus" action="#{invoice.newInvoice}" title="New Invoice"/>                     
                    <p:commandButton icon="ui-icon-search" action="#{invoice.findInvoice}" title="Search Invoice"/>                                               
                    </h:form>

                    <h:form id="frmNewAccount" styleClass="ui-fluid">
                        <h:outputText value="Type" /><br></br>
                        <p:multiSelectListbox value="#{accounts.accountType}" style="width:100%">
                            <f:selectItems value="#{accounts.categories}" />
                        </p:multiSelectListbox>
                        <h:outputText value="Number" /><br></br>
                        <p:inputText id="number" value="#{accounts.accountNumber}" /><br></br>
                        <h:outputText value="Description" /><br></br>
                        <p:inputText id="description" value="#{accounts.description}" /><br></br>
                        <h:outputText value="Opening Balance" /><br></br>
                        <p:inputText id="balance" value="#{accounts.balance}" /><br></br>
                        <h:outputText value="Comments" /><br></br>
                        <p:inputText id="comments" value="#{accounts.comments}" /><br></br>
                        &nbsp;&nbsp;&nbsp;
                        <p:commandButton value="Save" action="#{accounts.saveAccount()}"/>                           
                    </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
