<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Invoice - Summary</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <div align="right">
                        <p:button value="Back To Dashboard" outcome="/accounting/receivable/dashboard"/>
                        &nbsp;&nbsp;                                   
                        <br></br><br></br>
                    </div>
                    <p:fieldset legend="Invoice">                            
                        <p:messages id="messages" showDetail="true" closable="true" >
                            <p:autoUpdate />
                        </p:messages>

                        <div align="left">
                            <h:panelGrid columns="2">
                                <h:outputText value="Quote Number" style="font-weight:bold;"/>
                                <h:outputText value="#{invoice.quoteId}"/>
                            </h:panelGrid>
                        </div>            
                        
                        <h:outputLabel for="outputServices" value="CUSTOMER" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:17px"/><br></br>                            
                        <h:panelGrid columns="2" cellpadding="2">                                 
                            <h:outputLabel for="number" value="#" style="font-weight:bold"/><h:outputText id="cID" value="#{invoice.CID}"/>    
                            <h:outputLabel for="vatNum" value="VAT Number" style="font-weight:bold;"/><h:outputText id="vatNum" value="#{invoice.vatNum}" style="font-size:15px;"/>                                                                                                            
                            <h:outputLabel for="name" value="Name" style="font-weight:bold"/><h:outputText id="name" value="#{invoice.CName}"/>                                    
                            <h:outputLabel for="surname" value="Surname" style="font-weight:bold" /><h:outputText id="surname" value="#{invoice.CSurname}"/>                                                                   
                            <h:outputLabel for="tel" value="Telephone" style="font-weight:bold" /><h:outputText id="tel" value="#{invoice.tel}"/>                                    
                            <h:outputLabel for="cell" value="Cellphone" style="font-weight:bold" /><h:outputText id="cell" value="#{invoice.cell}"/>                                   
                            <h:outputLabel for="fax" value="Fax" style="font-weight:bold" /><h:outputText id="fax" value="#{invoice.fax}"/>                                   
                            <h:outputLabel for="email" value="Email" style="font-weight:bold" /><h:outputText id="email" value="#{invoice.email}"/>                                   
                            <h:outputLabel for="posAdd" value="Postal Address" style="font-weight:bold" /><h:outputText id="posAdd" value="#{invoice.posAdd}"/>                                  
                            <h:outputLabel for="physAdd" value="Physical Address" style="font-weight:bold" /><h:outputText id="physAdd" value="#{invoice.physAdd}"/>
                        </h:panelGrid><br></br>
                        <h:outputLabel for="outputServices" value="" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:17px"/><br></br>                            
                        <p:outputPanel id="outputServices">
                            <ui:repeat value="#{invoice.selectedServs}" var="svs">
                                <h:panelGrid columns="5" cellpadding="2">
                                    <h:outputText value="#{svs.recNum}" style="display:block;width:50px"/>
                                    <h:outputText value="#{svs.description}" style="display:block;width:300px"/>
                                    <h:outputText value="#{svs.qty}" style="display:block;width:50px"/>
                                    <h:outputText value="#{svs.cost}" style="display:block;width:100px"/>                                        
                                    <h:outputText value="#{svs.totCost}" style="display:block;width:100px"/>                                        
                                </h:panelGrid>
                            </ui:repeat>
                        </p:outputPanel><br></br>
                        <h:outputLabel for="outputInventory" value="" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:17px"/><br></br>                            
                        <p:outputPanel id="outputInventory">
                            <ui:repeat value="#{invoice.selectedInvs}" var="invs">
                                <h:panelGrid columns="5" cellpadding="2">
                                    <h:outputText value="#{invs.recNum}" style="display:block;width:50px"/>
                                    <h:outputText value="#{invs.description}" style="display:block;width:300px"/>                                        
                                    <h:outputText value="#{invs.quantity}" style="display:block;width:50px"/>
                                    <h:outputText value="#{invs.sellingPrice}" style="display:block;width:100px"/>
                                    <h:outputText value="#{invs.totCost}" style="display:block;width:100px"/>
                                </h:panelGrid>
                            </ui:repeat>
                        </p:outputPanel><br></br>                      
                        <h:panelGrid columns="2" cellpadding="2" style="width:1400px;">                               
                            <h:outputText value="Total" style="color:#D98880;font-weight:bold;width:1300px"/>
                            <h:outputText value="#{invoice.totCost}" style="display:block;color:#D98880;font-weight:bold;"/>                          
                        </h:panelGrid><br></br>                            
                        <h:outputLabel value="FINALISE" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:17px"/><br></br>                            

                        <h:panelGrid columns="2" cellpadding="2" style="width:741px;">                               
                            <h:outputText value="Recurring" style="width:741px;font-weight:bold;"/>
                            <p:selectBooleanCheckbox value="#{invoice.recurring}"/>
                            <h:outputText value="Order Number" style="width:741px;font-weight:bold;"/>
                            <p:inputText id="orderNumber" value="#{invoice.orderNumber}" />
                            <h:outputText value="Date" style="width:741px;font-weight:bold;"/>
                            <p:calendar id="invDate" value="#{invoice.IDate}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" >
                            </p:calendar>
                            <h:outputText value="Notes" style="width:741px;font-weight:bold;"/>
                            <p:inputTextarea cols="100" id="notes" value="#{invoice.notes}"/><br></br>
                        </h:panelGrid><br></br>

                        <p:commandButton action="#{invoice.invComplete(invoice.selectedServs,invoice.selectedInvs)}" value="Save" >                            
                            <f:param name="cID" value="#{invoice.CID}" />
                            <f:param name="cName" value="#{invoice.CName}" />
                            <f:param name="cSurname" value="#{invoice.CSurname}" />
                            <f:param name="tel" value="#{invoice.tel}" />
                            <f:param name="cell" value="#{invoice.cell}" />
                            <f:param name="fax" value="#{invoice.fax}" />
                            <f:param name="email" value="#{invoice.email}" />
                            <f:param name="posAdd" value="#{invoice.posAdd}" />
                            <f:param name="physAdd" value="#{invoice.physAdd}" /> 
                            <f:param name="vatNum" value="#{invoice.vatNum}" />
                        </p:commandButton>


                    </p:fieldset>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
