<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Invoice - Saved</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <p:commandButton value="Print" type="button" icon="ui-icon-print" style="display:block;margin-bottom: 20px">
                        <p:printer target="fsInvoice" />
                    </p:commandButton> 

                    <div align="right">
                        <p:button value="Back To Dashboard" outcome="/accounting/receivable/dashboard"/>                           
                        &nbsp;&nbsp;                                   
                        <br></br><br></br>
                    </div>

                    <p:fieldset id="fsInvoice" legend="TAX INVOICE" style="font-size:20px;">
                        <div align="left">

                        <p:outputPanel style="font-size:20px;font-family:Tahoma;border-bottom: solid;">                                        
                            <h:panelGrid columns="2" cellpadding="2">                                 
                                <h:outputLabel for="vatNum" value="VAT Number" style="font-weight:bold;"/><h:outputText id="vatNum" value="#{projectInventory.orgNumber}" style="font-size:15px;"/>                                                                                                            
                                <h:outputLabel for="name" value="Name" style="font-weight:bold"/><h:outputText id="name" value="#{projectInventory.orgName}"/>                                    
                                <h:outputLabel for="tel" value="Telephone / Cellphone" style="font-weight:bold" /><h:outputText id="tel" value="#{projectInventory.orgTel}"/>                                    
                                <h:outputLabel for="email" value="Email" style="font-weight:bold" /><h:outputText id="email" value="#{projectInventory.orgEmail}"/>                                   
                                <h:outputLabel for="posAdd" value="Postal Address" style="font-weight:bold" /><h:outputText id="posAdd" value="#{projectInventory.orgPosAdd}"/>                                  
                                <h:outputLabel for="physAdd" value="Physical Address" style="font-weight:bold" /><h:outputText id="physAdd" value="#{projectInventory.orgPhysAdd}"/>
                            </h:panelGrid><br></br>
                        </p:outputPanel><br></br>

                        <h:panelGrid columns="2" cellpadding="2" style="width:100%;">  
                            <h:outputText value="Invoice Number" style="font-weight:bold;font-size:17px"/>
                            <h:outputText value="#{invoice.recNum}"/>
                            <h:outputText value="Quotation Number" style="font-weight:bold;font-size:17px"/>
                            <h:outputText value="#{invoice.quoteId}"/>
                            <h:outputText value="Date" style="font-weight:bold;font-size:17px"/>
                            <h:outputText value="#{invoice.IDate}"/>
                            <h:outputText value="Recurring" style="font-weight:bold;font-size:17px"/>
                            <h:outputText value="#{invoice.recurring}"/>
                        </h:panelGrid><br></br>

                        <h:outputLabel value="Stakeholder Details " style="color:#999999;font-weight:bold;font-family:Calibri;font-size:25px"/><br></br>
                        <h:panelGrid columns="2" cellpadding="2">                                 
                            <h:outputLabel for="Id" value="ID" style="font-weight:bold;"/><h:outputText id="id" value="#{projectInventory.CID}" style="font-size:15px;"/>                                                                                                            
                            <h:outputLabel for="cName" value="Name" style="font-weight:bold"/><h:outputText id="cName" value="#{projectInventory.CName}  #{projectInventory.CSurname}"/>                                    
                            <h:outputLabel for="cTel" value="Telephone / Cellphone" style="font-weight:bold" /><h:outputText id="cTel" value="#{projectInventory.tel}"/>                                    
                            <h:outputLabel for="cEmail" value="Email" style="font-weight:bold" /><h:outputText id="cEmail" value="#{projectInventory.email}"/>                                                               
                        </h:panelGrid><br></br>
                        <h:outputLabel for="outputServices" value="" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:17px"/><br></br>                            
                        <p:outputPanel id="outputServices">
                            
                        <table border="1">
                            <th style="width:40%">PROJECT ID</th><th style="width:40%">DESCRIPTION</th>
                            <th style="width:40%">ACTIVITY</th><th style="width:10%">INVENTORY</th><th style="width:10%">QUANTITY</th><th>AMOUNT</th>
                            <ui:repeat id="projInv" value="#{projectInventory.fetchInvoiceProjectInventory(session.getAttribute('projectId'))}" var="addedinvs" transient="true">
                                <tr>
                                    <td><h:outputText value="#{addedinvs.projectId}" style="display:block;width:300px"/></td>
                                    <td><h:outputText value="#{addedinvs.projectDescription}" style="display:block;width:300px"/></td>
                                    <td><h:outputText value="#{addedinvs.activityDescription}" style="display:block;width:300px"/></td><td><h:outputText value="#{addedinvs.inventoryDescription}" style="display:block;width:300px"/></td>
                                    <td><h:outputText value="#{addedinvs.quantity}" style="display:block;width:300px"/></td>
                                    <td><h:outputText value="#{addedinvs.amount}" style="display:block;width:300px"/></td>
                                </tr>
                            </ui:repeat>
                        </table>

                        </p:outputPanel><br></br>                      
                        <h:panelGrid columns="2" cellpadding="2" style="width:1400px;">                               
                            <h:outputText value="Total" style="color:#D98880;font-weight:bold;width:1300px"/>
                            <h:outputText value="#{projectInventory.inventoryTotal}" style="display:block;color:#D98880;font-weight:bold;"/>                          
                        </h:panelGrid><br></br>                            
                        <p><h:outputText value="Notes" style="font-weight:bold;font-size:17px"/><br></br><h:outputText value="#{invoice.notes}"/></p>
                        
                        </div>
                    </p:fieldset>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
