<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Invoice</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <p:fieldset legend="Invoice Details" style="margin-bottom:20px">
                        <h:panelGrid columns="2" cellpadding="2">      
                      <h:outputLabel for="cID" value="#" style="font-weight:bold"/><h:outputText id="cID" value="#{param['cID']}"/>                                    
                            <h:outputLabel for="vatNum" value="VAT Number" style="font-weight:bold;font-size:16px;width:400px"/><h:outputText id="vatNum" value="#{enrolledServices.vatNum}" style="font-size:15px;"/>                                                                            
                            <h:outputLabel for="name" value="Name" style="font-weight:bold"/><h:outputText id="name" value="#{enrolledServices.customerName}"/>                                    
                            <h:outputLabel for="surname" value="Surname" style="font-weight:bold" /><h:outputText id="surname" value="#{enrolledServices.surname}"/>                                                                   
                            <h:outputLabel for="tel" value="Telephone" style="font-weight:bold" /><h:outputText id="tel" value="#{enrolledServices.telephone}"/>                                    
                            <h:outputLabel for="cell" value="Cellphone" style="font-weight:bold" /><h:outputText id="cell" value="#{enrolledServices.cellphone}"/>                                   
                            <h:outputLabel for="fax" value="Fax" style="font-weight:bold" /><h:outputText id="fax" value="#{enrolledServices.fax}"/>                                   
                            <h:outputLabel for="email" value="Email" style="font-weight:bold" /><h:outputText id="email" value="#{enrolledServices.email}"/>                                   
                            <h:outputLabel for="posAdd" value="Postal Address" style="font-weight:bold" /><h:outputText id="posAdd" value="#{enrolledServices.postalAddress}"/>                                  
                            <h:outputLabel for="physAdd" value="Physical Address" style="font-weight:bold" /><h:outputText id="physAdd" value="#{enrolledServices.physicalAddress}"/>
                        </h:panelGrid>
                    </p:fieldset>

                    <p:dataTable id="servicesDT" var="invServs" value="#{enrolledServices.services}" rowKey="#{invServs.recNum}" selection="#{enrolledServices.selectedEnrolledService}" widgetVar="cellServs" style="margin-bottom:0;height:100%">                            

                        <f:facet name="header">
                            Select Services
                        </f:facet>
   
                        <p:column style="width:15px">
                            <f:facet name="header">
                                <h:outputText value="#"/>
                            </f:facet>
                            <h:outputText value="#{invServs.recNum}"/>
                        </p:column>                           
                        <p:column filterBy="#{invServs.description}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Description" />                                    
                            </f:facet>                       
                            <h:outputText value="#{invServs.description}"/>                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Cost" />                                    
                            </f:facet>
                            <h:outputText value="#{invServs.cost}" />
                        </p:column>                        
                        <f:facet name="footer">                                
                            <p:commandButton process="servicesDT" action="#{invoice.selectServiceInventory(enrolledServices.services)}" value="Next" >                              
                                <f:param name="cID" value="#{param['cID']}" />
                                <f:param name="cName" value="#{param['cName']}" />
                                <f:param name="cSurname" value="#{param['cSurname']}" />
                                <f:param name="tel" value="#{param['tel']}" />
                                <f:param name="cell" value="#{param['cell']}" />
                                <f:param name="fax" value="#{param['fax']}" />
                                <f:param name="email" value="#{param['email']}" />
                                <f:param name="posAdd" value="#{param['posAd']}" />
                                <f:param name="physAdd" value="#{param['physAd']}" />                                    
                                <f:param name="vatNum" value="#{param['vatNum']}" />                                    
                            </p:commandButton>
                        </f:facet>

                    </p:dataTable> 

                    <p:contextMenu for="servicesDT" widgetVar="sMenu">   
                        <p:menuitem value="Edit Cell" icon="ui-icon-search" onclick="PF('cellServs').showCellEditor();return false;"/>  
                        <p:menuitem value="Hide Menu" icon="ui-icon-close" onclick="PF('sMenu').hide()"/>  
                    </p:contextMenu>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
