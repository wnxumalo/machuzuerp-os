<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Journal Listing</h1>

                <h:form id="form" styleClass="ui-fluid">


                    <div align="right">
                        <p:button value="Back To Dashboard" outcome="#{login.accountingDashboard()}">
                            
                            
                        </p:button> &nbsp;&nbsp;     

                        <br></br><br></br>
                    </div>

                    <p:dataTable id="journalDT" var="journ" value="#{journalData.journal}"  selectionMode="single" selection="#{accountData.selectedAccount}" rowKey="#{journ.recNum}" style="width:100%">
                        <p:ajax event="rowSelect" listener="#{journalData.onRowSelect}"/>
                        
                                                     
                        <p:column style="width:100px">
                            <f:facet name="header">
                                <h:outputText value="Number" />
                            </f:facet>                       
                            <h:outputText value="#{journ.accountNumber}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Type" />                                    
                            </f:facet>                       
                            <h:outputText value="#{journ.accType}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Description" />                                    
                            </f:facet>                       
                            <h:outputText value="#{journ.description}" />                                
                        </p:column>
                        <p:column style="width:70px">
                            <f:facet name="header">
                                <h:outputText value="Debit" />                                    
                            </f:facet>                       
                            <h:outputText value="#{journ.debit}" />                                
                        </p:column>
                        <p:column style="width:70px">
                            <f:facet name="header">
                                <h:outputText value="Credit" />                                    
                            </f:facet>                       
                            <h:outputText value="#{journ.credit}" />                                
                        </p:column>
                        <p:column style="width:90px">
                            <f:facet name="header">
                                <h:outputText value="Date" />                                    
                            </f:facet>                       
                            <h:outputText value="#{journ.transactionDate}" />                                
                        </p:column>                            
                    </p:dataTable>

                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
