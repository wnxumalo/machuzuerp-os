<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Find Journal</h1>

                <h:form id="form" styleClass="ui-fluid">


                    <h:panelGrid columns="2" cellpadding="2" style="width:741px;">                                                               
                        <h:outputText value="Begin" style="width:741px;font-weight:bold;"/>
                        <p:calendar id="startDate" value="#{journalData.dateFrom}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                        <h:outputText value="End" style="width:741px;font-weight:bold;"/>
                        <p:calendar id="endDate" value="#{journalData.dateTo}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                    </h:panelGrid><br></br>
                    &nbsp;&nbsp;&nbsp;
                    <p:commandButton value="Search" action="#{journalData.searchJournal()}">
                        
                        
                    </p:commandButton>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
