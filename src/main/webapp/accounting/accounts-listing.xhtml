<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Accounts Listing</h1>

                <h:form id="form" styleClass="ui-fluid">

                    <p:dataTable id="accountsDT" var="acc" value="#{accountData.account}"  selectionMode="single" selection="#{accountData.selectedAccount}" rowKey="#{acc.recNum}">
                        <p:ajax event="rowSelect" listener="#{accountData.onRowSelect}"/>  
                        
                                                     
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Number" />
                            </f:facet>                       
                            <h:outputText value="#{acc.accountNumber}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Description" />                                    
                            </f:facet>                       
                            <h:outputText value="#{acc.description}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Balance" />                                    
                            </f:facet>                       
                            <h:outputText value="#{acc.balance}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Comment" />                                    
                            </f:facet>                       
                            <h:outputText value="#{acc.comments}" />                                
                        </p:column>

                    </p:dataTable>           

                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
