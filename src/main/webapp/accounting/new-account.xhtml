<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Account</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <p:messages id="messages" showDetail="true" closable="true" >
                        <p:autoUpdate/>
                    </p:messages>
                    <h:panelGrid>
                        <h:outputText value="Type" />
                        <p:multiSelectListbox id="AccountType" value="#{accounts.accountType}" required="true">
                            <f:selectItems value="#{accounts.categories}" />
                        </p:multiSelectListbox>
                        <h:outputText value="Number" />
                        <p:inputText id="number" value="#{accounts.accountNumber}" />
                        <h:outputText value="Description" />
                        <p:inputText id="description" value="#{accounts.description}" required="true"/>
                        <h:outputText value="Opening Balance" />
                        <p:inputText id="balance" value="#{accounts.balance}" required="true" />
                        <h:outputText value="Comments" />
                        <p:inputText id="comments" value="#{accounts.comments}" />
                        &nbsp;&nbsp;&nbsp;
                        <p:commandButton value="Save" action="#{accounts.saveAccount()}">
                            
                            
                        </p:commandButton>
                    </h:panelGrid>
                </h:form>
                
            </ui:define>

        </ui:composition>

    </body>
</html>
