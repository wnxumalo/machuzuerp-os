<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
      <!--xmlns:pe="http://primefaces.org/ui/extensions" -->

    <body>

        <ui:composition template="../erpbyw-template.xhtml">

            <ui:define name="content">

                <h1>Accounting</h1>

                <h:form styleClass="ui-fluid">
                    <p>
                        <h:panelGrid columns="5" cellpadding="2" >                                                               
                            <h:outputText value="From"/>
                            <p:calendar id="startDate" value="#{accountingDashboard.dateFrom}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                            <h:outputText value="To"/>
                            <p:calendar id="endDate" value="#{accountingDashboard.dateTo}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />                                                                   
                            <p:commandButton value="Filter" action="#{accountingDashboard.filterDashboard()}" update="stakeholderDash">
                                
                                
                            </p:commandButton>

                            <!--pe:echart style="width: 50vw; height: 400px;" value="#{accountingDashboard.json}" widgetVar="jsonEChart">
        <p:ajax event="itemSelect" listener="#{accountingDashboard.createJsonModel()}" />
        <p:autoUpdate on="eventTheme"/>
    </pe:echart-->
                        </h:panelGrid>
                    </p>

                    <p:panelGrid columns="1" style="width: 100%;" id="stakeholderDash">
                        <p:chart type="line" model="#{accountingDashboard.totRevenueExpenditure}" />                                     
                    </p:panelGrid>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
