<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Account</h1>

                <h:form id="form" styleClass="ui-fluid">

                    <p:commandButton image="ui-icon-circle-minus" action="#{accounts.deleteAccount()}" title="Delete">
                        
                        
                        <f:param name="recnum" value="#{param['recnum']}" />
                    </p:commandButton>                        

                    <h:outputText value="Type" /><br></br>
                    <p:multiSelectListbox value="#{accounts.accountType}" style="width:100%">
                        <f:selectItems value="#{accounts.categories}" />
                    </p:multiSelectListbox>
                    <h:outputText value="Number" /><br></br>
                    <p:inputText id="number" value="#{accounts.accountNumber}" /><br></br>
                    <h:outputText value="Description" /><br></br>
                    <p:inputText id="description" value="#{accounts.description}" /><br></br>
                    <h:outputText value="Opening Balance" /><br></br>
                    <p:inputText id="balance" value="#{accounts.balance}" /><br></br>
                    <h:outputText value="Comments" /><br></br>
                    <p:inputText id="comments" value="#{accounts.comments}" /><br></br>                            
                    &nbsp;&nbsp;&nbsp;

                    <p:commandButton value="Save" action="#{accounts.saveEditAccount()}">
                        
                        
                                                       
                        <f:param name="accountNumber" value="#{param['accountNumber']}" />
                        <f:param name="description" value="#{param['description']}" />
                        <f:param name="balance" value="#{param['balance']}" />
                        <f:param name="comments" value="#{param['comments']}" />                                
                    </p:commandButton>
                </h:form>

                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
