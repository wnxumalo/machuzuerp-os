<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Select Purchase Order</h1>

                <h:form id="frm" styleClass="ui-fluid">
                    <p>
                        <p:fieldset id="fsFilter" legend="Filter">
                            <h:panelGrid columns="5" cellpadding="2" >
                                <h:outputText value="From"/>
                                <p:calendar id="startDate" value="#{menuNavigation.dateFrom}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" />
                                <h:outputText value="To"/>
                                <p:calendar id="endDate" value="#{menuNavigation.dateTo}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" />
                                <p:commandButton value="Filter" action="#{purchaseOrderOld.findPurchaseOrder(menuNavigation.dateFrom, menuNavigation.dateTo)}" update=":frmFilteredOrders:poDT5"/>
                            </h:panelGrid>
                        </p:fieldset>
                    </p>
                </h:form>
                <h:form id="frmFilteredOrders" styleClass="ui-fluid">
                    <p:button value="Back To Dashboard" outcome="/accounting/payable/dashboard"/>

                    <p:dataTable id="poDT5" var="podt5" value="#{purchaseOrderController.purchaseOrders}"  selectionMode="single" selection="#{purchaseOrderController.selectedDTO}" rowKey="#{podt5.id}">
                        <p:ajax event="rowSelect" listener="#{purchaseOrderController.onRowSelect(event)}"/>  
                         <f:facet name="header">
                            Select
                        </f:facet>
                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Id" />
                            </f:facet>
                            <h:outputText value="#{podt5.id}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Date" />
                            </f:facet>                       
                            <h:outputText value="#{podt5.PODate}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Supplier" />
                            </f:facet>                       
                            <h:outputText value="#{podt5.supplierName}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Approver" />
                            </f:facet>                       
                            <h:outputText value="#{podt5.requestorName}" />                                
                        </p:column>                        
                    </p:dataTable>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
