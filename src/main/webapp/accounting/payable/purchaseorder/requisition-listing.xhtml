<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                
                <h1>Purchase Order - Select Requisition</h1>

                <h:form id="poRQForm" styleClass="ui-fluid">
                    <p:button value="Back To Dashboard" outcome="/accounting/payable/dashboard">
                        
                        
                    </p:button> &nbsp;&nbsp;
                    <p:messages id="messages" showDetail="true" closable="true" >
                        <p:autoUpdate/>
                    </p:messages>
                    <p:dataTable id="requisitionsDT1" var="reqs" value="#{menuNavigation.requisitions}"  selectionMode="single" selection="#{purchaseOrderController.selectedRequisitionData}" rowKey="#{reqs.recnum}">
                        <p:ajax event="rowSelect" listener="#{purchaseOrderController.onRowSelectRequisitions}" />  
                         <f:facet name="header">
                            Select
                        </f:facet>
                        
                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Recnum" />
                            </f:facet>
                            <h:outputText value="#{reqs.recnum}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Date" />
                            </f:facet>                       
                            <h:outputText value="#{reqs.requestDate}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Deliver To" />                                    
                            </f:facet>                       
                            <h:outputText value="#{reqs.deliverTo}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Requestor" />                                    
                            </f:facet>                       
                            <h:outputText value="#{reqs.requestorName}" />                                
                        </p:column> 
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Accounts Manager" />                                    
                            </f:facet>                       
                            <h:outputText value="#{reqs.accountsManagerName}" />                                
                        </p:column> 
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Approvers" />                                    
                            </f:facet>                       
                            <h:outputText value="#{reqs.approverName}" />                                
                        </p:column>                         
                    </p:dataTable>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
