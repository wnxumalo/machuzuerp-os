<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Select Purchase Order</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <div align="right">
                        <p:button value="Back To Dashboard" outcome="/accounting/payable/dashboard">
                            
                            
                        </p:button> &nbsp;&nbsp;                                   
                        <br></br><br></br>
                    </div>

                    <p:messages id="messages" showDetail="true" closable="true" >
                        <p:autoUpdate/>
                    </p:messages>

                    <p:dataTable id="poDT1" var="pOrders" value="#{purchaseOrderController.itemsDTO}"  selectionMode="single" selection="#{purchaseOrder.selectedDTO}" rowKey="#{pOrders.id}">
                        <p:ajax event="rowSelect" listener="#{purchaseOrder.onRowSelect}"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Id" />
                            </f:facet>
                            <h:outputText value="#{pOrders.id}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Date" />
                            </f:facet>                       
                            <h:outputText value="#{pOrders.PODate}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Requestor" />                                    
                            </f:facet>                       
                            <h:outputText value="#{pOrders.requestorName}" />                             
                        </p:column>                          
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Account Manager" />                                    
                            </f:facet>                       
                            <h:outputText value="#{pOrders.accountsManagerName}" />                             
                        </p:column>                          
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Approver" />                                    
                            </f:facet>                       
                            <h:outputText value="#{pOrders.approverName}" />                             
                        </p:column>                          
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Supplier" />                                    
                            </f:facet>                       
                            <h:outputText value="#{pOrders.supplierName}" />                             
                        </p:column>                          
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Deliver To" />
                            </f:facet>                       
                            <h:outputText value="#{pOrders.deliverToName}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Deliver Date" />                                    
                            </f:facet>                       
                            <h:outputText value="#{pOrders.deliveryDate}" />                             
                        </p:column>                          
                    </p:dataTable>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
