<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Purchase Order</h1>
                <div align="right" styleClass="ui-fluid">
                    <p:button value="Back To Dashboard" outcome="/accounting/payable/dashboard">
                        
                        
                    </p:button> &nbsp;&nbsp;                                   
                    <br></br><br></br>
                </div>

                <h3>Requisition Details</h3>
                <p:panelGrid columns="2" styleClass="ui-fluid">
                    <h:outputText value="Requisition Id" style="font-weight: bold" />
                    <h:outputText value="#{param['recnum']}" />
                    <h:outputText value="Date" />
                    <h:outputText value="#{param['requestDate']}" />
                    <h:outputText value="Deliver To" />
                    <h:outputText value="#{param['deliverTo']}"/>
                    <h:outputText value="Requestor Name" />
                    <h:outputText value="#{param['requestorName']}" />
                    <h:outputText value="Accounts Manager Name" />
                    <h:outputText value="#{param['accountsManagerName']}" />
                    <h:outputText value="Approver Name" />
                    <h:outputText value="#{param['approverName']}" />
                </p:panelGrid>
                <h3>Select Supplier</h3>
                <h:form styleClass="ui-fluid">
                    <p:dataTable id="suppliersDT" var="supplier" value="#{supplierData.suppliers}">                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Recnum" />
                            </f:facet>
                            <h:outputText value="#{supplier.recNum}" />
                        </p:column>                        
                        <p:column filterBy="#{supplier.supplierName}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Description" />                                    
                            </f:facet>                       
                            <h:outputText value="#{supplier.supplierName}" />                             
                        </p:column>

                        <p:column style="width:32px;text-align: center">
                            <p:commandButton action="#{purchaseOrder.newPurchaseOrder(suppliersDT.recnum)}" icon="ui-icon-check" title="Next">
                                
                                
                                
                                <f:param name="requisitionId" value="#{param['recnum']}" />
                                <f:param name="requisitionDate" value="#{param['requestDate']}" />
                                <f:param name="deliverTo" value="#{param['deliverTo']}" />
                                <f:param name="requestorName" value="#{param['requestorName']}" />
                                <f:param name="accountsManagerName" value="#{param['accountsManagerName']}" />
                                <f:param name="approverName" value="#{param['approverName']}" />           
                                <f:setPropertyActionListener value="#{supplier}" target="#{purchaseOrder.selectedSupplier}" />
                                                                                    

                            </p:commandButton>
                        </p:column>
                        
                    </p:dataTable>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
