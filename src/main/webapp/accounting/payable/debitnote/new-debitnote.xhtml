<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Debit Note</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <div align="right">
                        <p:button value="Back To Dashboard" outcome="/accounting/payable/dashboard">
                            
                            
                        </p:button> &nbsp;&nbsp;                                   
                        <br></br><br></br>
                    </div>
                    
                    <p:messages id="messages" showDetail="true" closable="true">
                        <p:autoUpdate />
                    </p:messages>
                    
                    <p:fieldset legend="Debit Note">                                                                                                       
                        
                        <!--h:panelGrid columns="2" cellpadding="2" style="width:100%;">  
                            <h:outputText value="Requisition Id" style="font-weight:bold;font-size:17px"/>
                            <h:outputText value="#{purchaseOrder.requisitionId}"/>
                            <h:outputText value="Purchase Invoice #" style="font-weight:bold;font-size:17px"/>
                            <h:outputText value="#{purchaseOrder.recNum}"/>                            
                            <h:outputText value="Purchase Order #" style="font-weight:bold;font-size:17px"/>
                            <h:outputText value="#{purchaseOrder.POId}"/>                           
                        </h:panelGrid><br></br-->
                        
                        <h:outputLabel value="Supplier" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:25px"/><br></br>
                        <h:panelGrid columns="2" cellpadding="2">                                                                      
                            <h:outputLabel for="vatNum" value="VAT #" style="font-weight:bold;font-size:16px;width:400px"/><h:outputText id="vatNum" value="#{purchaseOrder.vatNum}" style="font-size:15px;"/>                                                                            
                            <h:outputLabel for="name" value="Name" style="font-weight:bold;font-size:16px"/><h:outputText id="name" value="#{purchaseOrder.supplierName}" style="font-size:15px;"/>                                    
                            <h:outputLabel for="tel" value="Telephone" style="font-weight:bold;font-size:16px" /><h:outputText id="tel" value="#{purchaseOrder.tel}" style="font-size:15px;"/>                                    
                            <h:outputLabel for="cell" value="Cellphone" style="font-weight:bold;font-size:16px" /><h:outputText id="cell" value="#{purchaseOrder.cell}" style="font-size:15px;"/>                                   
                            <h:outputLabel for="fax" value="Fax" style="font-weight:bold;font-size:16px" /><h:outputText id="fax" value="#{purchaseOrder.fax}" style="font-size:15px;"/>                                   
                            <h:outputLabel for="email" value="Email" style="font-weight:bold;font-size:16px" /><h:outputText id="email" value="#{purchaseOrder.email}" style="font-size:15px;"/>                                   
                            <h:outputLabel for="posAdd" value="Postal Address" style="font-weight:bold;font-size:16px" /><h:outputText id="posAdd" value="#{purchaseOrder.posAdd}" style="font-size:15px;"/>                                  
                            <h:outputLabel for="physAdd" value="Physical Address" style="font-weight:bold;font-size:16px" /><h:outputText id="physAdd" value="#{purchaseOrder.physAdd}" style="font-size:15px;"/>
                        </h:panelGrid><br></br>

                        <h:panelGrid columns="2" cellpadding="2" style="width:1400px;">                               
                            <h:outputText value="Invoice Number" style="color:#D98880;font-weight:bold;width:1300px"/>
                            <h:outputText value="#{purchaseOrder.recNum}" style="display:block;color:#D98880;font-weight:bold;"/>                                                  
                            <h:outputLabel for="total" value="Total" style="font-weight:bold" />
                            <h:outputText id="total" value="#{purchaseOrder.totalCost}"/>                           
                            <h:outputLabel value="Debit Note Date" style="color:#D98880;font-weight:bold;width:1300px"/>
                            <p:calendar id="invDate" value="#{debitNote.date}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />                            
                            <h:outputText value="Amount" style="width:741px;font-weight:bold;"/>
                            <p:inputNumber id="amt" value="#{debitNote.amount}"/>
                            <h:outputText value="Note" style="width:741px;font-weight:bold;"/>
                            <p:inputTextarea cols="100" id="notes" value="#{debitNote.notes}"/>
                        </h:panelGrid><br></br>

                        <p:commandButton action="#{debitNote.debitNoteComplete()}" value="Save" >
                            
                             
                            <f:param name="poId" value="#{purchaseOrder.recNum}" />
                            <f:param name="sid" value="#{purchaseOrder.supplierId}" />
                            <f:param name="vatNum" value="#{purchaseOrder.vatNum}" />
                            <f:param name="sName" value="#{purchaseOrder.supplierName}" />
                            <f:param name="tel" value="#{purchaseOrder.tel}" />
                            <f:param name="cell" value="#{purchaseOrder.cell}" />
                            <f:param name="fax" value="#{purchaseOrder.fax}" />
                            <f:param name="email" value="#{purchaseOrder.email}" />
                            <f:param name="posAdd" value="#{purchaseOrder.posAdd}" />
                            <f:param name="physAdd" value="#{purchaseOrder.physAdd}" /> 
                        </p:commandButton>

                    </p:fieldset>
                </h:form>
            </ui:define>
        </ui:composition>

    </body>
</html>
