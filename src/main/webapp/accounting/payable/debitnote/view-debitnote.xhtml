<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Debit Note Preview</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <div align="right">
                        <p:button value="Back To Dashboard" outcome="/accounting/payable/dashboard">
                            
                            
                        </p:button>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                        <br></br><br></br>
                    </div>
                    <p:commandButton value="Edit" action="edit" style="display:block;margin-bottom: 20px">
                        
                        
                    </p:commandButton>
                    <p:commandButton value="Print" type="button" icon="ui-icon-print" style="display:block;margin-bottom: 20px">
                        <p:printer target="fsCC" />
                    </p:commandButton> 
                    <p:fieldset id="fsCC" legend="Debit Note">                                                
                        <h:outputLabel value="SUPPLIER" style="color:#999999;font-weight:bold;font-family:Calibri;font-size:25px"/><br></br>
                        <h:panelGrid columns="2" cellpadding="2">                                 
                            <h:outputLabel for="number" value="#" style="font-weight:bold"/><h:outputText id="cID" value="#{debitNote.vatNumber}"/>    
                            <h:outputLabel for="vatNum" value="VAT Number" style="font-weight:bold;font-size:16px;width:400px"/><h:outputText id="vatNum" value="#{debitNote.vatNumber}" style="font-size:15px;"/>                                                                                                            
                            <h:outputLabel for="name" value="Name" style="font-weight:bold"/><h:outputText id="name" value="#{debitNote.SName}"/>                                    
                            <h:outputLabel for="surname" value="Surname" style="font-weight:bold" /><h:outputText id="surname" value="#{debitNote.CSurname}"/>                                                                   
                            <h:outputLabel for="tel" value="Telephone" style="font-weight:bold" /><h:outputText id="tel" value="#{debitNote.tel}"/>                                    
                            <h:outputLabel for="cell" value="Cellphone" style="font-weight:bold" /><h:outputText id="cell" value="#{debitNote.cell}"/>                                   
                            <h:outputLabel for="fax" value="Fax" style="font-weight:bold" /><h:outputText id="fax" value="#{debitNote.fax}"/>                                   
                            <h:outputLabel for="email" value="Email" style="font-weight:bold" /><h:outputText id="email" value="#{debitNote.email}"/>                                   
                            <h:outputLabel for="posAdd" value="Postal Address" style="font-weight:bold" /><h:outputText id="posAdd" value="#{debitNote.posAdd}"/>                                  
                            <h:outputLabel for="physAdd" value="Physical Address" style="font-weight:bold" /><h:outputText id="physAdd" value="#{debitNote.physAdd}"/>
                        </h:panelGrid><br></br>                                              

                        <h:panelGrid columns="2" cellpadding="2" style="width:1400px;"> 
                            <h:outputText value="Debit Note Id" style="color:#D98880;font-weight:bold;width:1300px"/>
                            <h:outputText value="#{debitNote.recNum}" style="display:block;color:#D98880;font-weight:bold;"/> 
                            <h:outputLabel value="Purchase Invoice Number" style="color:#D98880;font-weight:bold;width:1300px"/>
                            <h:outputText value="#{debitNote.invId}"/>                                                                              
                            <h:outputLabel for="total" value="Total" style="font-weight:bold" />
                            <h:outputText id="total" value="#{debitNote.total}"/>                           
                            <h:outputLabel value="Debit Note Date" style="color:#D98880;font-weight:bold;width:1300px"/>
                            <h:outputText id="invDate" value="#{debitNote.date}" />      
                            <h:outputLabel value="Amount" style="width:741px;font-weight:bold;"/>
                            <h:outputText id="amt" value="#{param['amount']}"/>
                            <h:outputLabel value="Note" style="width:741px;font-weight:bold;"/>
                            <h:outputText id="notes" value="#{param['notes']}"/>
                        </h:panelGrid><br></br>                      

                    </p:fieldset>
                </h:form>
            </ui:define>
        </ui:composition>

    </body>
</html>
