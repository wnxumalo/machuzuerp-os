<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Credit Note</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <div align="right">
                        <p:button value="Back To Dashboard" outcome="/accounting/receivable/dashboard">
                            
                            
                        </p:button> &nbsp;&nbsp;                                   
                        <br></br><br></br>
                    </div>


                    <p:fieldset id="fsFilter" legend="Select Invoice">

                        <p>
                            <h:panelGrid columns="5" cellpadding="2" >                                                               
                                <h:outputText value="From"/>
                                <p:calendar id="startDate" value="#{menuNavigation.dateFrom}" binding="#{dFrom}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                                <h:outputText value="To"/>
                                <p:calendar id="endDate" value="#{menuNavigation.dateTo}" binding="#{dTo}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />                                                                                               
                                <p:commandButton icon="ui-icon-search"  value="Search" action="#{creditNote.findInvoice(menuNavigation.dateFrom,menuNavigation.dateTo)}" update="invoicesDT">
                                
                                
                            </p:commandButton>

                            </h:panelGrid>
                            
                        </p>     

                    </p:fieldset>
                    <p:dataTable id="invoicesDT" var="invoices" value="#{creditNote.invoices}"  selectionMode="single" selection="#{menuNavigation.selectedInvoice}" rowKey="#{invoices.recNum}">
                    <!--p:dataTable id="invoicesDT" var="invoices" value="#{creditNote.invoices}" rowKey="#{invoices.recNum}"-->
                        <p:ajax event="rowSelect" listener="#{creditNote.onRowSelect}"/>
                        
                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Recnum" />
                            </f:facet>
                            <h:outputText value="#{invoices.recNum}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Date" />
                            </f:facet>                       
                            <h:outputText value="#{invoices.IDate}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{invoices.CName}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Surname" />                                    
                            </f:facet>                       
                            <h:outputText value="#{invoices.CSurname}" />                                
                        </p:column> 
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Total" />                                    
                            </f:facet>                       
                            <h:outputText value="#{invoices.totCost}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Outstanding" />                                    
                            </f:facet>                       
                            <h:outputText value="#{invoices.outstanding}" />                                
                        </p:column>                         
                    </p:dataTable>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
