<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Delivery Note</h1>
                <div align="right" styleClass="ui-fluid">
                    <p:button value="Back To Dashboard" outcome="/accounting/payable/dashboard">
                        
                        
                    </p:button> &nbsp;&nbsp;                                   
                    <br></br><br></br>
                </div>
               
                <h3>Select Supplier</h3>
                <h:form styleClass="ui-fluid">
                    <p:dataTable id="suppliersDT" var="supp" value="#{supplierData.suppliers}" paginator="true" rows="10">                        
                        <p:column width="5%">
                            <f:facet name="header">
                                <h:outputText value="Recnum" />
                            </f:facet>
                            <h:outputText value="#{supp.recNum}" />
                        </p:column>                        
                        <p:column filterBy="#{supp.supplierName}" filterMatchMode="contains">
                            <f:facet name="header">
                                <h:outputText value="Description" />                                    
                            </f:facet>                       
                            <h:outputText value="#{supp.supplierName}" />                             
                        </p:column>

                        <p:column style="width:32px;text-align: center">
                            <p:commandButton action="#{deliveryNote.CreateDeliveryNote()}" icon="ui-icon-check" title="Next">
                                
                                                                
                                <f:setPropertyActionListener value="#{supp}" target="#{deliveryNote.selectedSupplier}" />
                            </p:commandButton>
                        </p:column>
                        
                    </p:dataTable>
                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
