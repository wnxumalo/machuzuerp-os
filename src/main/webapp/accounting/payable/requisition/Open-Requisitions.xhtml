<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Open Requisitions</h1>

                <h:form id="form" styleClass="ui-fluid">
                    <p:button value="Back To Dashboard" outcome="/accounting/payable/dashboard">
                        
                        
                    </p:button> &nbsp;&nbsp;
                    <p:dataTable id="requisitionsDT" var="req" value="#{requisitionData.openRequisitions}"  selectionMode="single" selection="#{requisitionData.selectedRequisition}" rowKey="#{req.recnum}">
                        <p:ajax event="rowSelect" listener="#{requisitionData.onRowSelect}"/>  
                         <f:facet name="header">
                            Select
                        </f:facet>
                        
                          
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Recnum" />
                            </f:facet>
                            <h:outputText value="#{req.recnum}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Date" />
                            </f:facet>                       
                            <h:outputText value="#{req.requestDate}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Deliver To" />                                    
                            </f:facet>                       
                            <h:outputText value="#{req.deliverTo}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Requestor" />                                    
                            </f:facet>                       
                            <h:outputText value="#{req.requestorName}" />                                
                        </p:column> 
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Accounts Manager" />                                    
                            </f:facet>                       
                            <h:outputText value="#{req.accountsManagerName}" />                                
                        </p:column>                                            
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Delivery Date" />                                    
                            </f:facet>                       
                            <h:outputText value="#{req.requestedDeliveryDate}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Status" />                                    
                            </f:facet>                       
                            <h:outputText value="#{req.status}" />                                
                        </p:column>
                    </p:dataTable>
                </h:form>
            </ui:define>


        </ui:composition>

    </body>
</html>
