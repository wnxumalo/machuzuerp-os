<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>New Purchase Requisition</h1>

                <h:form id="form" styleClass="ui-fluid">

                    <p:messages id="messages" showDetail="true" closable="true" >
                        <p:autoUpdate/>
                    </p:messages>
                    
                    <p:dataTable id="requisitionApproverDT" var="apps" value="#{requisition.approvers}" selection="#{requisition.selectedApprovers}" rowKey="#{apps.recNum}"  widgetVar="cellInvs" style="margin-bottom:0;height:100%">                        
                        <f:facet name="header">
                            Select Approvers
                        </f:facet>

                        <p:column selectionMode="multiple" style="width:16px;text-align:center"/>                            
                        <p:column style="width:15px">
                            <f:facet name="header">
                                <h:outputText value="#"/>
                            </f:facet>
                            <h:outputText value="#{apps.recNum}"/>
                        </p:column>                           
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Name" />                                    
                            </f:facet>                       
                            <h:outputText value="#{apps.empName}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Surname" />                                    
                            </f:facet>                       
                            <h:outputText value="#{apps.empSurname}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Position" />                                    
                            </f:facet>                       
                            <h:outputText value="#{apps.position}" />                                
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton process="requisitionApproverDT" value="Save" action="#{requisition.saveRequisition('order')}" />

                        </f:facet>
                    </p:dataTable>

                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
