<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>Accounts</h1>

                <h:form id="form" styleClass="ui-fluid">

                    <p:commandButton image="ui-icon-circle-plus" action="#{login.newAccount(session)}" title="New">
                        
                        
                    </p:commandButton>
                    <p:commandButton image="ui-icon-search" action="#{login.findAccount(session)}" title="Search">
                        
                        
                    </p:commandButton>                                        
                    <p:commandButton image="ui-icon-print" action="#{login.printAccounting}">
                        
                        
                    </p:commandButton>
                </h:form>
          
            </ui:define>

        </ui:composition>

    </body>
