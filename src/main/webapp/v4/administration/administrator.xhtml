            <h:form id="OrganisationListForm">                
                <p:panel header="ORGANISATIONS">
                    <p:dataTable id="datalist" value="#{organisationController.items}" var="item"
                                 selectionMode="single" selection="#{organisationController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect" listener="#{organisationController.onOrganisationRowSelect(event)}"  update="createButton viewButton editButton deleteButton :EmployeeListForm:employeeDatalist"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Id"/>
                            </f:facet>
                            <h:outputText value="#{item.id}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Tax Number"/>
                            </f:facet>
                            <h:outputText value="#{item.vatNumber}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Name"/>
                            </f:facet>
                            <h:outputText value="#{item.name}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Telephone"/>
                            </f:facet>
                            <h:outputText value="#{item.telephone}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Email"/>
                            </f:facet>
                            <h:outputText value="#{item.email}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="City"/>
                            </f:facet>
                            <h:outputText value="#{item.city}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="District"/>
                            </f:facet>
                            <h:outputText value="#{item.district}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Country"/>
                            </f:facet>
                            <h:outputText value="#{item.country}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Interest Rate"/>
                            </f:facet>
                            <h:outputText value="#{item.interestRate}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{bundle.Create}" actionListener="#{organisationController.prepareCreate}" update=":OrganisationCreateForm" oncomplete="PF('OrganisationCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{bundle.View}" update=":OrganisationViewForm" oncomplete="PF('OrganisationViewDialog').show()" disabled="#{empty organisationController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{bundle.Edit}" update=":OrganisationEditForm" oncomplete="PF('OrganisationEditDialog').show()" disabled="#{empty organisationController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{bundle.Delete}" actionListener="#{organisationController.destroy}" update=":growl,datalist" disabled="#{empty organisationController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>

            <h:form id="PasswordManagementListForm">
                <p:panel header="PASSWORD MANAGEMENT">
                    <p:dataTable id="datalist" value="#{employeeController.selected.passwordManagement}" var="item"
                                 selectionMode="single" selection="#{passwordManagementController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Rule Type"/>
                            </f:facet>
                            <h:outputText value="#{item.ruleType}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Two Factor"/>
                            </f:facet>
                            <h:outputText value="#{item.twoFactor}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Change Interval"/>
                            </f:facet>
                            <h:outputText value="#{item.changeInterval}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{bundle.Create}" actionListener="#{passwordManagementController.prepareCreate}" update=":PasswordManagementCreateForm" oncomplete="PF('PasswordManagementCreateDialog').show()" disabled="#{!empty employeeController.selected.passwordManagement}"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{bundle.View}" update=":PasswordManagementViewForm" oncomplete="PF('PasswordManagementViewDialog').show()" disabled="#{empty passwordManagementController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{bundle.Edit}" update=":PasswordManagementEditForm" oncomplete="PF('PasswordManagementEditDialog').show()" disabled="#{empty passwordManagementController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{bundle.Delete}" actionListener="#{passwordManagementController.destroy}" update=":growl,datalist" disabled="#{empty passwordManagementController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>

            <div id="bottom">
                <center><ui:insert name="bottom"><p:outputLabel value="Copyright &copy; Maestro IT (Pty) Ltd 2007 - #{login.currDate}"/>  
                        | Version 3.1 | <a href="https://www.machuzu.com" target="_blank">www.machuzu.com</a></ui:insert></center>
            </div>
        </div>
    </h:body>
</html>
