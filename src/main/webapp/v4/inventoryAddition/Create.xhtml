<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="InventoryAdditionCreateDlg" widgetVar="InventoryAdditionCreateDialog" modal="true" resizable="false" appendTo="@(dialog)" header="Create Inventory Addition">
            <h:form id="InventoryAdditionCreateForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2">
                        <p:outputLabel value="SKU Number" for="sKUNumber" />
                        <p:inputText id="sKUNumber" value="#{inventoryAdditionController.selected.SKUNumber}" title="SKU Number"/>
                        <p:outputLabel value="Supplier" for="supplierId" />
                        <p:selectOneMenu id="supplierId" value="#{inventoryAdditionController.selected.supplierId}" required="true">
                            <f:selectItem itemLabel="Random" itemValue="-1" />
                            <f:selectItems value="#{supplierListBean.supplierList}" 
                                           var="su" itemValue="#{su.id}"
                                           itemLabel="#{su.name}"/>
                        </p:selectOneMenu>                            
                        <p:outputLabel value="Delivery Note Id" for="deliveryNoteId" />
                        <p:inputText id="deliveryNoteId" value="#{inventoryAdditionController.selected.deliveryNoteId}" title="#{bundle.CreateInventoryAdditionTitle_deliveryNoteId}"/>
                        <p:outputLabel value="Quantity" for="quantity" />
                        <p:inputText id="quantity" value="#{inventoryAdditionController.selected.quantity}" title="#{bundle.CreateInventoryAdditionTitle_quantity}" required="true"/>
                        <p:outputLabel value="Expiry Date" for="expiryDate" />
                        <p:calendar id="expiryDate" value="#{inventoryAdditionController.selected.expiryDate}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                        <p:outputLabel value="Delivery Date" for="deliveryDate" />
                        <p:calendar id="deliveryDate" value="#{inventoryAdditionController.selected.deliveryDate}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                        <p:outputLabel value="Comments" for="comments" />
                        <p:inputText id="comments" value="#{inventoryAdditionController.selected.comments}" title="#{bundle.CreateInventoryAdditionTitle_comments}"/>
                    </p:panelGrid>
                    <p:commandButton actionListener="#{inventoryAdditionController.create(inventoryController.inventoryDTO.id, session)}" value="#{bundle.Save}" update=":growl" />
                    <p:commandButton value="#{bundle.Cancel}" onclick="InventoryAdditionCreateDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
