<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition template="/erpbyw-template.xhtml">


        <ui:define name="title">
            <h:outputText value="#{bundle.ListAuditLoggingTitle}"></h:outputText>
        </ui:define>

        <ui:define name="content">
            <p:growl id="growl">
                <p:autoUpdate/>
            </p:growl>
            <h:form id="AuditLoggingListForm">
                <p:panel header="#{bundle.ListAuditLoggingTitle}">
                    <p:dataTable id="datalist" value="#{auditLoggingController.items}" var="item"
                                 selectionMode="single" selection="#{auditLoggingController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListAuditLoggingTitle_id}"/>
                            </f:facet>
                            <h:outputText value="#{item.id}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListAuditLoggingTitle_organisation}"/>
                            </f:facet>
                            <h:outputText value="#{item.organisation}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListAuditLoggingTitle_employeeIdDate}"/>
                            </f:facet>
                            <h:outputText value="#{item.employeeIdDate}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListAuditLoggingTitle_userAction}"/>
                            </f:facet>
                            <h:outputText value="#{item.userAction}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListAuditLoggingTitle_appModule}"/>
                            </f:facet>
                            <h:outputText value="#{item.appModule}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListAuditLoggingTitle_actionResponse}"/>
                            </f:facet>
                            <h:outputText value="#{item.actionResponse}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{bundle.Create}" actionListener="#{auditLoggingController.prepareCreate}" update=":AuditLoggingCreateForm" oncomplete="PF('AuditLoggingCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{bundle.View}" update=":AuditLoggingViewForm" oncomplete="PF('AuditLoggingViewDialog').show()" disabled="#{empty auditLoggingController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{bundle.Edit}" update=":AuditLoggingEditForm" oncomplete="PF('AuditLoggingEditDialog').show()" disabled="#{empty auditLoggingController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{bundle.Delete}" actionListener="#{auditLoggingController.destroy}" update=":growl,datalist" disabled="#{empty auditLoggingController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>

            <ui:include src="Create.xhtml"/>
            <ui:include src="Edit.xhtml"/>
            <ui:include src="View.xhtml"/>
        </ui:define>
    </ui:composition>

</html>
