<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition template="/erpbyw-template.xhtml">


        <ui:define name="title">
            <h:outputText value="List Purchase Orders"></h:outputText>
        </ui:define>

        <ui:define name="content">
            <p:growl id="growl">
                <p:autoUpdate/>
            </p:growl>

            <h:form id="PurchaseOrderListForm">
                <p:panel header="List Purchase Orders">
                    <p:dataTable id="poDT" var="purchaseorders" value="#{purchaseOrderController.getItemsSupplierDTO(supplierController.selected.id)}"  selectionMode="single" selection="#{purchaseOrderController.selectedDTO}" rowKey="#{purchaseorders.id}">
                        <p:ajax event="rowSelect" listener="#{purchaseOrderController.onRowSelectSupplier}"/>
                        
                        
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Id" />
                            </f:facet>
                            <h:outputText value="#{purchaseorders.id}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Supplier" />
                            </f:facet>                       
                            <h:outputText value="#{purchaseorders.supplierName}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Date" />
                            </f:facet>                       
                            <h:outputText value="#{purchaseorders.PODate}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Delivery Date" />                                    
                            </f:facet>                       
                            <h:outputText value="#{purchaseorders.deliveryDate}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Shipping Method" />
                            </f:facet>                       
                            <h:outputText value="#{purchaseorders.shippingMethod}" />                                
                        </p:column>                        
                    </p:dataTable>
                </p:panel>
            </h:form>

            <ui:include src="Create.xhtml"/>
            <ui:include src="Edit.xhtml"/>
            <ui:include src="View.xhtml"/>
        </ui:define>
    </ui:composition>

</html>
