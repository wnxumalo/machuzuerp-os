<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition template="/template.xhtml">


        <ui:define name="title">
            <h:outputText value="#{bundle.ListInventoryStorageTitle}"></h:outputText>
        </ui:define>

        <ui:define name="body">
            <h:form id="InventoryStorageListForm">
                <p:panel header="#{bundle.ListInventoryStorageTitle}">
                    <p:dataTable id="datalist" value="#{inventoryStorageController.items}" var="item"
                                 selectionMode="single" selection="#{inventoryStorageController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_id}"/>
                            </f:facet>
                            <h:outputText value="#{item.id}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_inventoryId}"/>
                            </f:facet>
                            <h:outputText value="#{item.inventoryId}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_supplierId}"/>
                            </f:facet>
                            <h:outputText value="#{item.supplierId}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_description}"/>
                            </f:facet>
                            <h:outputText value="#{item.description}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_type}"/>
                            </f:facet>
                            <h:outputText value="#{item.type}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_owner}"/>
                            </f:facet>
                            <h:outputText value="#{item.owner}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_manufacturer}"/>
                            </f:facet>
                            <h:outputText value="#{item.manufacturer}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_quantity}"/>
                            </f:facet>
                            <h:outputText value="#{item.quantity}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_location}"/>
                            </f:facet>
                            <h:outputText value="#{item.location}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_arrivalDate}"/>
                            </f:facet>
                            <h:outputText value="#{item.arrivalDate}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_expirationDate}"/>
                            </f:facet>
                            <h:outputText value="#{item.expirationDate}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_itemCondition}"/>
                            </f:facet>
                            <h:outputText value="#{item.itemCondition}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_purchasePrice}"/>
                            </f:facet>
                            <h:outputText value="#{item.purchasePrice}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_sellingPrice}"/>
                            </f:facet>
                            <h:outputText value="#{item.sellingPrice}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_reorderLevel}"/>
                            </f:facet>
                            <h:outputText value="#{item.reorderLevel}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_reorderQuantity}"/>
                            </f:facet>
                            <h:outputText value="#{item.reorderQuantity}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_warehouseSection}"/>
                            </f:facet>
                            <h:outputText value="#{item.warehouseSection}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_implementationDate}"/>
                            </f:facet>
                            <h:outputText value="#{item.implementationDate}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageTitle_status}"/>
                            </f:facet>
                            <h:outputText value="#{item.status}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{bundle.Create}" actionListener="#{inventoryStorageController.prepareCreate}" update=":InventoryStorageCreateForm" oncomplete="PF('InventoryStorageCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{bundle.View}" update=":InventoryStorageViewForm" oncomplete="PF('InventoryStorageViewDialog').show()" disabled="#{empty inventoryStorageController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{bundle.Edit}" update=":InventoryStorageEditForm" oncomplete="PF('InventoryStorageEditDialog').show()" disabled="#{empty inventoryStorageController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{bundle.Delete}" actionListener="#{inventoryStorageController.destroy}" update=":growl,datalist" disabled="#{empty inventoryStorageController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>

            <ui:include src="Create.xhtml"/>
            <ui:include src="Edit.xhtml"/>
            <ui:include src="View.xhtml"/>
        </ui:define>
    </ui:composition>

</html>
