<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="ShipmentViewDlg" widgetVar="ShipmentViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewShipmentTitle}">
            <h:form id="ShipmentViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{shipmentController.selected != null}">
                        <h:outputText value="#{bundle.ViewShipmentLabel_id}"/>
                        <h:outputText value="#{shipmentController.selected.id}" title="#{bundle.ViewShipmentTitle_id}"/>
                        <h:outputText value="#{bundle.ViewShipmentLabel_shippingTerms}"/>
                        <h:outputText value="#{shipmentController.selected.shippingTerms}" title="#{bundle.ViewShipmentTitle_shippingTerms}"/>
                        <h:outputText value="#{bundle.ViewShipmentLabel_shippingMethod}"/>
                        <h:outputText value="#{shipmentController.selected.shippingMethod}" title="#{bundle.ViewShipmentTitle_shippingMethod}"/>
                        <h:outputText value="#{bundle.ViewShipmentLabel_paymentTerms}"/>
                        <h:outputText value="#{shipmentController.selected.paymentTerms}" title="#{bundle.ViewShipmentTitle_paymentTerms}"/>
                        <h:outputText value="#{bundle.ViewShipmentLabel_supplierId}"/>
                        <h:outputText value="#{shipmentController.selected.supplierId}" title="#{bundle.ViewShipmentTitle_supplierId}"/>
                        <h:outputText value="#{bundle.ViewShipmentLabel_purchaseOrderId}"/>
                        <h:outputText value="#{shipmentController.selected.purchaseOrderId}" title="#{bundle.ViewShipmentTitle_purchaseOrderId}"/>
                        <h:outputText value="#{bundle.ViewShipmentLabel_shippingDate}"/>
                        <h:outputText value="#{shipmentController.selected.shippingDate}" title="#{bundle.ViewShipmentTitle_shippingDate}">
                            <f:convertDateTime pattern="MM/dd/yyyy" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewShipmentLabel_estimateDeliveryDate}"/>
                        <h:outputText value="#{shipmentController.selected.estimateDeliveryDate}" title="#{bundle.ViewShipmentTitle_estimateDeliveryDate}">
                            <f:convertDateTime pattern="MM/dd/yyyy" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewShipmentLabel_actualDeliveryDate}"/>
                        <h:outputText value="#{shipmentController.selected.actualDeliveryDate}" title="#{bundle.ViewShipmentTitle_actualDeliveryDate}">
                            <f:convertDateTime pattern="MM/dd/yyyy" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewShipmentLabel_quantityShipped}"/>
                        <h:outputText value="#{shipmentController.selected.quantityShipped}" title="#{bundle.ViewShipmentTitle_quantityShipped}"/>
                        <h:outputText value="#{bundle.ViewShipmentLabel_quantityReceived}"/>
                        <h:outputText value="#{shipmentController.selected.quantityReceived}" title="#{bundle.ViewShipmentTitle_quantityReceived}"/>
                        <h:outputText value="#{bundle.ViewShipmentLabel_discrepancy}"/>
                        <h:outputText value="#{shipmentController.selected.discrepancy}" title="#{bundle.ViewShipmentTitle_discrepancy}"/>
                        <h:outputText value="#{bundle.ViewShipmentLabel_discrepancyReasons}"/>
                        <h:outputText value="#{shipmentController.selected.discrepancyReasons}" title="#{bundle.ViewShipmentTitle_discrepancyReasons}"/>
                        <h:outputText value="#{bundle.ViewShipmentLabel_creationDate}"/>
                        <h:outputText value="#{shipmentController.selected.creationDate}" title="#{bundle.ViewShipmentTitle_creationDate}">
                            <f:convertDateTime pattern="MM/dd/yyyy" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewShipmentLabel_status}"/>
                        <h:outputText value="#{shipmentController.selected.status}" title="#{bundle.ViewShipmentTitle_status}"/>
                        <h:outputText value="#{bundle.ViewShipmentLabel_notes}"/>
                        <h:outputText value="#{shipmentController.selected.notes}" title="#{bundle.ViewShipmentTitle_notes}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="ShipmentViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
