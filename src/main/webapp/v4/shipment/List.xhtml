<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition template="/erpbyw-template.xhtml">


        <ui:define name="title">
            <h:outputText value="#{bundle.ListShipmentTitle}"></h:outputText>
        </ui:define>

        <ui:define name="content">
            <p:growl id="growl">
                <p:autoUpdate/>
            </p:growl>

            <h:form id="ShipmentListForm">
                <p:panel header="#{bundle.ListShipmentTitle}">
                    <p:dataTable id="datalist" value="#{shipmentController.items}" var="item"
                                 selectionMode="single" selection="#{shipmentController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_id}"/>
                            </f:facet>
                            <h:outputText value="#{item.id}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_shippingTerms}"/>
                            </f:facet>
                            <h:outputText value="#{item.shippingTerms}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_shippingMethod}"/>
                            </f:facet>
                            <h:outputText value="#{item.shippingMethod}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_paymentTerms}"/>
                            </f:facet>
                            <h:outputText value="#{item.paymentTerms}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_supplierId}"/>
                            </f:facet>
                            <h:outputText value="#{item.supplierId}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_purchaseOrderId}"/>
                            </f:facet>
                            <h:outputText value="#{item.purchaseOrderId}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_shippingDate}"/>
                            </f:facet>
                            <h:outputText value="#{item.shippingDate}">
                                <f:convertDateTime pattern="MM/dd/yyyy" />
                            </h:outputText>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_estimateDeliveryDate}"/>
                            </f:facet>
                            <h:outputText value="#{item.estimateDeliveryDate}">
                                <f:convertDateTime pattern="MM/dd/yyyy" />
                            </h:outputText>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_actualDeliveryDate}"/>
                            </f:facet>
                            <h:outputText value="#{item.actualDeliveryDate}">
                                <f:convertDateTime pattern="MM/dd/yyyy" />
                            </h:outputText>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_quantityShipped}"/>
                            </f:facet>
                            <h:outputText value="#{item.quantityShipped}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_quantityReceived}"/>
                            </f:facet>
                            <h:outputText value="#{item.quantityReceived}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_discrepancy}"/>
                            </f:facet>
                            <h:outputText value="#{item.discrepancy}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_discrepancyReasons}"/>
                            </f:facet>
                            <h:outputText value="#{item.discrepancyReasons}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_creationDate}"/>
                            </f:facet>
                            <h:outputText value="#{item.creationDate}">
                                <f:convertDateTime pattern="MM/dd/yyyy" />
                            </h:outputText>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_status}"/>
                            </f:facet>
                            <h:outputText value="#{item.status}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListShipmentTitle_notes}"/>
                            </f:facet>
                            <h:outputText value="#{item.notes}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{bundle.Create}" actionListener="#{shipmentController.prepareCreate}" update=":ShipmentCreateForm" oncomplete="PF('ShipmentCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{bundle.View}" update=":ShipmentViewForm" oncomplete="PF('ShipmentViewDialog').show()" disabled="#{empty shipmentController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{bundle.Edit}" update=":ShipmentEditForm" oncomplete="PF('ShipmentEditDialog').show()" disabled="#{empty shipmentController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{bundle.Delete}" actionListener="#{shipmentController.destroy}" update=":growl,datalist" disabled="#{empty shipmentController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>

            <ui:include src="Create.xhtml"/>
            <ui:include src="Edit.xhtml"/>
            <ui:include src="View.xhtml"/>
        </ui:define>
    </ui:composition>

</html>
