<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="PasswordManagementViewDlg" widgetVar="PasswordManagementViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewPasswordManagementTitle}">
            <h:form id="PasswordManagementViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{passwordManagementController.selected != null}">
                        <h:outputText value="#{bundle.ViewPasswordManagementLabel_id}"/>
                        <h:outputText value="#{passwordManagementController.selected.id}" title="#{bundle.ViewPasswordManagementTitle_id}"/>
                        <h:outputText value="#{bundle.ViewPasswordManagementLabel_employeeId}"/>
                        <h:outputText value="#{passwordManagementController.selected.employeeId}" title="#{bundle.ViewPasswordManagementTitle_employeeId}"/>
                        <h:outputText value="#{bundle.ViewPasswordManagementLabel_ruleType}"/>
                        <h:outputText value="#{passwordManagementController.selected.ruleType}" title="#{bundle.ViewPasswordManagementTitle_ruleType}"/>
                        <h:outputText value="#{bundle.ViewPasswordManagementLabel_twoFactor}"/>
                        <h:outputText value="#{passwordManagementController.selected.twoFactor}" title="#{bundle.ViewPasswordManagementTitle_twoFactor}"/>
                        <h:outputText value="#{bundle.ViewPasswordManagementLabel_changeInterval}"/>
                        <h:outputText value="#{passwordManagementController.selected.changeInterval}" title="#{bundle.ViewPasswordManagementTitle_changeInterval}"/>
                        <h:outputText value="#{bundle.ViewPasswordManagementLabel_creationDate}"/>
                        <h:outputText value="#{passwordManagementController.selected.creationDate}" title="#{bundle.ViewPasswordManagementTitle_creationDate}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="PasswordManagementViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
