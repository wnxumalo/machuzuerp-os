<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition template="/template.xhtml">


        <ui:define name="title">
            <h:outputText value="#{bundle.ListPasswordManagementTitle}"></h:outputText>
        </ui:define>

        <ui:define name="body">
            <h:form id="PasswordManagementListForm">
                <p:panel header="#{bundle.ListPasswordManagementTitle}">
                    <p:dataTable id="datalist" value="#{passwordManagementController.items}" var="item"
                                 selectionMode="single" selection="#{passwordManagementController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListPasswordManagementTitle_id}"/>
                            </f:facet>
                            <h:outputText value="#{item.id}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListPasswordManagementTitle_employeeId}"/>
                            </f:facet>
                            <h:outputText value="#{item.employeeId}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListPasswordManagementTitle_ruleType}"/>
                            </f:facet>
                            <h:outputText value="#{item.ruleType}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListPasswordManagementTitle_twoFactor}"/>
                            </f:facet>
                            <h:outputText value="#{item.twoFactor}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListPasswordManagementTitle_changeInterval}"/>
                            </f:facet>
                            <h:outputText value="#{item.changeInterval}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListPasswordManagementTitle_creationDate}"/>
                            </f:facet>
                            <h:outputText value="#{item.creationDate}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{bundle.Create}" actionListener="#{passwordManagementController.prepareCreate}" update=":PasswordManagementCreateForm" oncomplete="PF('PasswordManagementCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{bundle.View}" update=":PasswordManagementViewForm" oncomplete="PF('PasswordManagementViewDialog').show()" disabled="#{empty passwordManagementController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{bundle.Edit}" update=":PasswordManagementEditForm" oncomplete="PF('PasswordManagementEditDialog').show()" disabled="#{empty passwordManagementController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{bundle.Delete}" actionListener="#{passwordManagementController.destroy}" update=":growl,datalist" disabled="#{empty passwordManagementController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>

            <ui:include src="Create.xhtml"/>
            <ui:include src="Edit.xhtml"/>
            <ui:include src="View.xhtml"/>
        </ui:define>
    </ui:composition>

</html>
