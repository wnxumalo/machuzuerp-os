<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../../erpbyw-template.xhtml">
            <ui:define name="content">
                <h1>View Employee</h1>
                <br></br>  
                
                <ui:include src="employeeBenefit/Create.xhtml"/>
                
                <h:form id="frmEmpCommands" styleClass="ui-fluid">                   

                    <p:messages id="messages" showDetail="true" closable="true">
                        <p:autoUpdate />
                    </p:messages>

                    <p:commandButton icon="ui-icon-search" title="Payslips" action="/hr/employees/employee-pay" style="width:100%" />
                    <p:commandButton value="Print" type="button" icon="ui-icon-print" style="display:block;margin-bottom: 20px">
                        <p:printer target="fsPayslip" />
                    </p:commandButton> 
                
                <br></br>
                                
                <p:fieldset id="fsPayslip" legend="PAYSLIP" style="font-size:12px;">                    
                        <tr><td>                                
                                
                                    <p:panelGrid columns="2" style="width: 100%">                                                                    
                                        <h:outputLabel value="ID: "/><h:outputText value="#{employeeController.selected.id}"/>
                                        <h:outputLabel value="ID Number: "/><h:outputText value="#{employeeController.selected.idNumber}"/>
                                        <h:outputLabel value="Tax Number: "/><h:outputText value="#{employeeController.selected.taxNumber}"/>
                                        <h:outputLabel value="Employee Number: "/><h:outputText value="#{employeeController.selected.employeeNumber}"/>
                                        <h:outputLabel value="Employment Date: "/><h:outputText value="#{employeeController.selected.employmentDate}"/>
                                        <h:outputLabel value="Name: "/><h:outputText value="#{employeeController.selected.empName}"/>
                                        <h:outputLabel value="Surname: "/><h:outputText value="#{employeeController.selected.surname}"/>
                                        <h:outputLabel value="Position: "/><h:outputText value="#{employeeController.selected.position}"/>
                                        <h:outputLabel value="Department "/><h:outputText value="#{employeeController.selected.department}"/>
                                        <h:outputLabel value="Level: "/><h:outputText value="#{employeeController.selected.empLevel}"/>
                                        <h:outputLabel value="Approver "/><h:outputText value="#{employeeController.selected.approver}"/>
                                        <h:outputLabel value="Gender: "/><h:outputText value="#{employeeController.selected.gender}"/>
                                        <h:outputLabel value="Telephone: "/><h:outputText value="#{employeeController.selected.telephone}"/>
                                        <h:outputLabel value="Cellphone: "/><h:outputText value="#{employeeController.selected.cellphone}"/>
                                        <h:outputLabel value="Email: "/><h:outputText value="#{employeeController.selected.email}"/>
                                        <h:outputLabel value="Postal Address: "/><h:outputText value="#{employeeController.selected.postalAddress}"/>                                        
                                        <h:outputLabel value="Salary Interval:"/><h:outputText value="#{employeeController.selected.salaryInterval}"/>
                                        <h:outputLabel value="Status:"/><h:outputText value="#{employeeController.selected.status}"/>                                                                        
                                        <h:outputLabel value=" " style="font-weight:bold"/><h:outputText  value=""/>
                                        <h:outputLabel value="SALARY " style="font-weight:bold"/><h:outputText  value="#{employeeController.salary}"/>
                                        <h:outputLabel value="BENEFITS " style="font-weight:bold"/><h:outputText  value="#{employeeController.totalBenefits}"/>
                                        <h:outputLabel value="DEDUCTIONS " style="font-weight:bold"/><h:outputText  value="#{employeeController.totalDeductions}"/>
                                        <h:outputLabel value="NETT SALARY " style="font-weight:bold"/><h:outputText  value="#{employeeController.totalPackage}"/>
                                    </p:panelGrid>                                
                                <br></br>

                            </td>
                            <h3>Benefits</h3>
                            <td valign="top" width="10%">
                                                               
                                    <table width="100%" border="1"><th align="left">#</th><th align="left">Description</th><th align="left">Amount</th>
                                        <ui:repeat id="rptBenefits" value="#{employeeController.selected.employeeBenefits}" var="bens">
                                            <tr><td><h:outputLabel value="#{bens.id}"/></td>
                                                <td><h:outputLabel value="#{bens.description}"/></td>
                                                <td><h:outputLabel value="#{bens.amount}"/></td></tr>
                                        </ui:repeat>
                                    </table>
                                
                            </td>
                            <h3>Deductions</h3>
                            <td valign="top" width="10%">
                                
                                    <table width="100%" border="1"><th align="left">#</th><th align="left">Description</th><th align="left">Amount</th>
                                        <ui:repeat id="rptDeductions" value="#{employeeController.selected.employeeDeduction}" var="deds">
                                            <tr><td><h:outputLabel value="#{deds.id}"/></td>
                                                <td><h:outputLabel value="#{deds.description}"/></td>
                                                <td><h:outputLabel value="#{deds.amount}"/></td></tr>
                                        </ui:repeat>
                                    </table>
                                
                            </td>
                            <h3>Leave</h3>
                            <td valign="top" width="10%">
                                <table width="100%" border="1"><th width="20%" align="left">Comments</th><th align="left" width="10%">Type</th><th align="left" width="10%">Start Date</th><th align="left" width="25%">End Date</th>
                                    <ui:repeat id="rptLeave" value="#{employeeController.selected.employeeLeave}" var="emplve">                                    
                                        <tr><td><h:outputLabel value="#{emplve.comments}"/></td>
                                            <td><h:outputLabel value="#{emplve.type}"/></td>
                                                <td><h:outputLabel value="#{emplve.startDate}"/></td>
                                                <td><h:outputLabel value="#{emplve.endDate}"/></td></tr>
                                        </ui:repeat>
                                </table>
                                
                            </td>
                            <h3>Trainings</h3>
                            <td valign="top" width="20%">                                
                                    <table width="100%" border="1"><th align="left">#</th><th align="left">Description</th><th align="left">Start</th><th align="left">End</th><th align="left">Outputs</th><th align="left">Status</th><th align="left">Comments</th>
                                        <ui:repeat id="rptTrainings" value="#{employeeController.selected.employeeTraining}" var="trains">                                    
                                            <tr><td><h:outputLabel value="#{trains.id}"/></td>
                                                <td><h:outputLabel value="#{trains.description}"/></td>
                                                <td><h:outputLabel value="#{trains.startDate}"/></td>
                                                <td><h:outputLabel value="#{trains.endDate}"/></td>
                                                <td><h:outputLabel value="#{trains.outputs}"/></td>
                                                <td><h:outputLabel value="#{trains.status}"/></td>
                                                <td><h:outputLabel value="#{trains.comments}"/></td></tr>                                                                                                
                                        </ui:repeat>
                                    </table>

                            </td>

                        </tr>                   
                </p:fieldset>
</h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
