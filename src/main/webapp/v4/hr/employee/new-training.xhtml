<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
        <ui:composition template="../../erpbyw-template.xhtml">
            <ui:define name="content">

                <h:form styleClass="ui-fluid">
                    <p:commandButton value="Back" action="#{employeesData.refreshEmployee(param['recnum'])}"  style="width:100%" global="true">
                        
                        
                        <f:param name="recnum" value="#{employeesData.recNum}" />
                    </p:commandButton>
                </h:form>
                <h:form styleClass="ui-fluid">
                    <h1>New Training</h1>

                    <p:messages id="messages" showDetail="true" closable="true">
                        <p:autoUpdate />
                    </p:messages>
                    
                    <p:panelGrid columns="2" >                        
                        <p:outputLabel for="StartDate" value="Start Date" />
                        <p:calendar id="StartDate" value="#{trainings.startDate}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                        <p:outputLabel for="EndDate" value="End Date" />
                        <p:calendar id="EndDate" value="#{trainings.endDate}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                        <p:outputLabel for="Description" value="Description" />
                        <p:inputText id="Description" value="#{trainings.description}" required="true" />                                                                        
                        <p:outputLabel for="Outputs" value="Outputs" />
                        <p:inputText id="Outputs" value="#{trainings.outputs}" required="true" />                                                                        
                        <p:outputLabel for="Status" value="Status" />
                        <p:selectOneMenu id="Status" value="#{trainings.status}" style="width:125px">
                            <f:selectItem itemLabel="Select" itemValue="" />
                            <f:selectItem itemLabel="Planned" itemValue="Planned" />
                            <f:selectItem itemLabel="Complete" itemValue="Complete" />                            
                            <f:selectItem itemLabel="Cancelled" itemValue="Cancelled" />                                                        
                        </p:selectOneMenu>
                        <p:outputLabel for="Comments" value="Comments" />
                        <p:inputTextarea id="Comments" value="#{trainings.comments}" required="true" />                                                                                                
                    </p:panelGrid>
                    &nbsp;&nbsp;&nbsp;
                    <p:commandButton value="Save" action="#{trainings.saveTraining()}"  style="width:100%" global="true">
                        
                        
                        <f:param name="recnum" value="#{employeesData.recNum}" />
                    </p:commandButton>

                </h:form>

            </ui:define>

        </ui:composition>

    </body>
</html>
