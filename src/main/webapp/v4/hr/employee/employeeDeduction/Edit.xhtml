<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="EmployeeDeductionEditDlg" widgetVar="EmployeeDeductionEditDialog" modal="true" resizable="false" appendTo="@(dialog)" header="Employee Deduction">
            <h:form id="EmployeeDeductionEditForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{employeeDeductionController.selected != null}">
                        <p:outputLabel for="description" value="Description"/>
                        <p:selectOneMenu id="description" value="#{employeeDeductionController.selected.description}" style="width:125px" required="true">
                            <f:selectItem itemLabel="Select" itemValue="" />                            
                            <f:selectItem itemLabel="PAYE" itemValue="PAYE" />
                            <f:selectItem itemLabel="Provident Fund" itemValue="Provident Fund" />
                            <f:selectItem itemLabel="Home Loan" itemValue="Home Loan" />
                            <f:selectItem itemLabel="Personal Loan" itemValue="Personal Loan" />
                            <f:selectItem itemLabel="Loan Advance" itemValue="Loan Advance" />
                            <f:selectItem itemLabel="Loan" itemValue="Loan" />
                            <f:selectItem itemLabel="Other" itemValue="Other" />                            
                        </p:selectOneMenu>
                        <p:outputLabel for="amount" value="Amount" />
                        <p:inputText id="amount" value="#{employeeDeductionController.selected.amount}" required="true" />
                    </p:panelGrid>
                    <p:commandButton actionListener="#{employeeDeductionController.update}" value="#{bundle.Save}" update="display,:EmployeeDeductionListForm:deductionDatalist,:growl"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="EmployeeDeductionEditDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
