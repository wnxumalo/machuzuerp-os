<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="EmployeeDeductionViewDlg" widgetVar="EmployeeDeductionViewDialog" modal="true" resizable="false" appendTo="@(dialog)" header="Employee Deduction">
            <h:form id="EmployeeDeductionViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{employeeDeductionController.selected != null}">
                        <h:outputText value="Id"/>
                        <h:outputText value="#{employeeDeductionController.selected.id}" title="#{bundle.ViewEmployeeDeductionTitle_id}"/>
                        <h:outputText value="Employee Id"/>
                        <h:outputText value="#{employeeDeductionController.selected.employeeId}" title="#{bundle.ViewEmployeeDeductionTitle_employeeId}"/>
                        <h:outputText value="Description"/>
                        <h:outputText value="#{employeeDeductionController.selected.description}" title="#{bundle.ViewEmployeeDeductionTitle_description}"/>
                        <h:outputText value="Amount"/>
                        <h:outputText value="#{employeeDeductionController.selected.amount}" title="#{bundle.ViewEmployeeDeductionTitle_amount}"/>
                        <h:outputText value="Creation Date"/>
                        <h:outputText value="#{employeeDeductionController.selected.creationDate}" title="#{bundle.ViewEmployeeDeductionTitle_creationDate}">
                            <f:convertDateTime pattern="MM/dd/yyyy" />
                        </h:outputText>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="EmployeeDeductionViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
