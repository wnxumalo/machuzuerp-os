<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="EmployeeCreateDlg" widgetVar="EmployeeCreateDialog" modal="true" resizable="false" appendTo="@(dialog)" header="Create Employee">
            <h:form id="EmployeeCreateForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="4" rendered="#{employeeController.selected != null}">
                        <p:outputLabel for="VatNum" value="ID Number"/>
                        <p:inputText id="VatNum" value="#{employeeController.selected.idNumber}" required="true" />
                        <p:outputLabel for="TaxNum" value="Tax Number" />
                        <p:inputText id="TaxNum" value="#{employeeController.selected.taxNumber}" required="true" />
                        <p:outputLabel for="EmpNum" value="Employee Number" />
                        <p:inputText id="EmpNum" value="#{employeeController.selected.employeeNumber}" required="true" />
                        <p:outputLabel for="JoiningDate" value="Employment Date" />
                        <p:calendar id="JoiningDate" value="#{employeeController.selected.employmentDate}" readonlyInput="true" pattern="yyyy/MM/dd" navigator="true" required="true" />
                        <p:outputLabel for="Name" value="Name"/>
                        <p:inputText id="Name" value="#{employeeController.selected.empName}" required="true" />
                        <p:outputLabel for="Surname" value="Surname" />
                        <p:inputText id="Surname" value="#{employeeController.selected.surname}" />
                        <p:outputLabel for="Position" value="Position" />
                        <p:inputText id="Position" value="#{employeeController.selected.position}" />
                        <p:outputLabel for="Department" value="Department"/>
                        <p:selectOneMenu id="Department" value="#{employeeController.selected.department}" style="width:125px">
                            <f:selectItem itemLabel="Select Department" itemValue="" />
                            <f:selectItem itemLabel="Production" itemValue="Production" />                                        
                            <f:selectItem itemLabel="Research and Development" itemValue="Research and Development" />                                        
                            <f:selectItem itemLabel="Purchasing" itemValue="Purchasing" />                                                        
                            <f:selectItem itemLabel="Marketing" itemValue="Marketing" />                            
                            <f:selectItem itemLabel="Accounting and Finance" itemValue="Accounting and Finance" />
                            <f:selectItem itemLabel="Information Technology" itemValue="Information Technology" />
                            <f:selectItem itemLabel="Human Resources" itemValue="Human Resources" />
                            <f:selectItem itemLabel="Administration" itemValue="Administration" />
                            <f:selectItem itemLabel="Commercial" itemValue="Commercial" />
                        </p:selectOneMenu>       
                        <p:outputLabel for="Gender" value="Gender"/>
                        <p:selectOneMenu id="Gender" value="#{employeeController.selected.gender}" style="width:125px">
                            <f:selectItem itemLabel="Select Gender" itemValue="" />
                            <f:selectItem itemLabel="Male" itemValue="Male" />
                            <f:selectItem itemLabel="Female" itemValue="Female" />                            
                            <f:selectItem itemLabel="Undisclosed" itemValue="Undisclosed" />                                                        
                        </p:selectOneMenu>
                        <p:outputLabel for="Level" value="Level"/>
                        <p:selectOneMenu id="Level" value="#{employeeController.selected.empLevel}" style="width:125px">
                            <f:selectItem itemLabel="Select Level" itemValue="" />
                            <f:selectItem itemLabel="Junior" itemValue="Junior" />                                        
                            <f:selectItem itemLabel="Officer" itemValue="Officer" />                                        
                            <f:selectItem itemLabel="Supervisor" itemValue="Supervisor" />                                                        
                            <f:selectItem itemLabel="Management" itemValue="Management" />                            
                            <f:selectItem itemLabel="Board" itemValue="Board" />                            
                        </p:selectOneMenu>
                        <p:outputLabel for="Telephone" value="Telephone" />
                        <p:inputText id="Telephone" value="#{employeeController.selected.telephone}" />
                        <p:outputLabel for="Cellphone" value="Cellphone" />
                        <p:inputText id="Cellphone" value="#{employeeController.selected.cellphone}" required="true"/>
                        <p:outputLabel for="Email" value="Email" />
                        <p:inputText id="Email" value="#{employeeController.selected.email}" required="true">
                            <f:validator validatorId="custom.emailValidator" />
                        </p:inputText>
                        <p:outputLabel for="PostalAddress" value="Postal Address" />
                        <p:inputText id="PostalAddress" value="#{employeeController.selected.postalAddress}" required="true" />                        
                        <p:outputLabel for="BankName" value="Bank Name" />
                        <p:inputText id="BankName" value="#{employeeController.selected.empBankName}" />
                        <p:outputLabel for="BranchCode" value="Branch Code" />
                        <p:inputText id="BranchCode" value="#{employeeController.selected.branchCode}" />
                        <p:outputLabel for="AccountName" value="Account Name" />
                        <p:inputText id="AccountName" value="#{employeeController.selected.empBankAccName}" />
                        <p:outputLabel for="AccountNumber" value="Account Number" />
                        <p:inputText id="AccountNumber" value="#{employeeController.selected.empBankAccNum}" />
                        <p:outputLabel for="Salary" value="Salary" />
                        <p:inputNumber id="Salary" value="#{employeeController.selected.salary}" />
                        <p:outputLabel for="SalaryInterval" value="Salary Interval"/>
                        <p:selectOneMenu id="SalaryInterval" value="#{employeeController.selected.salaryInterval}" style="width:125px">
                            <f:selectItem itemLabel="Select Interval" itemValue="" />
                            <f:selectItem itemLabel="Monthly" itemValue="Monthly" />
                            <f:selectItem itemLabel="Annually" itemValue="Annually" />                            
                        </p:selectOneMenu>                 
                        <p:outputLabel for="Status" value="Status"/>
                        <p:selectOneMenu id="Status" value="#{employeeController.selected.status}" style="width:125px" required="true">
                            <f:selectItem itemLabel="Select Status" itemValue="" />
                            <f:selectItem itemLabel="Probation" itemValue="Probation" />                            
                            <f:selectItem itemLabel="Employed" itemValue="Employed" />                                        
                            <f:selectItem itemLabel="Dismissed" itemValue="Dismissed" />                            
                            <f:selectItem itemLabel="Resigned" itemValue="Resigned" />                            
                        </p:selectOneMenu>
                        <p:outputLabel for="Supervisor" value="Supervisor"/>
                        <h:selectOneMenu id='Supervisor' value="#{employeeController.employeeDTO}" converter="employeeConverter">
                            <f:selectItems value="#{employeeController.employeesDTO}" var="employee" 
                                           itemValue="#{employee}"
                                           itemLabel="#{employee.name} #{employee.surname}"/>
                        </h:selectOneMenu>                            
                        <p:outputLabel for="approver" value="Approver"/>
                        <p:selectOneMenu id="approver" value="#{employeeController.selected.approver}" style="width:125px">
                            <f:selectItem itemLabel="" itemValue="" />
                            <f:selectItem itemLabel="Yes" itemValue="Yes" />
                            <f:selectItem itemLabel="No" itemValue="No" />
                        </p:selectOneMenu>
                    </p:panelGrid>
                    <p:commandButton actionListener="#{employeeController.create(organisationController.selected.id)}" value="#{bundle.Save}" update="display,:EmployeeListForm:employeeDatalist,:growl"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="EmployeeCreateDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
