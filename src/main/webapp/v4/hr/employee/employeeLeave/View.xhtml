<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="EmployeeLeaveViewDlg" widgetVar="EmployeeLeaveViewDialog" modal="true" resizable="false" appendTo="@(dialog)" header="Employee Leave">
            <h:form id="EmployeeLeaveViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{employeeLeaveController.selected != null}">
                        <h:outputText value="Id"/>
                        <h:outputText value="#{employeeLeaveController.selected.id}" title="#{bundle.ViewEmployeeLeaveTitle_id}"/>
                        <h:outputText value="Type"/>
                        <h:outputText value="#{employeeLeaveController.selected.type}" title="#{bundle.ViewEmployeeLeaveTitle_type}"/>
                        <h:outputText value="Start Date"/>
                        <h:outputText value="#{employeeLeaveController.selected.startDate}" title="#{bundle.ViewEmployeeLeaveTitle_startDate}"/>
                        <h:outputText value="End Date"/>
                        <h:outputText value="#{employeeLeaveController.selected.endDate}" title="#{bundle.ViewEmployeeLeaveTitle_endDate}"/>
                        <h:outputText value="Comments"/>
                        <h:outputText value="#{employeeLeaveController.selected.comments}" title="#{bundle.ViewEmployeeLeaveTitle_comments}"/>
                        <h:outputText value="Creation Date"/>
                        <h:outputText value="#{employeeLeaveController.selected.creationDate}" title="#{bundle.ViewEmployeeLeaveTitle_creationDate}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="EmployeeLeaveViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
