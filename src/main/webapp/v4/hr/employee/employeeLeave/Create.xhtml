<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="EmployeeLeaveCreateDlg" widgetVar="EmployeeLeaveCreateDialog" modal="true" resizable="false" appendTo="@(dialog)" header="Create Employee Leave">
            <h:form id="EmployeeLeaveCreateForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{employeeLeaveController.selected != null}">
                        <p:outputLabel value="Type" for="type" />
                        <p:selectOneMenu id="type" value="#{employeeLeaveController.selected.type}" style="width:125px">
                            <f:selectItem itemLabel="Accumulated" itemValue="Accumulated" />
                            <f:selectItem itemLabel="Vocational" itemValue="Vocational" />                                        
                            <f:selectItem itemLabel="Carry-Over" itemValue="Carry-Over" />                            
                            <f:selectItem itemLabel="Sick" itemValue="Sick" /> 
                            <f:selectItem itemLabel="Maternity" itemValue="Maternity" />
                            <f:selectItem itemLabel="Compassionate" itemValue="Compassionate" />
                            <f:selectItem itemLabel="Casual" itemValue="Casual" />
                            <f:selectItem itemLabel="Study" itemValue="Study" />
                            <f:selectItem itemLabel="Other" itemValue="Other" />                                        
                        </p:selectOneMenu>
                        <p:outputLabel value="Start Date" for="startDate" />
                        <p:calendar id="startDate" pattern="MM/dd/yyyy" value="#{employeeLeaveController.selected.startDate}" title="#{bundle.EditEmployeeDeductionTitle_creationDate}"  showOn="button"/>
                        <p:outputLabel value="End Date" for="endDate" />
                        <p:calendar id="endDate" pattern="MM/dd/yyyy" value="#{employeeLeaveController.selected.endDate}" title="#{bundle.EditEmployeeDeductionTitle_creationDate}"  showOn="button"/>
                        <p:outputLabel value="Comments" for="comments" />
                        <p:inputText id="comments" value="#{employeeLeaveController.selected.comments}" title="#{bundle.CreateEmployeeLeaveTitle_comments}" />
                    </p:panelGrid>
                    <p:commandButton actionListener="#{employeeLeaveController.create(employeeController.selected.id)}" value="#{bundle.Save}" update="display,:EmployeeLeaveListForm:leaveDatalist,:growl"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="EmployeeLeaveCreateDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
