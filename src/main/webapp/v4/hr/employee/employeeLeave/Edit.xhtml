<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="EmployeeLeaveEditDlg" widgetVar="EmployeeLeaveEditDialog" modal="true" resizable="false" appendTo="@(dialog)" header="Edit Employee Leave">
            <h:form id="EmployeeLeaveEditForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{employeeLeaveController.selected != null}">
                        <p:outputLabel value="Type" for="type" />
                        <p:inputText id="type" value="#{employeeLeaveController.selected.type}" title="#{bundle.EditEmployeeLeaveTitle_type}" />
                        <p:outputLabel value="Start Date" for="startDate" />
                        <p:inputText id="startDate" value="#{employeeLeaveController.selected.startDate}" title="#{bundle.EditEmployeeLeaveTitle_startDate}" />
                        <p:outputLabel value="End Date" for="endDate" />
                        <p:inputText id="endDate" value="#{employeeLeaveController.selected.endDate}" title="#{bundle.EditEmployeeLeaveTitle_endDate}" />
                        <p:outputLabel value="Comments" for="comments" />
                        <p:inputText id="comments" value="#{employeeLeaveController.selected.comments}" title="#{bundle.EditEmployeeLeaveTitle_comments}" />
                    </p:panelGrid>
                    <p:commandButton actionListener="#{employeeLeaveController.update}" value="#{bundle.Save}" update="display,:EmployeeLeaveListForm:leaveDatalist,:growl"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="EmployeeLeaveEditDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
