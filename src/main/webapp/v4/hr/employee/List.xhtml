<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition template="/erpbyw-template.xhtml">


        <ui:define name="title">
            <h:outputText value="Employees"></h:outputText>
        </ui:define>

        <ui:define name="content">
            
            <ui:include src="Create.xhtml"/>
            <ui:include src="Edit.xhtml"/>
            <ui:include src="View.xhtml"/>

            <ui:include src="employeeBenefit/Create.xhtml"/>
            <ui:include src="employeeBenefit/Edit.xhtml"/>
            <ui:include src="employeeBenefit/View.xhtml"/>

            <ui:include src="employeeDeduction/Create.xhtml"/>
            <ui:include src="employeeDeduction/Edit.xhtml"/>
            <ui:include src="employeeDeduction/View.xhtml"/>
            
            <ui:include src="employeeLeave/Create.xhtml"/>
            <ui:include src="employeeLeave/Edit.xhtml"/>
            <ui:include src="employeeLeave/View.xhtml"/>

            <ui:include src="employeeTraining/Create.xhtml"/>
            <ui:include src="employeeTraining/Edit.xhtml"/>
            <ui:include src="employeeTraining/View.xhtml"/>


            <h:form id="EmployeeListForm">
                                
                <p:panel header="List Employees">
                    <p:dataTable id="employeeDatalist" value="#{employeeController.employeesDTO}" var="item"
                                 selectionMode="single" selection="#{employeeController.employeeDTO}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect" listener="#{employeeController.onRowSelect}" update="createButton viewButton editButton deleteButton :EmployeeLeaveListForm:leaveDatalist :EmployeeBenefitListForm:benefitDatalist :EmployeeDeductionListForm:deductionDatalist :EmployeeTrainingListForm:trainingDatalist"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Id"/>
                            </f:facet>
                            <h:outputText value="#{item.id}"/>
                        </p:column>
                        <!--p:column>
                            <f:facet name="header">
                                <h:outputText value="Employment Date"/>
                            </f:facet>
                            <h:outputText value="#{item.employmentDate}">
                                <f:convertDateTime pattern="MM/dd/yyyy" />
                            </h:outputText>
                        </p:column-->
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Name"/>
                            </f:facet>
                            <h:outputText value="#{item.name}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Surname"/>
                            </f:facet>
                            <h:outputText value="#{item.surname}"/>
                        </p:column>
                        <!--p:column>
                            <f:facet name="header">
                                <h:outputText value="Gender"/>
                            </f:facet>
                            <h:outputText value="#{item.gender}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Telephone"/>
                            </f:facet>
                            <h:outputText value="#{item.telephone}"/>
                        </p:column-->
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Cellphone"/>
                            </f:facet>
                            <h:outputText value="#{item.cellphone}"/>
                        </p:column>
                        <!--p:column>
                            <f:facet name="header">
                                <h:outputText value="Email"/>
                            </f:facet>
                            <h:outputText value="#{item.email}"/>
                        </p:column-->
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{bundle.Create}" actionListener="#{employeeController.prepareCreate}" update="EmployeeCreateForm" oncomplete="PF('EmployeeCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{bundle.View}" update=":EmployeeViewForm" oncomplete="PF('EmployeeViewDialog').show()" disabled="#{empty employeeController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{bundle.Edit}" update=":EmployeeEditForm" oncomplete="PF('EmployeeEditDialog').show()" disabled="#{empty employeeController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{bundle.Delete}" actionListener="#{employeeController.destroy}" update=":growl,employeeDatalist" disabled="#{empty employeeController.selected}"/>                            
                        </f:facet>
                    </p:dataTable>
                    <p:commandButton id="payslipButton" icon="ui-icon-plus" actionListener="#{employeeController.setPayslip()}" value="VIEW PAYSLIP" action="view-payslip"/>
                </p:panel>                            
            
            </h:form>

            <h:form id="EmployeeLeaveListForm">
                <p:panel header="Leave">
                    <p:dataTable id="leaveDatalist" value="#{employeeController.selected.employeeLeave}" var="item"
                                 selectionMode="single" selection="#{employeeLeaveController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Type"/>
                            </f:facet>
                            <h:outputText value="#{item.type}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Start Date"/>
                            </f:facet>
                            <h:outputText value="#{item.startDate}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="End Date"/>
                            </f:facet>
                            <h:outputText value="#{item.endDate}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Comments"/>
                            </f:facet>
                            <h:outputText value="#{item.comments}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{bundle.Create}" actionListener="#{employeeLeaveController.prepareCreate}" update=":EmployeeLeaveCreateForm" oncomplete="PF('EmployeeLeaveCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{bundle.View}" update=":EmployeeLeaveViewForm" oncomplete="PF('EmployeeLeaveViewDialog').show()" disabled="#{empty employeeLeaveController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{bundle.Edit}" update=":EmployeeLeaveEditForm" oncomplete="PF('EmployeeLeaveEditDialog').show()" disabled="#{empty employeeLeaveController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{bundle.Delete}" actionListener="#{employeeLeaveController.destroy}" update=":growl,leaveDatalist" disabled="#{empty employeeLeaveController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>            

            <h:form id="EmployeeBenefitListForm">
                <p:panel header="Benefits">
                    <p:dataTable id="benefitDatalist" value="#{employeeController.selected.employeeBenefits}" var="item"
                                 selectionMode="single" selection="#{employeeBenefitController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Description"/>
                            </f:facet>
                            <h:outputText value="#{item.description}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Amount"/>
                            </f:facet>
                            <h:outputText value="#{item.amount}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="Create" actionListener="#{employeeBenefitController.prepareCreate}" update=":EmployeeBenefitCreateForm" oncomplete="PF('EmployeeBenefitCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="View" update=":EmployeeBenefitViewForm" oncomplete="PF('EmployeeBenefitViewDialog').show()" disabled="#{empty employeeBenefitController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="Edit" update=":EmployeeBenefitEditForm" oncomplete="PF('EmployeeBenefitEditDialog').show()" disabled="#{empty employeeBenefitController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="Delete" actionListener="#{employeeBenefitController.destroy}" update=":growl,benefitDatalist" disabled="#{empty employeeBenefitController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>
            
            <h:form id="EmployeeDeductionListForm">
                <p:panel header="Deductions">
                    <p:dataTable id="deductionDatalist" value="#{employeeController.selected.employeeDeduction}" var="item"
                                 selectionMode="single" selection="#{employeeDeductionController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Description"/>
                            </f:facet>
                            <h:outputText value="#{item.description}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Amount"/>
                            </f:facet>
                            <h:outputText value="#{item.amount}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="Create" actionListener="#{employeeDeductionController.prepareCreate}" update=":EmployeeDeductionCreateForm" oncomplete="PF('EmployeeDeductionCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="View" update=":EmployeeDeductionViewForm" oncomplete="PF('EmployeeDeductionViewDialog').show()" disabled="#{empty employeeDeductionController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="Edit" update=":EmployeeDeductionEditForm" oncomplete="PF('EmployeeDeductionEditDialog').show()" disabled="#{empty employeeDeductionController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="Delete" actionListener="#{employeeDeductionController.destroy}" update=":growl,deductionDatalist" disabled="#{empty employeeDeductionController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>
            
            <h:form id="EmployeeTrainingListForm">
                <p:panel header="Trainings">
                    <p:dataTable id="trainingDatalist" value="#{employeeController.selected.employeeTraining}" var="item"
                                 selectionMode="single" selection="#{employeeTrainingController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Description"/>
                            </f:facet>
                            <h:outputText value="#{item.description}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Outputs"/>
                            </f:facet>
                            <h:outputText value="#{item.outputs}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Start Date"/>
                            </f:facet>
                            <h:outputText value="#{item.startDate}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="End Date"/>
                            </f:facet>
                            <h:outputText value="#{item.endDate}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Status"/>
                            </f:facet>
                            <h:outputText value="#{item.status}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Comments"/>
                            </f:facet>
                            <h:outputText value="#{item.comments}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{bundle.Create}" actionListener="#{employeeTrainingController.prepareCreate}" update=":EmployeeTrainingCreateForm" oncomplete="PF('EmployeeTrainingCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{bundle.View}" update=":EmployeeTrainingViewForm" oncomplete="PF('EmployeeTrainingViewDialog').show()" disabled="#{empty employeeTrainingController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{bundle.Edit}" update=":EmployeeTrainingEditForm" oncomplete="PF('EmployeeTrainingEditDialog').show()" disabled="#{empty employeeTrainingController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{bundle.Delete}" actionListener="#{employeeTrainingController.destroy}" update=":growl,:EmployeeTrainingListForm:trainingDatalist" disabled="#{empty employeeTrainingController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>
                        
        </ui:define>
    </ui:composition>

</html>
