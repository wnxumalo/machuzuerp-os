<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition template="/template.xhtml">


        <ui:define name="title">
            <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle}"></h:outputText>
        </ui:define>

        <ui:define name="body">
            <h:form id="InventoryStorageSpaceListForm">
                <p:panel header="#{bundle.ListInventoryStorageSpaceTitle}">
                    <p:dataTable id="datalist" value="#{inventoryStorageSpaceController.items}" var="item"
                                 selectionMode="single" selection="#{inventoryStorageSpaceController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >

                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_id}"/>
                            </f:facet>
                            <h:outputText value="#{item.id}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_inventoryStorageId}"/>
                            </f:facet>
                            <h:outputText value="#{item.inventoryStorageId}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_description}"/>
                            </f:facet>
                            <h:outputText value="#{item.description}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_type}"/>
                            </f:facet>
                            <h:outputText value="#{item.type}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_label}"/>
                            </f:facet>
                            <h:outputText value="#{item.label}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_totalArea}"/>
                            </f:facet>
                            <h:outputText value="#{item.totalArea}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_occupiedArea}"/>
                            </f:facet>
                            <h:outputText value="#{item.occupiedArea}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_availableArea}"/>
                            </f:facet>
                            <h:outputText value="#{item.availableArea}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_rackingType}"/>
                            </f:facet>
                            <h:outputText value="#{item.rackingType}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_rackingCapacity}"/>
                            </f:facet>
                            <h:outputText value="#{item.rackingCapacity}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_utilizedCapacity}"/>
                            </f:facet>
                            <h:outputText value="#{item.utilizedCapacity}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_accessType}"/>
                            </f:facet>
                            <h:outputText value="#{item.accessType}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_accessibilityScore}"/>
                            </f:facet>
                            <h:outputText value="#{item.accessibilityScore}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_temperatureRequirements}"/>
                            </f:facet>
                            <h:outputText value="#{item.temperatureRequirements}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_securityLevel}"/>
                            </f:facet>
                            <h:outputText value="#{item.securityLevel}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_lastOptimized}"/>
                            </f:facet>
                            <h:outputText value="#{item.lastOptimized}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_responsibleManager}"/>
                            </f:facet>
                            <h:outputText value="#{item.responsibleManager}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_implementationDate}"/>
                            </f:facet>
                            <h:outputText value="#{item.implementationDate}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{bundle.ListInventoryStorageSpaceTitle_status}"/>
                            </f:facet>
                            <h:outputText value="#{item.status}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{bundle.Create}" actionListener="#{inventoryStorageSpaceController.prepareCreate}" update=":InventoryStorageSpaceCreateForm" oncomplete="PF('InventoryStorageSpaceCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{bundle.View}" update=":InventoryStorageSpaceViewForm" oncomplete="PF('InventoryStorageSpaceViewDialog').show()" disabled="#{empty inventoryStorageSpaceController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{bundle.Edit}" update=":InventoryStorageSpaceEditForm" oncomplete="PF('InventoryStorageSpaceEditDialog').show()" disabled="#{empty inventoryStorageSpaceController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{bundle.Delete}" actionListener="#{inventoryStorageSpaceController.destroy}" update=":growl,datalist" disabled="#{empty inventoryStorageSpaceController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>

            <ui:include src="Create.xhtml"/>
            <ui:include src="Edit.xhtml"/>
            <ui:include src="View.xhtml"/>
        </ui:define>
    </ui:composition>

</html>
