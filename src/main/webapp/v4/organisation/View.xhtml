<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="OrganisationViewDlg" widgetVar="OrganisationViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewOrganisationTitle}">
            <h:form id="OrganisationViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{organisationController.selected != null}">
                        <h:outputText value="#{bundle.ViewOrganisationLabel_id}"/>
                        <h:outputText value="#{organisationController.selected.id}" title="#{bundle.ViewOrganisationTitle_id}"/>
                        <h:outputText value="#{bundle.ViewOrganisationLabel_vatNumber}"/>
                        <h:outputText value="#{organisationController.selected.vatNumber}" title="#{bundle.ViewOrganisationTitle_vatNumber}"/>
                        <h:outputText value="#{bundle.ViewOrganisationLabel_name}"/>
                        <h:outputText value="#{organisationController.selected.name}" title="#{bundle.ViewOrganisationTitle_name}"/>
                        <h:outputText value="#{bundle.ViewOrganisationLabel_telephone}"/>
                        <h:outputText value="#{organisationController.selected.telephone}" title="#{bundle.ViewOrganisationTitle_telephone}"/>
                        <h:outputText value="#{bundle.ViewOrganisationLabel_email}"/>
                        <h:outputText value="#{organisationController.selected.email}" title="#{bundle.ViewOrganisationTitle_email}"/>
                        <h:outputText value="#{bundle.ViewOrganisationLabel_city}"/>
                        <h:outputText value="#{organisationController.selected.city}" title="#{bundle.ViewOrganisationTitle_city}"/>
                        <h:outputText value="#{bundle.ViewOrganisationLabel_district}"/>
                        <h:outputText value="#{organisationController.selected.district}" title="#{bundle.ViewOrganisationTitle_district}"/>
                        <h:outputText value="#{bundle.ViewOrganisationLabel_country}"/>
                        <h:outputText value="#{organisationController.selected.country}" title="#{bundle.ViewOrganisationTitle_country}"/>
                        <h:outputText value="#{bundle.ViewOrganisationLabel_postalAddress}"/>
                        <h:outputText value="#{organisationController.selected.postalAddress}" title="#{bundle.ViewOrganisationTitle_postalAddress}"/>
                        <h:outputText value="#{bundle.ViewOrganisationLabel_physicalAddress}"/>
                        <h:outputText value="#{organisationController.selected.physicalAddress}" title="#{bundle.ViewOrganisationTitle_physicalAddress}"/>
                        <h:outputText value="#{bundle.ViewOrganisationLabel_interestRate}"/>
                        <h:outputText value="#{organisationController.selected.interestRate}" title="#{bundle.ViewOrganisationTitle_interestRate}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="OrganisationViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
