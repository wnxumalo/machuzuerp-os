<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="PurchaseRequisitionViewDlg" widgetVar="PurchaseRequisitionViewDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.ViewPurchaseRequisitionTitle}">
            <h:form id="PurchaseRequisitionViewForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{purchaseRequisitionController.selected != null}">
                        <h:outputText value="#{bundle.ViewPurchaseRequisitionLabel_id}"/>
                        <h:outputText value="#{purchaseRequisitionController.selected.id}" title="#{bundle.ViewPurchaseRequisitionTitle_id}"/>
                        <h:outputText value="#{bundle.ViewPurchaseRequisitionLabel_PODate}"/>
                        <h:outputText value="#{purchaseRequisitionController.selected.PODate}" title="#{bundle.ViewPurchaseRequisitionTitle_PODate}"/>
                        <h:outputText value="#{bundle.ViewPurchaseRequisitionLabel_deliveryDate}"/>
                        <h:outputText value="#{purchaseRequisitionController.selected.deliveryDate}" title="#{bundle.ViewPurchaseRequisitionTitle_deliveryDate}"/>
                        <h:outputText value="#{bundle.ViewPurchaseRequisitionLabel_shippingTerms}"/>
                        <h:outputText value="#{purchaseRequisitionController.selected.shippingTerms}" title="#{bundle.ViewPurchaseRequisitionTitle_shippingTerms}"/>
                        <h:outputText value="#{bundle.ViewPurchaseRequisitionLabel_shippingMethod}"/>
                        <h:outputText value="#{purchaseRequisitionController.selected.shippingMethod}" title="#{bundle.ViewPurchaseRequisitionTitle_shippingMethod}"/>
                        <h:outputText value="#{bundle.ViewPurchaseRequisitionLabel_paymentTerms}"/>
                        <h:outputText value="#{purchaseRequisitionController.selected.paymentTerms}" title="#{bundle.ViewPurchaseRequisitionTitle_paymentTerms}"/>
                        <h:outputText value="#{bundle.ViewPurchaseRequisitionLabel_supplierId}"/>
                        <h:outputText value="#{purchaseRequisitionController.selected.supplierId}" title="#{bundle.ViewPurchaseRequisitionTitle_supplierId}"/>
                        <h:outputText value="#{bundle.ViewPurchaseRequisitionLabel_inventoryId}"/>
                        <h:outputText value="#{purchaseRequisitionController.selected.inventoryId}" title="#{bundle.ViewPurchaseRequisitionTitle_inventoryId}"/>
                        <h:outputText value="#{bundle.ViewPurchaseRequisitionLabel_deliveryEmployeeId}"/>
                        <h:outputText value="#{purchaseRequisitionController.selected.deliveryEmployeeId}" title="#{bundle.ViewPurchaseRequisitionTitle_deliveryEmployeeId}"/>
                        <h:outputText value="#{bundle.ViewPurchaseRequisitionLabel_creationDate}"/>
                        <h:outputText value="#{purchaseRequisitionController.selected.creationDate}" title="#{bundle.ViewPurchaseRequisitionTitle_creationDate}">
                            <f:convertDateTime pattern="MM/dd/yyyy" />
                        </h:outputText>
                        <h:outputText value="#{bundle.ViewPurchaseRequisitionLabel_status}"/>
                        <h:outputText value="#{purchaseRequisitionController.selected.status}" title="#{bundle.ViewPurchaseRequisitionTitle_status}"/>
                        <h:outputText value="#{bundle.ViewPurchaseRequisitionLabel_notes}"/>
                        <h:outputText value="#{purchaseRequisitionController.selected.notes}" title="#{bundle.ViewPurchaseRequisitionTitle_notes}"/>
                    </p:panelGrid>
                    <p:commandButton value="#{bundle.Close}" onclick="PurchaseRequisitionViewDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
