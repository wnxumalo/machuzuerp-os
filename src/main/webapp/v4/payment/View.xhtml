<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

                    <p:panelGrid columns="2" rendered="#{paymentController.selected != null}">

                        <h:outputText value="#{paymentController.selected.id}" title="#{bundle.ViewPaymentTitle_id}"/>
                        <h:outputText value="#{bundle.ViewPaymentLabel_supplierId}"/>

                        <h:outputText value="#{paymentController.selected.invoiceId}" title="#{bundle.ViewPaymentTitle_invoiceId}"/>
                        <h:outputText value="#{bundle.ViewPaymentLabel_amount}"/>
                        <h:outputText value="#{paymentController.selected.amount}" title="#{bundle.ViewPaymentTitle_amount}"/>
                        <h:outputText value="#{bundle.ViewPaymentLabel_currency}"/>
                        <h:outputText value="#{paymentController.selected.currency}" title="#{bundle.ViewPaymentTitle_currency}"/>
                        <h:outputText value="#{bundle.ViewPaymentLabel_dueDate}"/>
                        <h:outputText value="#{paymentController.selected.dueDate}" title="#{bundle.ViewPaymentTitle_dueDate}">

                        <h:outputText value="#{bundle.ViewPaymentLabel_paymentDate}"/>
                        <h:outputText value="#{paymentController.selected.paymentDate}" title="#{bundle.ViewPaymentTitle_paymentDate}">

                        <h:outputText value="#{paymentController.selected.status}" title="#{bundle.ViewPaymentTitle_status}"/>
                        <h:outputText value="#{bundle.ViewPaymentLabel_notes}"/>
                        <h:outputText value="#{paymentController.selected.notes}" title="#{bundle.ViewPaymentTitle_notes}"/>
                        <h:outputText value="#{bundle.ViewPaymentLabel_metadata}"/>
                        <h:outputText value="#{paymentController.selected.metadata}" title="#{bundle.ViewPaymentTitle_metadata}"/>

                    <p:commandButton value="#{bundle.Close}" onclick="PaymentViewDialog.hide()"/>
