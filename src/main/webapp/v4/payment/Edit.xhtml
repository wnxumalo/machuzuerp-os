<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="PaymentEditDlg" widgetVar="PaymentEditDialog" modal="true" resizable="false" appendTo="@(body)" header="#{bundle.EditPaymentTitle}">
            <h:form id="PaymentEditForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{paymentController.selected != null}">
                        <p:outputLabel value="#{bundle.EditPaymentLabel_id}" for="id" />
                        <p:inputText id="id" value="#{paymentController.selected.id}" title="#{bundle.EditPaymentTitle_id}" />
                        <p:outputLabel value="#{bundle.EditPaymentLabel_supplierId}" for="supplierId" />
                        <p:inputText id="supplierId" value="#{paymentController.selected.supplierId}" title="#{bundle.EditPaymentTitle_supplierId}" required="true" requiredMessage="#{bundle.EditPaymentRequiredMessage_supplierId}"/>
                        <p:outputLabel value="#{bundle.EditPaymentLabel_purchaseOrderId}" for="purchaseOrderId" />
                        <p:inputText id="purchaseOrderId" value="#{paymentController.selected.purchaseOrderId}" title="#{bundle.EditPaymentTitle_purchaseOrderId}" required="true" requiredMessage="#{bundle.EditPaymentRequiredMessage_purchaseOrderId}"/>
                        <p:outputLabel value="#{bundle.EditPaymentLabel_invoiceId}" for="invoiceId" />
                        <p:inputText id="invoiceId" value="#{paymentController.selected.invoiceId}" title="#{bundle.EditPaymentTitle_invoiceId}" required="true" requiredMessage="#{bundle.EditPaymentRequiredMessage_invoiceId}"/>
                        <p:outputLabel value="#{bundle.EditPaymentLabel_amount}" for="amount" />
                        <p:inputText id="amount" value="#{paymentController.selected.amount}" title="#{bundle.EditPaymentTitle_amount}" />
                        <p:outputLabel value="#{bundle.EditPaymentLabel_currency}" for="currency" />
                        <p:inputText id="currency" value="#{paymentController.selected.currency}" title="#{bundle.EditPaymentTitle_currency}" />
                        <p:outputLabel value="#{bundle.EditPaymentLabel_dueDate}" for="dueDate" />
                        <p:calendar id="dueDate" pattern="MM/dd/yyyy" value="#{paymentController.selected.dueDate}" title="#{bundle.EditPaymentTitle_dueDate}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditPaymentLabel_paymentDate}" for="paymentDate" />
                        <p:calendar id="paymentDate" pattern="MM/dd/yyyy" value="#{paymentController.selected.paymentDate}" title="#{bundle.EditPaymentTitle_paymentDate}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditPaymentLabel_actualDeliveryDate}" for="actualDeliveryDate" />
                        <p:calendar id="actualDeliveryDate" pattern="MM/dd/yyyy" value="#{paymentController.selected.actualDeliveryDate}" title="#{bundle.EditPaymentTitle_actualDeliveryDate}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditPaymentLabel_paymentMethod}" for="paymentMethod" />
                        <p:inputText id="paymentMethod" value="#{paymentController.selected.paymentMethod}" title="#{bundle.EditPaymentTitle_paymentMethod}" />
                        <p:outputLabel value="#{bundle.EditPaymentLabel_paymentMethodDetails}" for="paymentMethodDetails" />
                        <p:inputText id="paymentMethodDetails" value="#{paymentController.selected.paymentMethodDetails}" title="#{bundle.EditPaymentTitle_paymentMethodDetails}" />
                        <p:outputLabel value="#{bundle.EditPaymentLabel_creationDate}" for="creationDate" />
                        <p:calendar id="creationDate" pattern="MM/dd/yyyy" value="#{paymentController.selected.creationDate}" title="#{bundle.EditPaymentTitle_creationDate}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditPaymentLabel_updateDate}" for="updateDate" />
                        <p:calendar id="updateDate" pattern="MM/dd/yyyy" value="#{paymentController.selected.updateDate}" title="#{bundle.EditPaymentTitle_updateDate}"  showOn="button"/>
                        <p:outputLabel value="#{bundle.EditPaymentLabel_status}" for="status" />
                        <p:inputText id="status" value="#{paymentController.selected.status}" title="#{bundle.EditPaymentTitle_status}" />
                        <p:outputLabel value="#{bundle.EditPaymentLabel_notes}" for="notes" />
                        <p:inputText id="notes" value="#{paymentController.selected.notes}" title="#{bundle.EditPaymentTitle_notes}" />
                        <p:outputLabel value="#{bundle.EditPaymentLabel_metadata}" for="metadata" />
                        <p:inputText id="metadata" value="#{paymentController.selected.metadata}" title="#{bundle.EditPaymentTitle_metadata}" />
                    </p:panelGrid>
                    <p:commandButton actionListener="#{paymentController.update}" value="#{bundle.Save}" update="display,:growl" oncomplete="handleSubmit(args, 'PaymentEditDialog');"/>
                    <p:commandButton value="#{bundle.Cancel}" onclick="PaymentEditDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
