<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition template="/erpbyw-template.xhtml">

        <ui:define name="title">
            <h:outputText value="List Purchase Orders"></h:outputText>
        </ui:define>

        <ui:define name="content">
            <p:growl id="growl">
                <p:autoUpdate/>
            </p:growl>

            <h:form id="PurchaseOrderListForm">
                <p:panel header="List Purchase Orders">
                    <p:dataTable id="poDTO" var="posDTO" value="#{purchaseOrderController.itemsDTO}"  selectionMode="single" selection="#{purchaseOrderController.selectedDTO}" rowKey="#{posDTO.id}">
                        <p:ajax event="rowSelect" listener="#{purchaseOrderController.onRowSelectPayment}"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Id" />
                            </f:facet>
                            <h:outputText value="#{posDTO.id}" />
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Supplier" />
                            </f:facet>                       
                            <h:outputText value="#{posDTO.supplierName}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Date" />
                            </f:facet>                       
                            <h:outputText value="#{posDTO.PODate}" />                                
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Delivery Date" />                                    
                            </f:facet>                       
                            <h:outputText value="#{posDTO.deliveryDate}" />                             
                        </p:column>  
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Shipping Method" />
                            </f:facet>                       
                            <h:outputText value="#{posDTO.shippingMethod}" />                                
                        </p:column>                        
                    </p:dataTable>
                </p:panel>
            </h:form>
          
        </ui:define>
    </ui:composition>

</html>
